function trkSearch(q){TRK_Q=q||'';TRK_SEL=null;rerender()}
function trkSelect(orderNo){TRK_SEL=orderNo;rerender()}

function trkFindOrders(q){
  if(!q||q.length<2)return[];
  const ql=q.toLowerCase();
  const all=[...D.plantOrders.map(o=>({...o,_src:'plant'})),...D.vendorOrders.map(o=>({...o,_src:'vendor'}))];
  return all.filter(o=>o.orderNo?.toLowerCase().includes(ql)||o.branch?.toLowerCase().includes(ql)||(o.items||[]).some(i=>i.itemCode?.toLowerCase().includes(ql))).slice(0,20);
}

function trkBuildTimeline(o){
  // Build journey stages from order data
  const stages=[];const now=new Date();
  const src=o._src==='plant'?'Rajkot Plant':(o.vendor||'Vendor');
  // Stage 1: Order Created
  stages.push({name:'Order Created',done:true,date:o.orderDate,location:o.branch||'—',team:o._src==='plant'?'Sales / SCM':'SCM / PPC',icon:'📋'});
  // Stage 2: PPC Allocation (Plant orders only)
  if(o._src==='plant'){
    const ppcDone=['Under PPC','In Production','Quality Check','Ready for Dispatch','Dispatched'].includes(o.status);
    const allocPcs=orderAllocPcs(o);const totalPcs=orderFinalPcs(o);
    stages.push({name:'PPC Allocation',done:ppcDone,active:o.status==='Under PPC',date:o.ppcTakenOn||'',location:src,team:'PPC Team',icon:'🏭',extra:allocPcs?`${allocPcs}/${totalPcs} PCS allocated`:''});
  }
  // Stage 3: In Production
  const inProd=['Under PPC','In Production','Quality Check','Ready for Dispatch','Ready for Pickup','Dispatched'].includes(o.status);
  const prodPcs=orderProdPcs(o);
  stages.push({name:'In Production',done:inProd,active:o.status==='In Production',date:inProd?'—':'',location:src,team:o._src==='plant'?'Rajkot Plant':'Vendor',icon:'⚙️',extra:prodPcs?prodPcs+' PCS produced':''});
  // Stage 4: Quality Check
  const qcDone=['Quality Check','Ready for Dispatch','Ready for Pickup','Dispatched'].includes(o.status);
  const qcPcs=orderQcPcs(o);
  stages.push({name:'Quality Check',done:qcDone,active:o.status==='Quality Check',date:qcDone?'—':'',location:src,team:'QC Team',icon:'🔍',extra:qcPcs?qcPcs+' PCS passed':''});
  // Stage 5: Ready for Dispatch
  const rdyDone=['Ready for Dispatch','Ready for Pickup','Dispatched'].includes(o.status);
  stages.push({name:'Ready for Dispatch',done:rdyDone,active:o.status==='Ready for Dispatch'||o.status==='Ready for Pickup',date:rdyDone?'—':'',location:src,team:'Dispatch Team',icon:'📦'});
  // Stage 5: Dispatched — check transit records
  const shipments=D.transit.filter(t=>t.sourceOrderNo===o.orderNo);
  const closedShips=D.closed.filter(t=>t.sourceOrderNo===o.orderNo);
  const allShips=[...shipments,...closedShips];
  const dispatched=o.status==='Dispatched'||allShips.length>0;
  const dispDate=allShips.length?allShips[0].dispatchDate:'';
  stages.push({name:'Dispatched',done:dispatched,active:o.status==='Dispatched'&&shipments.length>0&&!closedShips.length,date:dispDate,location:src,team:'Dispatch Team',icon:'🚛'});
  // Stage 6: In Transit
  const inTransit=shipments.some(s=>['In Transit','Reached Hub','Out for Delivery'].includes(s.status));
  const trInfo=shipments.length?shipments[0]:{};
  stages.push({name:'In Transit',done:closedShips.length>0||inTransit,active:inTransit&&!closedShips.length,date:trInfo.dispatchDate||'',location:trInfo.transporter?`${trInfo.transporter} → ${trInfo.destination||''}`:trInfo.destination||'—',team:'Transporter',icon:'🚚',mode:trInfo.dispatchMode,inv:trInfo.invoiceNo});
  // Stage 7: Delivered (GRN)
  const delivered=closedShips.length>0;
  const grnInfo=closedShips.length?closedShips[0]:{};
  stages.push({name:'Delivered (GRN Done)',done:delivered,active:false,date:grnInfo.grnDate||'',location:grnInfo.destination||'—',team:'Warehouse Team',icon:'✅',grn:grnInfo.grnNumber});
  return{stages,shipments,closedShips,allShips};
}

function rTrackOrder(){
  let h=`<div class="trk-search"><input type="text" id="trkInp" placeholder="Search by Order Number, Customer / Branch, or Item Code..." value="${TRK_Q}" onkeydown="if(event.key==='Enter')trkSearch(this.value)"><button onclick="trkSearch(document.getElementById('trkInp').value)">🔍 Track Order</button></div>`;

  // ── Search Results ──
  if(TRK_Q&&!TRK_SEL){
    const results=trkFindOrders(TRK_Q);
    if(!results.length){h+=`<div class="card"><div class="card-b"><div class="empty">No orders found for "${TRK_Q}". Try a different search term.</div></div></div>`;return h}
    h+=`<div class="card"><div class="card-h"><h3>Search Results — ${results.length} orders found</h3></div><div class="card-b"><div class="trk-results">`;
    results.forEach(o=>{
      const totalPcs=orderFinalPcs(o),dispPcs=orderDispPcs(o),pendPcs=totalPcs-dispPcs;
      const isDelayed=o.committedDate&&new Date(o.committedDate)<new Date()&&o.status!=='Dispatched'&&o.status!=='Cancelled';
      const isPartial=dispPcs>0&&pendPcs>0;
      const alertCls=isDelayed?'delayed':isPartial?'partial':'on-track';
      const alertTxt=isDelayed?'🔴 Delayed':isPartial?'🟡 Partial Dispatch':'🟢 On Track';
      h+=`<div class="trk-result-item" onclick="trkSelect('${o.orderNo}')">
        <div style="flex:1"><div style="font-weight:700;font-size:14px;color:#1F2937"><span class="trk-no">${o.orderNo}</span></div><div style="font-size:12px;color:#6B7280;margin-top:2px">${o.branch||'—'} | ${o.items?.length||0} items | ${totalPcs} PCS</div></div>
        <div style="text-align:right"><span class="trk-alert ${alertCls}">${alertTxt}</span><div style="font-size:11px;color:#6B7280;margin-top:4px">${bdg(o.status)}</div></div>
      </div>`;
    });
    h+=`</div></div></div>`;return h;
  }

  // ── Detailed Order Tracking View ──
  if(TRK_SEL){
    const allOrders=[...D.plantOrders.map(o=>({...o,_src:'plant'})),...D.vendorOrders.map(o=>({...o,_src:'vendor'}))];
    const o=allOrders.find(x=>x.orderNo===TRK_SEL);
    if(!o){h+=`<div class="card"><div class="card-b"><div class="empty">Order ${TRK_SEL} not found.</div></div></div>`;return h}

    const totalPcs=orderFinalPcs(o),dispPcs=orderDispPcs(o),pendPcs=totalPcs-dispPcs;
    const totalNA=orderTotalNA(o),totalWt=orderTotalWt(o);
    const isDelayed=o.committedDate&&new Date(o.committedDate)<new Date()&&o.status!=='Dispatched'&&o.status!=='Cancelled';
    const isPartial=dispPcs>0&&pendPcs>0;
    const alertCls=isDelayed?'delayed':isPartial?'partial':'on-track';
    const alertTxt=isDelayed?'🔴 Delayed — EDD Crossed':isPartial?'🟡 Partial Dispatch':'🟢 On Track';
    const {stages,shipments,closedShips,allShips}=trkBuildTimeline(o);

    // Back button
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><button class="btn-out" onclick="TRK_SEL=null;rerender()">← Back to Results</button>${expBtn('expTracking()','Export Tracking Report')}</div>`;

    // ── Order Header Card ──
    h+=`<div class="trk-card"><div class="trk-hdr"><div><h2><span class="trk-no">${o.orderNo}</span></h2><div style="font-size:13px;color:#6B7280;margin-top:4px">${o._src==='plant'?'Plant Order':'Vendor Order'} | ${o.type||'PO'} | Created ${fmtDate(o.orderDate)}</div></div><div style="text-align:right"><span class="trk-alert ${alertCls}" style="font-size:13px">${alertTxt}</span><div style="margin-top:6px">${bdg(o.status)}</div></div></div>`;

    // ── Key Info Grid ──
    h+=`<div class="trk-meta">
      <div class="trk-meta-item"><div class="label">Customer / Branch</div><div class="value">${o.branch||'—'}</div></div>
      <div class="trk-meta-item"><div class="label">Order Date</div><div class="value">${fmtDate(o.orderDate)}</div></div>
      <div class="trk-meta-item"><div class="label">Total Quantity</div><div class="value blue">${totalPcs} PCS</div></div>
      <div class="trk-meta-item"><div class="label">Dispatched</div><div class="value green">${dispPcs} PCS</div></div>
      <div class="trk-meta-item"><div class="label">Pending</div><div class="value ${pendPcs>0?'red':'green'}">${pendPcs} PCS</div></div>
      <div class="trk-meta-item"><div class="label">Total NA</div><div class="value">${totalNA.toFixed(1)}</div></div>
      <div class="trk-meta-item"><div class="label">Committed Date</div><div class="value ${isDelayed?'red':'blue'}">${o.committedDate?fmtDate(o.committedDate):'Not set'}</div></div>
      <div class="trk-meta-item"><div class="label">Dispatch Mode</div><div class="value">${allShips.length&&allShips[0].dispatchMode?allShips[0].dispatchMode:'—'}</div></div>
    </div>`;
    // PPC Production Progress (plant orders only)
    if(o._src==='plant'&&['Under PPC','In Production','Quality Check','Ready for Dispatch'].includes(o.status)){
      const fPcs=orderFinalPcs(o),aPcs=orderAllocPcs(o),pPcs=orderProdPcs(o),qPcs=orderQcPcs(o);
      h+=`<div style="margin-bottom:16px;padding:14px;background:#F5F3FF;border:1px solid #DDD6FE;border-radius:10px">
        <div style="font-size:13px;font-weight:700;color:#5B21B6;margin-bottom:10px">🏭 PPC Production Progress</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;text-align:center">
          <div><div style="font-size:10px;color:#6B7280;text-transform:uppercase;font-weight:600">Allocated</div><div style="font-size:20px;font-weight:700;color:#2563EB">${aPcs}</div><div style="font-size:10px;color:#9CA3AF">${fPcs?Math.round(aPcs/fPcs*100):0}%</div></div>
          <div><div style="font-size:10px;color:#6B7280;text-transform:uppercase;font-weight:600">Produced</div><div style="font-size:20px;font-weight:700;color:#F59E0B">${pPcs}</div><div style="font-size:10px;color:#9CA3AF">${fPcs?Math.round(pPcs/fPcs*100):0}%</div></div>
          <div><div style="font-size:10px;color:#6B7280;text-transform:uppercase;font-weight:600">QC Passed</div><div style="font-size:20px;font-weight:700;color:#0891B2">${qPcs}</div><div style="font-size:10px;color:#9CA3AF">${fPcs?Math.round(qPcs/fPcs*100):0}%</div></div>
          <div><div style="font-size:10px;color:#6B7280;text-transform:uppercase;font-weight:600">Ready</div><div style="font-size:20px;font-weight:700;color:#16A34A">${o.status==='Ready for Dispatch'?qPcs:0}</div><div style="font-size:10px;color:#9CA3AF">${o.status==='Ready for Dispatch'?'Ready':'Pending'}</div></div>
        </div>
      </div>`;
    }

    // ── Visual Timeline ──
    h+=`<div style="margin-bottom:6px;font-size:14px;font-weight:700;color:#1F2937">Order Journey</div>`;
    h+=`<div class="timeline">`;
    stages.forEach(s=>{
      const cls=s.done?(s.active?'active':'done'):'pending';
      const dotIcon=s.done?(s.active?'●':'✓'):'○';
      h+=`<div class="tl-step ${cls}">
        <div class="tl-dot">${dotIcon}</div>
        <div class="tl-title">${s.icon} ${s.name}${s.mode?` <span class="tl-tag" style="background:#DBEAFE;color:#1E40AF">${s.mode}</span>`:''}${s.inv?` <span class="tl-tag" style="background:#FEF3C7;color:#92400E">Inv: ${s.inv}</span>`:''}${s.grn?` <span class="tl-tag" style="background:#DCFCE7;color:#166534">GRN: ${s.grn}</span>`:''}</div>
        <div class="tl-detail">${s.date?fmtDate(s.date):''} ${s.location?'• '+s.location:''} ${s.team?'• '+s.team:''}${s.extra?' • <b>'+s.extra+'</b>':''}</div>
      </div>`;
    });
    h+=`</div>`;

    // ── Shipment Details (Partial Dispatch) ──
    if(allShips.length>0){
      h+=`<div style="margin-top:20px;font-size:14px;font-weight:700;color:#1F2937;margin-bottom:10px">Shipment Tracking${allShips.length>1?' ('+allShips.length+' shipments)':''}</div>`;
      allShips.forEach((s,idx)=>{
        const sDel=closedShips.find(c=>c.id===s.id);
        const sPcs=(s.items||[]).reduce((a,i)=>a+(i.qtyPcs||0),0);
        const sNA=(s.items||[]).reduce((a,i)=>a+(parseFloat(i.qtyNA)||0),0);
        h+=`<div class="ship-card"><h4>Shipment ${idx+1}: ${s.shipNo||'—'} — ${sPcs} PCS | ${sNA.toFixed(1)} NA</h4>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;font-size:12px">
            <div><span style="color:#6B7280">Status:</span> <b>${bdg(sDel?'Delivered':s.status)}</b></div>
            <div><span style="color:#6B7280">Dispatched:</span> ${fmtDate(s.dispatchDate)}</div>
            <div><span style="color:#6B7280">Invoice #:</span> <span class="mono">${s.invoiceNo||'—'}</span></div>
            <div><span style="color:#6B7280">Doc Date:</span> ${s.docDate?fmtDate(s.docDate):'—'}</div>
            <div><span style="color:#6B7280">Mode:</span> <b>${s.dispatchMode||'Direct'}</b></div>
            <div><span style="color:#6B7280">Transporter:</span> ${s.transporter||'—'}</div>
            <div><span style="color:#6B7280">LR #:</span> <span class="mono">${s.lrNumber||'—'}</span></div>
            <div><span style="color:#6B7280">Vehicle:</span> ${s.vehicleNo||'—'}</div>
            <div><span style="color:#6B7280">Driver:</span> ${s.driverMobile||'—'}</div>
            <div><span style="color:#6B7280">Destination:</span> ${s.destination||'—'}</div>
            <div><span style="color:#6B7280">Freight:</span> ${s.freightCharges?'₹'+s.freightCharges.toLocaleString():'—'} ${s.freightType?'('+s.freightType+')':''}</div>
            ${sDel?`<div><span style="color:#6B7280">GRN:</span> <b style="color:#16A34A">${sDel.grnNumber}</b> (${fmtDate(sDel.grnDate)})</div>`:''}
          </div>
          <div style="margin-top:8px;font-size:11px;color:#6B7280">Items: ${(s.items||[]).map(i=>`${i.itemCode}: ${i.qtyPcs} PCS`).join(' | ')}</div>
        </div>`;
      });
    }

    // ── Line Items ──
    h+=`<div style="margin-top:20px;font-size:14px;font-weight:700;color:#1F2937;margin-bottom:10px">Line Items (${o.items?.length||0})</div>`;
    h+=`<div class="tbl-wrap" style="max-height:300px"><table><thead><tr><th>Item Code</th><th>Description</th><th>Base PCS</th><th>Addl</th><th>Final</th><th>Allocated</th><th>Produced</th><th>QC Pass</th><th>Dispatched</th><th>Pending</th><th>NA</th></tr></thead><tbody>`;
    (o.items||[]).forEach(it=>{
      const fin=(it.qtyPcs||0)+(it.addlQty||0);const dp=it.dispatchedPcs||0;const pn=fin-dp;
      h+=`<tr><td class="mono">${it.itemCode}</td><td>${it.itemDesc||''}</td><td>${it.qtyPcs}</td><td>${it.addlQty||0}</td><td style="font-weight:700">${fin}</td><td>${it.allocatedPcs||0}</td><td>${it.producedPcs||0}</td><td>${it.qcPassedPcs||0}</td><td style="color:#16A34A;font-weight:600">${dp}</td><td style="color:${pn>0?'#DC2626':'#16A34A'};font-weight:600">${pn}</td><td>${(it.qtyNA||0).toFixed(1)}</td></tr>`;
    });
    h+=`</tbody></table></div>`;

    h+=`</div>`;// close trk-card
    return h;
  }

  // ── Default: Recent orders quick list ──
  const recent=[...D.plantOrders.map(o=>({...o,_src:'plant'})),...D.vendorOrders.map(o=>({...o,_src:'vendor'}))].sort((a,b)=>(b.orderDate||'').localeCompare(a.orderDate||'')).slice(0,15);
  if(recent.length){
    h+=`<div class="info-box">🔍 Search by Order Number, Customer/Branch name, or Item Code above. Or click a recent order below.</div>`;
    h+=`<div class="card"><div class="card-h"><h3>Recent Orders</h3></div><div class="card-b"><div class="trk-results">`;
    recent.forEach(o=>{
      const totalPcs=orderFinalPcs(o),dispPcs=orderDispPcs(o),pendPcs=totalPcs-dispPcs;
      const isDelayed=o.committedDate&&new Date(o.committedDate)<new Date()&&o.status!=='Dispatched'&&o.status!=='Cancelled';
      const isPartial=dispPcs>0&&pendPcs>0;
      const alertCls=isDelayed?'delayed':isPartial?'partial':'on-track';
      const alertTxt=isDelayed?'🔴 Delayed':isPartial?'🟡 Partial':'🟢 On Track';
      h+=`<div class="trk-result-item" onclick="trkSelect('${o.orderNo}')">
        <div style="flex:1"><div style="font-weight:700;font-size:14px"><span class="trk-no">${o.orderNo}</span> <span style="font-size:11px;color:#6B7280;font-weight:400">— ${o.branch||'—'}</span></div><div style="font-size:12px;color:#6B7280;margin-top:2px">${fmtDate(o.orderDate)} | ${o.items?.length||0} items | ${totalPcs} PCS</div></div>
        <div style="text-align:right"><span class="trk-alert ${alertCls}" style="font-size:11px">${alertTxt}</span><div style="margin-top:4px">${bdg(o.status)}</div></div>
      </div>`;
    });
    h+=`</div></div></div>`;
  } else {
    h+=`<div class="empty">No orders found. Import or add orders first.</div>`;
  }
  return h;
}



// ══════════ PPC MODULE ══════════
function orderAllocPcs(o){return(o.items||[]).reduce((a,i)=>a+(parseInt(i.allocatedPcs)||0),0)}
function orderProdPcs(o){return(o.items||[]).reduce((a,i)=>a+(parseInt(i.producedPcs)||0),0)}
function orderQcPcs(o){return(o.items||[]).reduce((a,i)=>a+(parseInt(i.qcPassedPcs)||0),0)}

function ppcTakeOver(id){
  const o=D.plantOrders.find(x=>x.id===id);if(!o)return;
  if(o.status!=='Pending')return toast('Only Pending orders can be taken over');
  o.status='Under PPC';o.ppcTakenBy=CU.name;o.ppcTakenOn=TD;
  o.items.forEach(it=>{it.allocatedPcs=(it.qtyPcs||0)+(it.addlQty||0)});
  sv();toast(o.orderNo+' → Under PPC (auto-allocated)');rerender();
}
function ppcTakeOverAll(){
  const pending=D.plantOrders.filter(o=>o.status==='Pending');
  if(!pending.length)return toast('No pending orders');
  if(!confirm('Take over all '+pending.length+' pending orders?'))return;
  pending.forEach(o=>{o.status='Under PPC';o.ppcTakenBy=CU.name;o.ppcTakenOn=TD;o.items.forEach(it=>{it.allocatedPcs=(it.qtyPcs||0)+(it.addlQty||0)})});
  sv();toast(pending.length+' orders taken over');rerender();
}

function ppcUpdateItems(id){
  const o=D.plantOrders.find(x=>x.id===id);if(!o)return;
  const itemsHTML=o.items.map((it,i)=>{
    const fin=(it.qtyPcs||0)+(it.addlQty||0);
    return`<div style="font-size:11px;padding:8px 0;border-bottom:1px solid var(--bd)">
      <div style="font-weight:600;margin-bottom:4px">${it.itemCode} — ${it.itemDesc} | Final: <b>${fin}</b> PCS</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
        <label style="font-size:10px">Allocated<input type="number" class="m-inp" id="pA${i}" value="${it.allocatedPcs||0}" min="0" max="${fin}" style="width:100%;padding:4px 6px;margin:2px 0 0;font-size:11px"></label>
        <label style="font-size:10px">Produced<input type="number" class="m-inp" id="pP${i}" value="${it.producedPcs||0}" min="0" max="${fin}" style="width:100%;padding:4px 6px;margin:2px 0 0;font-size:11px"></label>
        <label style="font-size:10px">QC Passed<input type="number" class="m-inp" id="pQ${i}" value="${it.qcPassedPcs||0}" min="0" max="${fin}" style="width:100%;padding:4px 6px;margin:2px 0 0;font-size:11px"></label>
        <label style="font-size:10px">Dispatched<input type="number" class="m-inp" value="${it.dispatchedPcs||0}" disabled style="width:100%;padding:4px 6px;margin:2px 0 0;font-size:11px;opacity:.5"></label>
      </div>
    </div>`;
  }).join('');
  openM('PPC — Update Production Quantities',`
    <div class="m-info"><b>Order:</b> ${o.orderNo} | <b>Status:</b> ${bdg(o.status)} | <b>Items:</b> ${o.items.length}</div>
    <div style="margin-bottom:12px">${itemsHTML}</div>
    <input type="hidden" id="pSt" value="${o.status}">
    <div class="info-box" style="background:#F5F3FF;border-color:#DDD6FE;color:#5B21B6">Status auto-advances: quantities drive status. Just update the numbers.</div>
    <button class="m-btn" style="background:var(--pu);color:#fff" onclick="ppcSaveItems('${id}')">Save PPC Update</button>`);
}

function ppcSaveItems(id){
  const o=D.plantOrders.find(x=>x.id===id);if(!o)return;
  o.items.forEach((it,i)=>{
    const fin=(it.qtyPcs||0)+(it.addlQty||0);
    it.allocatedPcs=Math.min(parseIntNum(document.getElementById('pA'+i)?.value),fin);
    it.producedPcs=Math.min(parseIntNum(document.getElementById('pP'+i)?.value),fin);
    it.qcPassedPcs=Math.min(parseIntNum(document.getElementById('pQ'+i)?.value),fin);
  });
  // AUTO STATUS: advance based on production progress
  const manualSt=document.getElementById('pSt')?.value;
  let autoSt=o.status;
  const fins=o.items.map(it=>(it.qtyPcs||0)+(it.addlQty||0));
  const allQC=o.items.every((it,i)=>(it.qcPassedPcs||0)>=fins[i]&&fins[i]>0);
  const allProd=o.items.every((it,i)=>(it.producedPcs||0)>=fins[i]&&fins[i]>0);
  const anyAlloc=o.items.some(it=>(it.allocatedPcs||0)>0);
  if(allQC)autoSt='Ready for Dispatch';
  else if(allProd)autoSt='Quality Check';
  else if(anyAlloc&&o.status==='Under PPC')autoSt='In Production';
  if(manualSt&&PPC_ST.includes(manualSt)&&manualSt!==o.status)autoSt=manualSt;
  const prev=o.status;o.status=autoSt;
  o.ppcLastUpdate=TD+' '+new Date().toLocaleTimeString();
  o.ppcUpdatedBy=CU.name;
  sv();closeM();toast('PPC: '+o.orderNo+(prev!==autoSt?' → '+autoSt:''));rerender();
}

function rPPC(){
  // PPC Module: shows orders Under PPC control (status in PPC_ST)
  const ppcOrders=D.plantOrders.filter(o=>PPC_ST.includes(o.status)||o.status==='Pending');
  const underPPC=ppcOrders.filter(o=>o.status!=='Pending');
  const pendingForTakeover=ppcOrders.filter(o=>o.status==='Pending');

  let h=`<div class="filters" style="justify-content:flex-end;margin-bottom:12px">${expBtn('expPPC()','Export PPC Report')}</div>`;

  // KPI Cards
  const totalAlloc=underPPC.reduce((a,o)=>a+orderAllocPcs(o),0);
  const totalProd=underPPC.reduce((a,o)=>a+orderProdPcs(o),0);
  const totalQC=underPPC.reduce((a,o)=>a+orderQcPcs(o),0);
  const totalRdy=underPPC.filter(o=>o.status==='Ready for Dispatch').length;
  h+=`<div class="kpi-grid" style="grid-template-columns:repeat(5,1fr)">
    <div class="kpi"><div class="bar" style="background:#7C3AED"></div><div class="lbl">Under PPC</div><div class="val">${underPPC.length}</div></div>
    <div class="kpi"><div class="bar" style="background:#2563EB"></div><div class="lbl">Allocated PCS</div><div class="val">${totalAlloc.toLocaleString()}</div></div>
    <div class="kpi"><div class="bar" style="background:#F59E0B"></div><div class="lbl">Produced PCS</div><div class="val">${totalProd.toLocaleString()}</div></div>
    <div class="kpi"><div class="bar" style="background:#0891B2"></div><div class="lbl">QC Passed PCS</div><div class="val">${totalQC.toLocaleString()}</div></div>
    <div class="kpi"><div class="bar" style="background:#16A34A"></div><div class="lbl">Ready for Dispatch</div><div class="val">${totalRdy}</div></div>
  </div>`;

  // Pending orders available for takeover
  if(pendingForTakeover.length&&(CU.role==='ppc'||CU.role==='scm')){
    h+=`<div class="card"><div class="card-h"><h3>Pending Orders (${pendingForTakeover.length})</h3><button class="btn-ac" style="font-size:10px;padding:4px 10px" onclick="ppcTakeOverAll()">Take Over All</button></div><div class="card-b">${tbl([
      {k:'orderNo',l:'Order #',m:1},{k:'type',l:'Type',r:r=>bdg(r.type)},{k:'branch',l:'Branch'},
      {k:'orderDate',l:'Date',m:1,r:r=>fmtDate(r.orderDate)},
      {k:'_totalPcs',l:'Final PCS',r:r=>orderFinalPcs(r)},{k:'_totalNA',l:'NA',r:r=>orderTotalNA(r).toFixed(1)},
      {k:'_itemCount',l:'Items',r:r=>r.items?.length||0},
      {k:'committedDate',l:'Committed',r:r=>fmtDate(r.committedDate)||'—'},
      {k:'_act',l:'',r:r=>`<button class="act-btn" style="background:rgba(124,58,237,.12);color:var(--pu)" onclick="ppcTakeOver('${r.id}')">▸ Take Over</button>`}
    ],condensedOrders(pendingForTakeover))}</div></div>`;
  }

  // Orders under PPC control
  if(underPPC.length){
    h+=`<div class="card"><div class="card-h"><h3>Orders Under PPC Control (${underPPC.length})</h3></div><div class="card-b">${tbl([
      {k:'orderNo',l:'Order #',m:1},{k:'type',l:'Type',r:r=>bdg(r.type)},{k:'branch',l:'Branch'},
      {k:'status',l:'Status',r:r=>bdg(r.status)},
      {k:'_totalPcs',l:'Final PCS',r:r=>orderFinalPcs(r)},
      {k:'_allocPcs',l:'Allocated',r:r=>{const v=orderAllocPcs(r);return v?`<span style="color:#2563EB;font-weight:600">${v}</span>`:'0'}},
      {k:'_prodPcs',l:'Produced',r:r=>{const v=orderProdPcs(r);return v?`<span style="color:#F59E0B;font-weight:600">${v}</span>`:'0'}},
      {k:'_qcPcs',l:'QC Passed',r:r=>{const v=orderQcPcs(r);return v?`<span style="color:#0891B2;font-weight:600">${v}</span>`:'0'}},
      {k:'_dispPcs',l:'Dispatched',r:r=>{const v=orderDispPcs(r);return v?`<span style="color:#16A34A;font-weight:600">${v}</span>`:'0'}},
      {k:'committedDate',l:'Committed',r:r=>fmtDate(r.committedDate)||'—'},
      {k:'ppcLastUpdate',l:'Last Update',m:1,r:r=>r.ppcLastUpdate||'—'},
      {k:'_act',l:'',r:r=>(CU.role==='ppc'||CU.role==='scm')?`<button class="act-btn" style="background:rgba(124,58,237,.12);color:var(--pu)" onclick="ppcUpdateItems('${r.id}')">✎ Update</button>`:''}
    ],condensedOrders(underPPC))}</div></div>`;
  }

  return h;
}

// ══════════ CAPACITY MANAGEMENT ══════════
function rCapacity(){
  const cap=D.capacity||{pcs:50000,na:25000,effectiveFrom:TD};
  // ── Compute Planned PCS / NA from pending Rajkot Plant orders only (not vendors) ──
  let plannedPcs=0,plannedNA=0;
  D.plantOrders.forEach(o=>{
    if(o.status==='Dispatched'||o.status==='Closed')return;
    (o.items||[]).forEach(it=>{
      const pcs=parseFloat(it.qtyPcs)||0,disp=parseFloat(it.dispatchedPcs)||0;
      plannedPcs+=Math.max(0,pcs-disp);
      plannedNA+=parseFloat(it.qtyNA)||0;
    });
  });
  const pctPcs=cap.pcs?Math.round(plannedPcs/cap.pcs*100):0;
  const pctNA=cap.na?Math.round(plannedNA/cap.na*100):0;
  // Traffic-light status helper
  const status=p=>p>100?{ic:'🔴',lbl:'Overloaded',clr:'#DC2626',bg:'#FEE2E2'}:p>=80?{ic:'🟡',lbl:'Near Capacity',clr:'#F59E0B',bg:'#FEF3C7'}:{ic:'🟢',lbl:'Normal',clr:'#16A34A',bg:'#DCFCE7'};
  const stPcs=status(pctPcs),stNA=status(pctNA);

  let h=`<div class="filters" style="justify-content:flex-end;margin-bottom:8px">${expBtn('expCapacity()','Export Capacity Report')}</div><div class="info-box">📊 Capacity planning applies <b>only to Rajkot Plant</b>. Vendor capacity is managed separately by vendors.</div>`;

  // ── PLANNED VS CAPACITY VISUAL CARDS ──
  h+=`<div class="kpi-grid" style="grid-template-columns:repeat(2,1fr);margin-bottom:14px">
    <div class="kpi" style="border-left:4px solid ${stPcs.clr};padding-left:14px">
      <div class="lbl">PCS Utilization</div>
      <div style="display:flex;align-items:baseline;gap:8px;margin:6px 0 4px"><div style="font-size:26px;font-weight:700;color:${stPcs.clr};font-family:'JetBrains Mono',monospace">${pctPcs}%</div><span class="bdg" style="background:${stPcs.bg};color:${stPcs.clr};font-size:10px">${stPcs.ic} ${stPcs.lbl}</span></div>
      <div style="font-size:11px;color:#6B7280">Planned: <b style="color:#1F2937">${plannedPcs.toLocaleString()}</b> / Capacity: <b style="color:#1F2937">${(cap.pcs||0).toLocaleString()}</b> PCS</div>
      <div style="height:8px;background:#F3F4F6;border-radius:4px;margin-top:8px;overflow:hidden"><div style="height:100%;width:${Math.min(100,pctPcs)}%;background:${stPcs.clr};transition:width .3s"></div></div>
    </div>
    <div class="kpi" style="border-left:4px solid ${stNA.clr};padding-left:14px">
      <div class="lbl">NA Utilization</div>
      <div style="display:flex;align-items:baseline;gap:8px;margin:6px 0 4px"><div style="font-size:26px;font-weight:700;color:${stNA.clr};font-family:'JetBrains Mono',monospace">${pctNA}%</div><span class="bdg" style="background:${stNA.bg};color:${stNA.clr};font-size:10px">${stNA.ic} ${stNA.lbl}</span></div>
      <div style="font-size:11px;color:#6B7280">Planned: <b style="color:#1F2937">${plannedNA.toFixed(0)}</b> / Capacity: <b style="color:#1F2937">${(cap.na||0).toLocaleString()}</b> NA</div>
      <div style="height:8px;background:#F3F4F6;border-radius:4px;margin-top:8px;overflow:hidden"><div style="height:100%;width:${Math.min(100,pctNA)}%;background:${stNA.clr};transition:width .3s"></div></div>
    </div>
  </div>`;

  h+=`<div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
    <div class="kpi"><div class="bar" style="background:#2563EB"></div><div class="lbl">Capacity PCS</div><div class="val">${(cap.pcs||0).toLocaleString()}</div></div>
    <div class="kpi"><div class="bar" style="background:#F59E0B"></div><div class="lbl">Capacity NA</div><div class="val">${(cap.na||0).toLocaleString()}</div></div>
    <div class="kpi"><div class="bar" style="background:#16A34A"></div><div class="lbl">Effective From</div><div class="val" style="font-size:16px">${fmtDate(cap.effectiveFrom)}</div></div>
  </div>`;
  if(CU.role==='scm'||CU.role==='ppc')h+=`<div class="card"><div class="card-h"><h3>Update Capacity</h3></div><div class="card-b">
    <div class="info-box">★ Changes are logged. No daily updates needed — set once, update only when capacity changes.</div>
    <div class="m-2" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">

  ],(D.capacityLogs||[]).slice().reverse()):'<div class="empty">No capacity changes logged yet.</div>'}</div></div>`;

function saveCapacity(){
  const newPcs=parseIntNum(document.getElementById('capPcs')?.value);
  const newNA=parseIntNum(document.getElementById('capNA')?.value);
  const newEff=normDate(document.getElementById('capEff')?.value)||TD;
  const reason=document.getElementById('capReason')?.value?.trim();
  if(!reason)return alert('Reason for change is mandatory');
  const cap=D.capacity||{pcs:50000,na:25000,effectiveFrom:TD};
  const ts=TD+' '+new Date().toLocaleTimeString();
  if(newPcs!==cap.pcs)D.capacityLogs.push({changedOn:ts,field:'Capacity PCS',oldValue:String(cap.pcs),newValue:String(newPcs),reason,changedBy:CU.name});
  if(newNA!==cap.na)D.capacityLogs.push({changedOn:ts,field:'Capacity NA',oldValue:String(cap.na),newValue:String(newNA),reason,changedBy:CU.name});
  if(newEff!==cap.effectiveFrom)D.capacityLogs.push({changedOn:ts,field:'Effective From',oldValue:cap.effectiveFrom,newValue:newEff,reason,changedBy:CU.name});
  D.capacity={pcs:newPcs,na:newNA,effectiveFrom:newEff};
  sv();toast('Capacity updated');rerender();
}

// Data model:
//   D.clubs = [{id:'CLUB/001/25-26', orderNos:[], destination, committedDate, truckSize, totalTons, totalNA, totalPcs,
//               utilization, status:'Planned'|'Dispatched'|'Cancelled', createdBy, createdAt, dispatchedAt, notes}]
//   Each order in plantOrders / vendorOrders gets a `clubId` field when added to a club.
//   D.clubLogs = [{ts, action, clubId, orderNo, by, detail}]
let TC_VIEW='plan';// 'plan' | 'active' | 'history'
let TC_SEL=new Set();// selected orderNos for new club
let TC_FILT={dest:'',from:'',to:'',src:'all'};// plan-view filters

function tcLog(action,clubId,orderNo,detail){if(!D.clubLogs)D.clubLogs=[];D.clubLogs.push({ts:TD+' '+new Date().toLocaleTimeString(),action,clubId,orderNo,by:CU?.name||'-',detail:detail||''})}

// Eligible pool for clubbing: pending orders, not yet in an Active club, not dispatched
function tcEligibleOrders(){
  const all=[
    ...D.plantOrders.filter(o=>o.status!=='Dispatched'&&o.status!=='Closed'&&o.status!=='Cancelled'&&!findOrderClub(o.orderNo)).map(o=>({...o,_src:'Plant'})),
    ...D.vendorOrders.filter(o=>o.status!=='Dispatched'&&o.status!=='Closed'&&o.status!=='Cancelled'&&!findOrderClub(o.orderNo)).map(o=>({...o,_src:'Vendor'}))
  ];
  return all.map(o=>{
    return{...o,_tons:orderTotalWt(o),_na:orderTotalNA(o),_pcs:orderFinalPcs(o)-orderDispPcs(o),_destination:o.dispatchLocation||o.branch||'Not Assigned',_currentClub:''};
  });
}

// Validate a proposed club from selected orderNos. Returns {ok, errors:[], warnings:[], summary:{tons,na,pcs,dest:Set,dates:Set,suggested:{size,utilization,fits}}}
function tcValidate(orderNos){
  const errs=[],warns=[];
  const orders=orderNos.map(no=>findOrderByNo(no)).filter(Boolean);
  if(!orders.length)return{ok:false,errors:['No orders selected'],warnings:[],summary:null};
  if(orders.length<2)warns.push('Single-order "club" — clubbing typically combines 2+ orders');
  let tons=0,na=0,pcs=0;const destSet=new Set(),dateSet=new Set();
  orders.forEach(o=>{tons+=orderTotalWt(o);na+=orderTotalNA(o);pcs+=orderFinalPcs(o)-orderDispPcs(o);
    destSet.add((o.dispatchLocation||o.branch||'Not Assigned').toUpperCase().trim());
    if(o.committedDate)dateSet.add(o.committedDate);
  });
  // Destination compatibility
  if(destSet.size>1)errs.push(`Multiple destinations in selection: ${[...destSet].join(', ')}. Same or nearby destinations only.`);
  // Truck fit
  const truck=pickTruck(tons);
  if(!truck.fits)errs.push(`Total load ${tons.toFixed(2)} Tons exceeds largest truck (40 MT). Split into multiple clubs.`);
  // Utilisation warnings
  if(truck.utilization<50&&tons>0)warns.push(`⚠ Low utilisation (${truck.utilization}%). Truck will be under-loaded — consider adding more orders.`);
  if(truck.utilization>=95)warns.push(`⚠ High utilisation (${truck.utilization}%). Very tight fit — verify weight accuracy.`);
  // Dispatch date compatibility — warn if existing committed dates vary widely
  if(dateSet.size>1){
    const sorted=[...dateSet].sort();
    const spanDays=daysDiff(sorted[0],sorted[sorted.length-1])||0;
    if(spanDays>7)warns.push(`Existing committed dates span ${spanDays} days (${sorted[0]} → ${sorted[sorted.length-1]}). They will all be reset to the new common date.`);
  }
  // Already-clubbed orders
  orders.forEach(o=>{const c=findOrderClub(o.orderNo);if(c)errs.push(`Order ${o.orderNo} is already in active club ${c.id}`);});
  return{ok:errs.length===0,errors:errs,warnings:warns,summary:{tons,na,pcs,dest:[...destSet],dates:[...dateSet],truck,orderCount:orders.length}};
}

function tcDoConfirm(newId){
  const cd=normDate(document.getElementById('cdNew')?.value);
  const truckOv=parseInt(document.getElementById('tkOv')?.value);
  const notes=document.getElementById('clNote')?.value?.trim()||'';
  if(!cd){alert('SCM Committed Dispatch Date is mandatory');return}
  const orderNos=[...TC_SEL];
  const val=tcValidate(orderNos);
  if(!val.ok){alert('Validation failed: '+val.errors.join('; '));return}
  const s=val.summary;
  // Apply override if user picked a different truck
  const finalTruck=truckOv||s.truck.size;
  const finalUtil=Math.round(s.tons/finalTruck*100);
  // Create club
  const club={
    id:newId,
    orderNos:orderNos.slice(),
    destination:s.dest[0],
    committedDate:cd,
    truckSize:finalTruck,
    totalTons:s.tons,
    totalNA:s.na,
    totalPcs:s.pcs,
    utilization:finalUtil,
    status:'Planned',
    createdBy:CU.name,
    createdAt:TD+' '+new Date().toLocaleTimeString(),
    notes
  };
  D.clubs.push(club);
  // Apply common committed date to all orders + tag with clubId
  orderNos.forEach(no=>{
    const o=findOrderByNo(no);if(!o)return;
    const prev=o.committedDate||'(not set)';
    o.committedDate=cd;
    o.clubId=newId;
    if(prev!==cd)D.dateLogs.push({orderNo:no,prevDate:prev,newDate:cd,by:CU.name+' (via club)',on:TD+' '+new Date().toLocaleTimeString(),changeNo:D.dateLogs.filter(l=>l.orderNo===no).length+1});
    tcLog('Added to Club',newId,no,'Committed date → '+cd);
  });
  TC_SEL=new Set();TC_VIEW='active';sv();closeM();toast(`✓ Club ${newId} created with ${orderNos.length} orders`);rerender();
}

function tcRemoveOrder(clubId,orderNo){
  const c=D.clubs.find(x=>x.id===clubId);if(!c)return;
  if(!confirm(`Remove ${orderNo} from ${clubId}?\nThe order will be unclubbed and you can set a new committed date for it.`))return;
  c.orderNos=c.orderNos.filter(n=>n!==orderNo);
  // Update club totals
  c.totalTons=clubLoadTons(c);c.totalNA=clubLoadNA(c);c.totalPcs=clubLoadPcs(c);
  const truck=pickTruck(c.totalTons);c.utilization=truck.utilization;
  // Remove clubId from order
  const o=findOrderByNo(orderNo);if(o){delete o.clubId}
  tcLog('Removed from Club',clubId,orderNo,'');
  // If club is empty, cancel it
  if(!c.orderNos.length){c.status='Cancelled';c.cancelledAt=TD+' '+new Date().toLocaleTimeString();tcLog('Auto-Cancelled',clubId,'','Last order removed')}
  sv();toast(`Order ${orderNo} removed from ${clubId}`);rerender();
}

function tcSaveClubDate(clubId){

function tcCancelClub(clubId){

function tcDoDispatchClub(clubId){
  const c=D.clubs.find(x=>x.id===clubId);if(!c)return;
  const inv=document.getElementById('cdInv')?.value.trim();
  const docDt=normDate(document.getElementById('cdDocDt')?.value);
  const mode=document.getElementById('cdMode')?.value;
  const dd=normDate(document.getElementById('cdDt')?.value)||TD;
  const tr=document.getElementById('cdTr')?.value;
  if(!inv){alert('Invoice / Dispatch Doc No. is mandatory');return}
  if(!docDt){alert('Doc Date is mandatory');return}
  if(!mode){alert('Mode is mandatory');return}
  if(!tr){alert('Transporter is mandatory');return}
  const lr=document.getElementById('cdLR')?.value||'';
  const vh=document.getElementById('cdVh')?.value||'';
  const dm=document.getElementById('cdDM')?.value||'';
  let dispatched=0;
  c.orderNos.forEach(no=>{
    const o=findOrderByNo(no);if(!o||o.status==='Dispatched')return;
    const type=D.plantOrders.includes(o)?'plantOrders':'vendorOrders';
    // Mark all items as fully dispatched & create transit record
    const dispItems=[];o.items.forEach(it=>{const pend=((it.qtyPcs||0)+(it.addlQty||0))-(it.dispatchedPcs||0);if(pend>0){dispItems.push({...it,qtyPcs:pend,qtyNA:it.qtyNA?(pend/it.qtyPcs*it.qtyNA):0,weight:it.weight?(pend/it.qtyPcs*it.weight):0});it.dispatchedPcs=(it.dispatchedPcs||0)+pend}});
    const onTime=o.committedDate?new Date(normDate(dd))<=new Date(normDate(o.committedDate)):true;
    const prodLead=daysDiff(o.orderDate,dd);
    const shipId=gid('SHP');
    D.transit.push({id:shipId,shipNo:shipId,sourceOrderNo:o.orderNo,sourceType:type==='plantOrders'?'Plant':'Vendor',items:dispItems,orderDate:o.orderDate,committedDate:o.committedDate||'',factoryEDD:o.factoryEDD||'',dispatchDate:dd,invoiceNo:inv,docDate:docDt,dispatchMode:mode,transporter:tr,lrNumber:lr,vehicleNo:vh,driverMobile:dm,source:type==='plantOrders'?'Rajkot Plant':(o.vendor||'Vendor'),destination:o.dispatchLocation||c.destination,status:'In Transit',onTimeDispatch:onTime,productionLeadDays:prodLead,branch:o.branch,isPartial:false,clubId:clubId,createdBy:CU.name,addedOn:TD});
    o.status='Dispatched';o.actualDispatchDate=dd;o.onTimeDispatch=onTime;o.productionLeadDays=prodLead;
    dispatched++;
  });
  c.status='Dispatched';c.dispatchedAt=TD+' '+new Date().toLocaleTimeString();c.dispatchedBy=CU.name;
  c.invoiceNo=inv;c.transporter=tr;c.vehicleNo=vh;
  tcLog('Club Dispatched',clubId,'',`${dispatched} orders dispatched via ${tr} | Inv: ${inv}`);
  sv();closeM();toast(`✓ ${clubId}: ${dispatched} orders dispatched`);rerender();
}

// ── DISPATCH SCHEDULE ──
function expDispSchedule(){
  const isPlant=CAL_T==='plant';
  if(!isPlant&&CU.role!=='scm'){alert('Vendor schedule export is restricted to SCM.');return}
  const src=isPlant?D.plantOrders:D.vendorOrders;
  // ── Condensed Sheet: one row per date ──
  const dateAgg={};
  src.forEach(o=>{
    if(o.status==='Dispatched')return;
    const dt=(o.committedDate||o.factoryEDD||'').slice(0,10);
    if(!dt||dt.length<10)return;
    if(!dateAgg[dt])dateAgg[dt]={date:dt,tons:0,na:0,pcs:0,locs:new Set(),orders:new Set(),clubs:new Set()};
    let oTons=0,oNA=0,oPcs=0;(o.items||[]).forEach(it=>{oTons+=parseFloat(it.weight)||0;oNA+=parseFloat(it.qtyNA)||0;oPcs+=parseFloat(it.qtyPcs)||0;});
    dateAgg[dt].tons+=oTons;dateAgg[dt].na+=oNA;dateAgg[dt].pcs+=oPcs;
    dateAgg[dt].locs.add(o.dispatchLocation||'Not Assigned');
    dateAgg[dt].orders.add(o.orderNo);
    if(o.clubId)dateAgg[dt].clubs.add(o.clubId);
  });
  const condensedRows=Object.values(dateAgg).sort((a,b)=>a.date.localeCompare(b.date)).map(r=>[fmtDate(r.date),r.tons.toFixed(3),r.na.toFixed(2),r.pcs,r.orders.size,[...r.locs].join(', '),[...r.clubs].join(', ')||'—']);
  const condTotals=['TOTAL',Object.values(dateAgg).reduce((a,r)=>a+r.tons,0).toFixed(3),Object.values(dateAgg).reduce((a,r)=>a+r.na,0).toFixed(2),Object.values(dateAgg).reduce((a,r)=>a+r.pcs,0),'','',''];
  // ── Detailed Sheet: Date + Location grouped ──
  const dlGroups={};
  src.forEach(o=>{
    if(o.status==='Dispatched')return;
    const dt=(o.committedDate||o.factoryEDD||'').slice(0,10);
    if(!dt||dt.length<10)return;

    ['OTD Score (avg)',m.avgOTD?.toFixed(2)||'-'],['OTD Count',m.otdCount||0],['OTD %',otdPct+'%'],

  });});
  const toRows=(bag)=>Object.entries(bag).sort((a,b)=>b[1].pcs-a[1].pcs).map(([k,v])=>[k,v.pcs,parseFloat(v.na.toFixed(2))]);

    const slot=(o.type==='STO')?brAgg[b].sto:brAgg[b].so;
    (o.items||[]).forEach(it=>{
      const pcs=Math.max(0,(parseFloat(it.qtyPcs)||0)-(parseFloat(it.dispatchedPcs)||0));
      const na=parseFloat(it.qtyNA)||0;
      slot.pcs+=pcs;slot.na+=na;
    });
  });
  const branchRows=Object.entries(brAgg).sort((a,b)=>(b[1].so.pcs+b[1].sto.pcs)-(a[1].so.pcs+a[1].sto.pcs)).map(([br,v])=>[br,v.so.pcs,parseFloat(v.so.na.toFixed(2)),v.sto.pcs,parseFloat(v.sto.na.toFixed(2)),v.so.pcs+v.sto.pcs,parseFloat((v.so.na+v.sto.na).toFixed(2))]);
  const branchTot=['TOTAL',branchRows.reduce((a,r)=>a+r[1],0),parseFloat(branchRows.reduce((a,r)=>a+r[2],0).toFixed(2)),branchRows.reduce((a,r)=>a+r[3],0),parseFloat(branchRows.reduce((a,r)=>a+r[4],0).toFixed(2)),branchRows.reduce((a,r)=>a+r[5],0),parseFloat(branchRows.reduce((a,r)=>a+r[6],0).toFixed(2))];

    {name:'By Category',title:'Category-wise Orders (QTY / NA)',headers:['Category','QTY (PCS)','Total NA'],rows:catRows,totals:tot(catRows)},
    {name:'By Brand',title:'Brand-wise Orders (QTY / NA)',headers:['Brand','QTY (PCS)','Total NA'],rows:brRows,totals:tot(brRows)},
    {name:'Rajkot Branch SO-STO',title:'Rajkot Plant — Branch-wise SO vs STO',subtitle:'Pending plant orders only',headers:['Branch','SO — QTY (PCS)','SO — NA','STO — QTY (PCS)','STO — NA','Total QTY','Total NA'],rows:branchRows,totals:branchTot}
  ]);
}

  const sl={main:'',orders:'Order Flow',tracking:'Tracking',analytics:'Analytics',admin:'Administration'};
  NAV.forEach(n=>{if(!canDo(n.k))return;if(n.s!==ls){if(sl[n.s])h+=`<div class="nav-sec">${sl[n.s]}</div>`;ls=n.s}
    let bg='';if(n.k==='plantOrders')bg=`<span class="ct2">${D.plantOrders.filter(o=>o.status!=='Dispatched'&&o.status!=='Cancelled').length}</span>`;if(n.k==='vendorOrders')bg=`<span class="ct2">${D.vendorOrders.filter(o=>o.status!=='Dispatched'&&o.status!=='Cancelled').length}</span>`;if(n.k==='ppcModule'){const pc=D.plantOrders.filter(o=>['Under PPC','In Production','Quality Check'].includes(o.status)).length;if(pc)bg=`<span class="ct2">${pc}</span>`}if(n.k==='transit'&&m.trN)bg=`<span class="ct2">${m.trN}</span>`;if(n.k==='closed'&&m.clN)bg=`<span class="ct2">${m.clN}</span>`;if(n.k==='users'&&D.pwRequests.length)bg=`<span class="ct">${D.pwRequests.length}</span>`;
    h+=`<button class="nav-btn ${SEC===n.k?'on':''}" onclick="go('${n.k}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">${n.svg}</svg>${n.l}${bg}</button>`;
  });
  if(CU.role!=='scm')h+=`<div style="margin-top:auto;padding:10px;border-top:1px solid var(--bd)"><button class="btn-out" style="width:100%;font-size:10px" onclick="requestPwChange()">Request PW Change</button></div>`;
  else h+=`<div style="margin-top:auto;padding:10px;border-top:1px solid var(--bd)"><button style="width:100%;padding:5px;border-radius:4px;border:1px solid var(--bd);background:transparent;color:var(--dm);font-size:9px;cursor:pointer" onclick="resetAll()">Reset All Data</button></div>`;
  document.getElementById('sidebar').innerHTML=h;
}

function rerender(){
  // If the current section is no longer accessible (e.g. permissions changed mid-session,
  // or user clicked a link they shouldn't have), snap to the first module they can view.
  if(CU&&!canDo(SEC)){
    const firstAllowed=NAV.find(n=>canDo(n.k));
    SEC=firstAllowed?firstAllowed.k:'__noaccess';
  }
  renderNav();const el=document.getElementById('content');const t=NAV.find(n=>n.k===SEC)?.l||'Dashboard';
  let h=`<div class="sec-title"><span>${t}</span><div style="display:flex;gap:6px;align-items:center">${CU?`<span class="bdg" style="background:${ROLE_CLR[CU.role]}20;color:${ROLE_CLR[CU.role]};font-size:9px">${CU.dept}</span>`:''}</div></div>`;
  const R={dashboard:rDash,plantOrders:rPlant,vendorOrders:rVendor,ppcModule:rPPC,transit:rTransit,trackOrder:rTrackOrder,dispCalendar:rDispSchedule,truckClub:rTruckClubbing,otif:rOTIF,leadTime:rLeadTime,closed:rClosed,logs:rLogs,dataAdmin:rDataAdmin,capacity:rCapacity,masters:rMasters,departments:rDepartments,users:rUsers};
  if(SEC==='__noaccess'){
    h+=`<div class="card"><div class="card-b" style="text-align:center;padding:60px 20px"><div style="font-size:48px;margin-bottom:14px">🔒</div><div style="font-size:18px;font-weight:700;color:#1F2937;margin-bottom:8px">No Modules Assigned</div><div style="color:#6B7280;font-size:13px;max-width:460px;margin:0 auto;line-height:1.6">Your account doesn't have permission to view any modules yet. Please contact your <b>SCM Administrator</b> to have the appropriate access rights assigned through the Users → Permissions Matrix.</div></div></div>`;
  } else {
    h+=(canDo(SEC)?R[SEC]?.():'')??'';
  }
  el.innerHTML=h;
  if(SEC==='dashboard')renderDC();if(SEC==='otif')renderOC();if(SEC==='leadTime')renderLTC();
}

function renderDC(){const m=getM();const pe=document.getElementById('cP');
  const chartText='#6B7280',chartGrid='#E5E7EB';
  if(pe)new Chart(pe,{type:'bar',data:{labels:['Plant','Vendor','Ready','Transit','Delivered'],datasets:[{data:[m.plP,m.vnP,m.rdyD,m.trN,m.clN],backgroundColor:['#2563EB','#7C3AED','#F59E0B','#F97316','#16A34A'],borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{color:chartText,font:{size:10,family:'DM Sans'}},grid:{color:chartGrid}},y:{ticks:{color:chartText,font:{size:11,family:'DM Sans',weight:500}},grid:{color:chartGrid}}}}});
  // OTIF by Destination chart
  const byD={};m.fClosed.forEach(o=>{const d=o.destination||'?';if(!byD[d])byD[d]={sum:0,ct:0};const sc=calcOTIFscore(o.committedDate,o.dispatchDate);if(sc!=null){byD[d].sum+=sc;byD[d].ct++}});
  const dLabels=Object.keys(byD).map(d=>d.replace(' WH',''));
  const dVals=Object.values(byD).map(v=>v.ct?(v.sum/v.ct):0);
  const dColors=dVals.map(v=>v>=0.85?'#16A34A':v>=0?'#F59E0B':'#DC2626');
  const ce=document.getElementById('cOD');
  if(ce&&dLabels.length)new Chart(ce,{type:'bar',data:{labels:dLabels,datasets:[{label:'Avg OTIF Score',data:dVals.map(v=>Math.round(v*100)/100),backgroundColor:dColors,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:chartText,font:{size:11,family:'DM Sans'}},grid:{color:chartGrid}},y:{ticks:{color:chartText,font:{size:10,family:'DM Sans'}},grid:{color:chartGrid}}}}});

  // ── PRODUCT ANALYTICS — Aggregate enriched data from all pending plant + vendor orders ──
  const _plant2=D.plantOrders.filter(o=>o.status!=='Dispatched'&&o.status!=='Closed'&&o.status!=='Cancelled');
  const _vendor2=D.vendorOrders.filter(o=>o.status!=='Dispatched'&&o.status!=='Closed'&&o.status!=='Cancelled');
  const activeOrders = DASH_LOC==='plant' ? _plant2 : DASH_LOC==='vendor' ? _vendor2 : [..._plant2,..._vendor2];
  // ── Aggregate Segment / Category / Brand / Grade × {PCS, NA} from enriched items ──
  const agg={seg:{},cat:{},brand:{},grade:{}};
  // helper: increment dimension bucket
  const bump=(bag,key,pcs,na)=>{key=(key||'').trim()||'Unclassified';if(!bag[key])bag[key]={pcs:0,na:0};bag[key].pcs+=Math.max(0,pcs);bag[key].na+=Math.max(0,na);};
  activeOrders.forEach(o=>{(o.items||[]).forEach(it=>{
    const pcs=(parseFloat(it.qtyPcs)||0)-(parseFloat(it.dispatchedPcs)||0);
    const na=parseFloat(it.qtyNA)||0;
    bump(agg.seg,it.segment,pcs,na);
    bump(agg.cat,it.category,pcs,na);// MR/BWP/BWR from SAP-B1 code char 4
    bump(agg.brand,it.brand,pcs,na);
    bump(agg.grade,it.grade,pcs,na);
  });});

  // Helper: take top-N entries of an agg bag sorted by selected metric desc
  const metricKey=(DASH_METRIC==='na')?'na':'pcs';
  const metricLabel=(DASH_METRIC==='na')?'NA':'QTY (PCS)';
  const metricColor=(DASH_METRIC==='na')?'#F59E0B':'#2563EB';
  const topN=(bag,n)=>Object.entries(bag).sort((a,b)=>b[1][metricKey]-a[1][metricKey]).slice(0,n);
  const palette=['#2563EB','#7C3AED','#F59E0B','#16A34A','#F97316','#0891B2','#DC2626','#5B21B6','#EC4899','#14B8A6'];
  const fmtNum=v=>v>=1000?(v/1000).toFixed(1)+'K':(metricKey==='na'?v.toFixed(0):v);

  // Single-metric bar chart factory — colour-coded per metric
  const singleBarChart=(canvas,entries,perBarColors)=>{
    if(!canvas||!entries.length)return;
    const labels=entries.map(e=>e[0]);
    const data=entries.map(e=>metricKey==='na'?Math.round(e[1].na*100)/100:Math.round(e[1].pcs));
    const colors=perBarColors||labels.map((_,i)=>palette[i%palette.length]);
    new Chart(canvas,{
      type:'bar',
      data:{labels,datasets:[{label:metricLabel,data,backgroundColor:colors,borderRadius:5}]},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:ctx=>`${metricLabel}: ${ctx.parsed.y.toLocaleString()}`}}
        },
        scales:{
          x:{ticks:{color:chartText,font:{size:10,family:'DM Sans'},maxRotation:35,minRotation:0,autoSkip:false},grid:{display:false}},
          y:{beginAtZero:true,ticks:{color:chartText,font:{size:10,family:'DM Sans'},callback:fmtNum},grid:{color:chartGrid},title:{display:true,text:metricLabel,color:metricColor,font:{size:11,family:'DM Sans',weight:600}}}
        }
      }
    });
  };

  // ── Chart 1: SEGMENT ──
  singleBarChart(document.getElementById('cSeg'),topN(agg.seg,9));

  // ── Chart 2: CATEGORY (MR / BWP / BWR fixed order) ──
  const catKeys=['MR','BWP','BWR'];
  const catEntries=[];
  catKeys.forEach(k=>{if(agg.cat[k])catEntries.push([k,agg.cat[k]])});
  Object.entries(agg.cat).filter(([k])=>!catKeys.includes(k)).forEach(e=>catEntries.push(e));
  // Distinct colours per category to make MR/BWP/BWR visually distinct
  const catColors={MR:'#2563EB',BWP:'#7C3AED',BWR:'#16A34A'};
  singleBarChart(document.getElementById('cCat'),catEntries,catEntries.map(([k])=>catColors[k]||'#9CA3AF'));

  // ── Chart 3: BRAND ──
  singleBarChart(document.getElementById('cBrand'),topN(agg.brand,8));

  // ── Chart 4: RAJKOT PLANT — BRANCH-WISE SO vs STO (grouped bars) ──
  // Rajkot Plant only. Aggregates Sale Orders (SO) and Stock Transfer Orders (STO) per branch,
  // using selected metric (QTY PCS or NA). Pending orders only (not Dispatched/Closed).
  const cBranch=document.getElementById('cBranch');
  if(cBranch){
    const plantPending=D.plantOrders.filter(o=>o.status!=='Dispatched'&&o.status!=='Closed'&&o.status!=='Cancelled');
    const branchAgg={};// {branch:{so:{pcs,na}, sto:{pcs,na}}}
    plantPending.forEach(o=>{
      const branch=(o.branch||'').trim()||'Unassigned';
      if(!branchAgg[branch])branchAgg[branch]={so:{pcs:0,na:0},sto:{pcs:0,na:0}};
      const slot=(o.type==='STO')?branchAgg[branch].sto:branchAgg[branch].so;
      (o.items||[]).forEach(it=>{
        const pcs=Math.max(0,(parseFloat(it.qtyPcs)||0)-(parseFloat(it.dispatchedPcs)||0));
        const na=parseFloat(it.qtyNA)||0;
        slot.pcs+=pcs;slot.na+=na;
      });
    });
    // Top branches by combined metric
    const branchEntries=Object.entries(branchAgg).map(([b,v])=>({b,so:v.so,sto:v.sto,total:v.so[metricKey]+v.sto[metricKey]})).sort((a,b)=>b.total-a.total).slice(0,10);
    if(branchEntries.length){
      const labels=branchEntries.map(e=>e.b);
      const soData=branchEntries.map(e=>metricKey==='na'?Math.round(e.so.na*100)/100:Math.round(e.so.pcs));
      const stoData=branchEntries.map(e=>metricKey==='na'?Math.round(e.sto.na*100)/100:Math.round(e.sto.pcs));
      new Chart(cBranch,{
        type:'bar',
        data:{labels,datasets:[
          {label:'Sale Order (SO)',data:soData,backgroundColor:'#16A34A',borderRadius:5,barPercentage:.8,categoryPercentage:.85},
          {label:'Stock Transfer (STO)',data:stoData,backgroundColor:'#7C3AED',borderRadius:5,barPercentage:.8,categoryPercentage:.85}
        ]},
        options:{
          responsive:true,maintainAspectRatio:false,indexAxis:'y',
          plugins:{
            legend:{position:'top',align:'end',labels:{color:chartText,font:{size:11,family:'DM Sans',weight:600},boxWidth:14,padding:8}},
            tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.x.toLocaleString()} ${metricLabel}`}}
          },
          scales:{
            x:{beginAtZero:true,ticks:{color:chartText,font:{size:10,family:'DM Sans'},callback:fmtNum},grid:{color:chartGrid},title:{display:true,text:metricLabel,color:chartText,font:{size:10,family:'DM Sans',weight:600}}},
            y:{ticks:{color:chartText,font:{size:11,family:'DM Sans',weight:500}},grid:{display:false}}
          }
        }
      });
    }
  }

  // ── DISPATCH TREND BY SEGMENT (last 30 days, stacked area) ──
  const cDispSeg=document.getElementById('cDispSeg');
  if(cDispSeg){
    const today=new Date(TD);const days=[];for(let i=29;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10));}
    // Top segments overall to limit chart series — also respect DASH_LOC for trend
    const closedFilt = DASH_LOC==='plant' ? D.closed.filter(c=>c.sourceType==='Plant') : DASH_LOC==='vendor' ? D.closed.filter(c=>c.sourceType==='Vendor') : D.closed;
    const segTotals={};closedFilt.forEach(o=>{(o.items||[]).forEach(it=>{const s=(it.segment||'').trim()||'Unclassified';segTotals[s]=(segTotals[s]||0)+(parseFloat(it.qtyPcs)||0);});});
    const topSegs=Object.entries(segTotals).sort((a,b)=>b[1]-a[1]).slice(0,5).map(x=>x[0]);
    const series={};topSegs.forEach(s=>{series[s]=days.map(()=>0);});
    closedFilt.forEach(o=>{const dt=(o.dispatchDate||'').slice(0,10);const idx=days.indexOf(dt);if(idx<0)return;(o.items||[]).forEach(it=>{const s=(it.segment||'').trim()||'Unclassified';if(!series[s])return;series[s][idx]+=(parseFloat(it.qtyPcs)||0);});});
    const datasets=topSegs.map((s,i)=>({label:s,data:series[s],backgroundColor:palette[i]+'CC',borderColor:palette[i],borderWidth:1.5,fill:true,tension:0.3,pointRadius:0}));
    if(datasets.length)new Chart(cDispSeg,{type:'line',data:{labels:days.map(d=>d.slice(5)),datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{color:chartText,font:{size:10,family:'DM Sans'},boxWidth:12}}},scales:{x:{stacked:true,ticks:{color:chartText,font:{size:9,family:'DM Sans'},maxRotation:0,autoSkip:true,maxTicksLimit:10},grid:{color:chartGrid}},y:{stacked:true,ticks:{color:chartText,font:{size:10,family:'DM Sans'}},grid:{color:chartGrid}}}}});
  }
}
function renderOC(){
  const chartText='#6B7280',chartGrid='#E5E7EB';
  const ft=VM;
  const filtered=ft==='plant'?D.closed.filter(o=>o.sourceType==='Plant'):ft==='vendor'?D.closed.filter(o=>o.sourceType==='Vendor'):D.closed;
  const byD={};filtered.forEach(o=>{const d=o.destination||'?';if(!byD[d])byD[d]={sum:0,ct:0};const sc=calcOTIFscore(o.committedDate,o.dispatchDate);if(sc!=null){byD[d].sum+=sc;byD[d].ct++}});
  const ls=Object.keys(byD),vs=Object.values(byD).map(v=>v.ct?(v.sum/v.ct):0),ce=document.getElementById('cOTIF');
  const colors=vs.map(v=>v>=0.85?'#16A34A':v>=0?'#F59E0B':'#DC2626');
  if(ce&&ls.length)new Chart(ce,{type:'bar',data:{labels:ls.map(l=>l.replace(' WH','')),datasets:[{label:'Avg OTIF Score',data:vs.map(v=>Math.round(v*100)/100),backgroundColor:colors,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:chartText,font:{size:11,family:'DM Sans'}},grid:{color:chartGrid}},y:{ticks:{color:chartText,font:{size:10,family:'DM Sans'}},grid:{color:chartGrid}}}}});
}
function renderLTC(){
  const chartText='#6B7280',chartGrid='#E5E7EB';
  const ft=VM;
  const filtered=ft==='plant'?D.closed.filter(o=>o.sourceType==='Plant'):ft==='vendor'?D.closed.filter(o=>o.sourceType==='Vendor'):D.closed;
  const leads=filtered.map(o=>o.totalLeadDays).filter(d=>d!=null);
  const buckets={'0-7':0,'8-14':0,'15-21':0,'22-30':0,'30+':0};
  leads.forEach(d=>{if(d<=7)buckets['0-7']++;else if(d<=14)buckets['8-14']++;else if(d<=21)buckets['15-21']++;else if(d<=30)buckets['22-30']++;else buckets['30+']++});
  const cd=document.getElementById('cLTD');
  if(cd)new Chart(cd,{type:'bar',data:{labels:Object.keys(buckets).map(k=>k+' days'),datasets:[{data:Object.values(buckets),backgroundColor:['#16A34A','#2563EB','#F59E0B','#F97316','#DC2626'],borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:chartText,font:{size:11,family:'DM Sans'}},grid:{color:chartGrid}},y:{ticks:{color:chartText,font:{size:11,family:'DM Sans'}},grid:{color:chartGrid}}}}});
  const byD={};filtered.forEach(o=>{const d=o.destination||'?';if(!byD[d])byD[d]={sum:0,ct:0};if(o.totalLeadDays!=null){byD[d].sum+=o.totalLeadDays;byD[d].ct++}});
  const destLabels=Object.keys(byD).map(d=>d.replace(' WH',''));
  const destVals=Object.values(byD).map(v=>v.ct?Math.round(v.sum/v.ct):0);
  const cb=document.getElementById('cLTB');
  if(cb&&destLabels.length)new Chart(cb,{type:'bar',data:{labels:destLabels,datasets:[{label:'Avg Lead Time (days)',data:destVals,backgroundColor:'#F59E0B',borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:chartText,font:{size:11,family:'DM Sans'}},grid:{color:chartGrid}},y:{ticks:{color:chartText,font:{size:11,family:'DM Sans'}},grid:{color:chartGrid}}}}});
}
ld();
