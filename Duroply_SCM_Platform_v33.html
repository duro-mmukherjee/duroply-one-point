<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duroply — SCM Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══ DUROPLY SCM — Professional Analytics Theme ═══ */
:root{--bg:#F5F7FA;--sf:#FFFFFF;--sf2:#F9FAFB;--bd:#D1D5DB;--bdl:#9CA3AF;--tx:#1F2937;--mu:#6B7280;--dm:#9CA3AF;--ac:#D32F2F;--acl:#B71C1C;--bl:#D32F2F;--gn:#16A34A;--rd:#DC2626;--or:#F59E0B;--pu:#7C3AED;--tl:#0891B2}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.6;letter-spacing:.01em;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:#C1C7D0;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#A0A8B4}::-webkit-scrollbar-track{background:transparent}

/* ═══ LOGIN — Image Background + Glassmorphism ═══ */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#E8ECF2}
.login-bg{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;filter:blur(1.5px)}
.login-bg-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(135deg,rgba(255,255,255,.72) 0%,rgba(255,255,255,.55) 50%,rgba(255,255,255,.4) 100%)}

/* ── Glassmorphism Card ── */
.login-card{position:relative;z-index:10;width:420px;max-width:90vw;
  background:rgba(255,255,255,.25);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.5);border-radius:20px;padding:40px 36px;
  box-shadow:0 8px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.7);
  animation:loginIn .7s ease-out}
@keyframes loginIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.login-card-logo{text-align:center;margin-bottom:8px}
.login-card-logo img{height:80px;width:auto;object-fit:contain;}
.login-card-title{font-size:17px;font-weight:800;color:#1F2937;text-align:center;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.login-card-title span{display:block;font-size:11px;font-weight:400;color:#6B7280;letter-spacing:0;text-transform:none;margin-top:5px}

/* ── Form Fields ── */
.l-field{margin-bottom:16px;position:relative}
.l-field label{display:none}
.l-field .field-wrap{position:relative;display:flex;align-items:center}
.l-field .field-icon{position:absolute;left:14px;color:#6B7280;pointer-events:none;z-index:1}
.l-field .field-icon svg{width:18px;height:18px;stroke-width:1.8}
.l-field input{width:100%;background:rgba(255,255,255,.55);border:1px solid rgba(209,213,219,.7);border-radius:12px;padding:13px 14px 13px 44px;color:#1F2937;font-size:14px;outline:none;font-family:'DM Sans',sans-serif;transition:.25s;backdrop-filter:blur(6px)}
.l-field input::placeholder{color:#9CA3AF}
.l-field input:focus{border-color:#D32F2F;box-shadow:0 0 0 3px rgba(211,47,47,.12);background:rgba(255,255,255,.8)}
.pw-toggle{position:absolute;right:12px;cursor:pointer;color:#9CA3AF;padding:4px;border-radius:4px;transition:.15s;background:none;border:none;display:flex;align-items:center}
.pw-toggle:hover{color:#4B5563}

/* ── Login Button ── */
.login-btn{width:100%;padding:14px;border-radius:25px;border:none;background:linear-gradient(90deg,#D32F2F,#EF5350);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'DM Sans',sans-serif;transition:.3s;letter-spacing:.8px;text-transform:uppercase;box-shadow:0 4px 16px rgba(211,47,47,.35)}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(211,47,47,.45);background:linear-gradient(90deg,#C62828,#E53935)}
.login-btn:active{transform:translateY(0)}

.login-err{color:#DC2626;font-size:12px;margin-top:10px;display:none;text-align:center}
.login-forgot{text-align:center;margin-top:14px}
.login-forgot a{color:#4B5563;font-size:12px;font-weight:500;text-decoration:none;cursor:pointer;transition:.2s}
.login-forgot a:hover{color:#D32F2F}
.login-tagline{text-align:center;margin-top:22px;padding-top:18px;border-top:1px solid rgba(209,213,219,.4);font-size:13px;color:#374151;font-weight:600;line-height:1.6;font-style:italic}
.login-hint{font-size:10px;color:#6B7280;margin-top:14px;line-height:1.6;padding:10px;background:rgba(255,255,255,.35);border-radius:10px;border:1px solid rgba(229,231,235,.4);text-align:center;backdrop-filter:blur(4px)}

@media(max-width:768px){
  .login-bg-overlay{background:rgba(255,255,255,.75)}
  .login-card{max-width:92vw;padding:32px 28px}
}

/* ═══ HEADER — Light top bar (Image 2 style) ═══ */
.header{background:#FFFFFF;border-bottom:1px solid #E5E7EB;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.logo{display:flex;align-items:center;gap:10px}.logo img{height:56px;width:auto;object-fit:contain;}
.logo h1{font-size:15px;font-weight:700;color:#1F2937}.logo p{font-size:9px;color:#9CA3AF;letter-spacing:1px;text-transform:uppercase}
.hdr-r{display:flex;align-items:center;gap:12px}
.user-badge{display:flex;align-items:center;gap:8px;background:#F3F4F6;border:1px solid #E5E7EB;border-radius:8px;padding:5px 12px 5px 8px}
.user-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.search{position:relative}.search input{background:#F3F4F6;border:1px solid #E5E7EB;border-radius:6px;padding:7px 12px 7px 32px;color:#1F2937;font-size:13px;width:220px;outline:none;font-family:'DM Sans',sans-serif;transition:.2s}
.search input::placeholder{color:#9CA3AF}
.search input:focus{border-color:#D32F2F;box-shadow:0 0 0 3px rgba(211,47,47,.08);background:#fff}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9CA3AF}

/* ═══ LAYOUT ═══ */
.app{display:none;flex-direction:column;min-height:100vh}
.layout{display:flex;flex:1;overflow:hidden}

/* ── Dark Sidebar (Image 2 style) ── */
nav{width:210px;min-width:210px;background:linear-gradient(180deg,#1E293B 0%,#0F172A 100%);padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-sec{font-size:9px;color:#64748B;text-transform:uppercase;letter-spacing:1.2px;padding:12px 12px 4px;margin-top:4px;font-weight:600}
.nav-btn{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;text-align:left;width:100%;transition:.15s;background:transparent;color:#94A3B8}
.nav-btn:hover{background:rgba(255,255,255,.06);color:#E2E8F0}
.nav-btn.on{background:rgba(211,47,47,.15);color:#fff;font-weight:600;border-left:3px solid #D32F2F}
.nav-btn svg{opacity:.5;flex-shrink:0;stroke:#94A3B8}.nav-btn.on svg{opacity:1;stroke:#EF5350}
.nav-btn .ct{margin-left:auto;background:#DC2626;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px}
.nav-btn .ct2{margin-left:auto;color:#64748B;font-size:10px;font-weight:600}
main{flex:1;overflow:auto;padding:20px 28px;background:#F5F7FA}.main-in{max-width:1340px}
.sec-title{font-size:18px;font-weight:700;color:#1F2937;letter-spacing:-.3px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}

/* ═══ KPI CARDS ═══ */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:16px;margin-bottom:22px}
.kpi{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:16px 18px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.kpi:hover{border-color:#D1D5DB;transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.06)}
.kpi .bar{position:absolute;top:0;left:0;right:0;height:3px}.kpi .lbl{font-size:11px;color:#6B7280;font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:8px}
.kpi .val{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;color:#1F2937}.kpi .sub{font-size:11px;color:#9CA3AF;margin-top:5px}

/* ═══ CARDS ═══ */
.card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;overflow:hidden;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-h{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid #E5E7EB;flex-wrap:wrap;gap:8px;background:#FAFBFC}.card-h h3{margin:0;font-size:14px;font-weight:600;color:#1F2937}
.card-b{padding:16px 20px}

/* ═══ TABLES — Optimized for readability ═══ */
.tbl-wrap{overflow-x:auto;overflow-y:auto;max-height:420px;border-radius:8px;border:1px solid #D1D5DB}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
th{position:sticky;top:0;z-index:2;background:#1F2937;padding:10px 12px;text-align:left;color:#F9FAFB;font-weight:600;font-size:11px;letter-spacing:.4px;text-transform:uppercase;border-bottom:2px solid #1F2937;white-space:nowrap}
td{padding:9px 12px;white-space:nowrap;border-bottom:1px solid #E5E7EB;color:#1F2937}.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
tr:hover td{background:#F0F4FF}
tr:nth-child(even) td{background:#FAFBFC}
.bdg{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.2px;white-space:nowrap}
.st-sel{background:#F9FAFB;border:1px solid #D1D5DB;border-radius:5px;padding:4px 8px;color:#1F2937;font-size:12px;font-weight:500;cursor:pointer;outline:none;max-width:150px}
.act-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:5px;border:none;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s}

/* ═══ FILTERS ═══ */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.fsel{appearance:none;background:#fff;border:1px solid #D1D5DB;border-radius:6px;padding:7px 26px 7px 10px;color:#1F2937;font-size:12px;font-weight:500;cursor:pointer;outline:none;min-width:120px;background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236B7280' stroke-width='1.5'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center;transition:.2s}
.fsel:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.fsel option{background:#fff;color:#1F2937}

/* ═══ TABS & BUTTONS ═══ */
.tab-bar{display:flex;gap:2px;background:#F3F4F6;border:1px solid #E5E7EB;border-radius:6px;padding:3px}.tab-b{padding:6px 14px;border-radius:4px;border:none;cursor:pointer;font-size:12px;font-weight:500;background:transparent;color:#6B7280;transition:.15s}.tab-b:hover{color:#1F2937}.tab-b.on{background:#D32F2F;color:#fff;box-shadow:0 1px 3px rgba(211,47,47,.2)}
.btn-ac{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;border:none;background:#D32F2F;color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}.btn-ac:hover{background:#B71C1C}
.btn-out{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;border:1px solid #D1D5DB;background:#fff;color:#4B5563;font-size:12px;font-weight:500;cursor:pointer;transition:.15s}.btn-out:hover{background:#F9FAFB;border-color:#9CA3AF}
.btn-gn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;border:none;background:#16A34A;color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.btn-rd{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;border:none;background:#DC2626;color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.clr-btn{display:inline-flex;padding:6px 12px;border-radius:6px;border:1px solid #D1D5DB;background:#fff;color:#6B7280;font-size:11px;font-weight:500;cursor:pointer;transition:.15s}.clr-btn:hover{background:#F3F4F6}
.empty{padding:48px;text-align:center;color:#9CA3AF;font-size:14px}

/* ═══ CHARTS ═══ */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}.chart-c{position:relative;height:240px}

/* ═══ INFO BOX & ALERTS ═══ */
.cd-cell{color:#1D4ED8;font-weight:600}
.info-box{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:10px 16px;font-size:12px;color:#1E40AF;margin-bottom:16px;line-height:1.5}.info-box b{color:#1D4ED8}

/* ═══ MODALS ═══ */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;justify-content:center;align-items:center;backdrop-filter:blur(3px)}.modal-ov.show{display:flex}
.modal{background:#fff;border:1px solid #E5E7EB;border-radius:14px;width:540px;max-width:92vw;max-height:85vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.12)}
.modal-h{padding:18px 22px;border-bottom:1px solid #E5E7EB;display:flex;justify-content:space-between;align-items:center;background:#FAFBFC}.modal-h h3{margin:0;font-size:15px;font-weight:600;color:#1F2937}
.modal-x{background:none;border:none;color:#6B7280;font-size:22px;cursor:pointer;padding:4px 8px;border-radius:4px;transition:.15s}.modal-x:hover{background:#F3F4F6}
.modal-b{padding:22px}.m-lbl{font-size:12px;color:#4B5563;font-weight:600;display:block;margin-bottom:14px}
.m-inp{width:100%;background:#F9FAFB;border:1px solid #D1D5DB;border-radius:6px;padding:9px 12px;color:#1F2937;font-size:13px;outline:none;margin-top:4px;font-family:'DM Sans',sans-serif;transition:.2s}
.m-inp:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.m-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.m-info{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:14px;margin-bottom:18px;font-size:13px;color:#374151}
.drop-z{border:2px dashed #D1D5DB;border-radius:10px;padding:32px;text-align:center;cursor:pointer;transition:.2s;color:#6B7280}.drop-z:hover{border-color:#2563EB;background:rgba(37,99,235,.03);color:#2563EB}
.m-btn{width:100%;margin-top:12px;padding:11px;border-radius:8px;border:none;font-weight:600;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.15s}

/* ═══ PASSWORD INPUT + STRENGTH METER ═══ */
.pw-input-wrap{position:relative;display:block}
.pw-input-wrap input.m-inp{padding-right:38px}
.pw-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:transparent;border:none;cursor:pointer;font-size:14px;padding:4px 6px;border-radius:4px;color:#6B7280;transition:.15s;line-height:1}
.pw-toggle:hover{background:#F3F4F6;color:#1F2937}
.pw-strength{margin-top:8px;padding:10px;border-radius:6px;background:#F9FAFB;border:1px solid #E5E7EB}
.pw-strength-bar{height:6px;background:#E5E7EB;border-radius:3px;overflow:hidden;margin-bottom:6px}
.pw-strength-fill{height:100%;border-radius:3px;transition:width .25s,background .25s}
.pw-strength-label{font-size:11px;font-weight:700;margin-bottom:6px;letter-spacing:.4px}
.pw-strength-checks{list-style:none;margin:0;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:3px 12px}
.pw-strength-checks li{font-size:11px;line-height:1.5}
.pw-strength-checks li.ok{color:#16A34A}
.pw-strength-checks li.bad{color:#9CA3AF}
.pw-strength-checks li.bad.opt{color:#9CA3AF}

/* ═══ USER MENU DROPDOWN ═══ */
.user-menu-wrap{position:relative}
.user-menu{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid #E5E7EB;border-radius:8px;min-width:180px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:60;overflow:hidden}
.user-menu-item{display:block;width:100%;text-align:left;padding:9px 14px;border:none;background:transparent;font-size:13px;color:#1F2937;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.1s}
.user-menu-item:hover{background:#F3F4F6}
.user-menu-item.danger{color:#DC2626}
.user-menu-item.danger:hover{background:#FEF2F2}
.user-menu-divider{height:1px;background:#E5E7EB}

/* ═══ MULTI-SELECT SEARCHABLE PICKER ═══ */
.msel-wrap{position:relative;display:inline-block}
.msel-btn{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid #D1D5DB;border-radius:6px;padding:6px 10px;color:#1F2937;font-size:12px;font-weight:500;cursor:pointer;outline:none;min-width:160px;max-width:280px;transition:.15s;font-family:'DM Sans',sans-serif}
.msel-btn:hover{border-color:#9CA3AF}
.msel-btn.active{border-color:#2563EB;background:#EFF6FF;color:#1D4ED8}
.msel-btn-label{flex:1;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msel-btn-count{background:#2563EB;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:2px}
.msel-dd{position:absolute;top:calc(100% + 4px);left:0;z-index:60;background:#fff;border:1px solid #D1D5DB;border-radius:8px;width:340px;max-width:95vw;box-shadow:0 8px 24px rgba(0,0,0,.12);overflow:hidden}
.msel-search-wrap{padding:8px;border-bottom:1px solid #E5E7EB;background:#F9FAFB;position:relative}
.msel-search{width:100%;background:#fff;border:1px solid #D1D5DB;border-radius:6px;padding:7px 10px 7px 30px;color:#1F2937;font-size:12px;outline:none;font-family:'DM Sans',sans-serif}
.msel-search:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.msel-search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:#9CA3AF;pointer-events:none}
.msel-toolbar{display:flex;justify-content:space-between;padding:5px 8px;border-bottom:1px solid #E5E7EB;background:#F9FAFB;font-size:11px}
.msel-toolbar button{background:none;border:none;color:#2563EB;cursor:pointer;font-size:11px;font-weight:600;padding:2px 6px;border-radius:3px;font-family:'DM Sans',sans-serif}
.msel-toolbar button:hover{background:#EFF6FF}
.msel-list{max-height:280px;overflow-y:auto}
.msel-item{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;cursor:pointer;transition:.1s;border-bottom:1px solid #F3F4F6;font-size:12px}
.msel-item:hover{background:#F9FAFB}
.msel-item input[type=checkbox]{margin-top:2px;cursor:pointer;flex-shrink:0;accent-color:#2563EB}
.msel-item-content{flex:1;min-width:0}
.msel-desc{color:#1F2937;font-weight:500;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msel-code{color:#6B7280;font-size:10px;font-family:'JetBrains Mono',monospace;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msel-foot{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-top:1px solid #E5E7EB;background:#F9FAFB;font-size:11px;color:#6B7280}
.msel-foot button{background:#fff;border:1px solid #D1D5DB;border-radius:5px;padding:4px 10px;color:#4B5563;font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.msel-foot button:hover{background:#F3F4F6}
.msel-empty{padding:24px;text-align:center;color:#9CA3AF;font-size:12px}
.msel-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;max-width:280px}
.msel-chip{display:inline-flex;align-items:center;gap:4px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:4px;padding:2px 4px 2px 8px;font-size:10px;color:#1D4ED8;font-weight:500;max-width:160px}
.msel-chip-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msel-chip-x{cursor:pointer;color:#1D4ED8;font-size:13px;line-height:1;padding:0 3px;border-radius:2px}
.msel-chip-x:hover{background:#BFDBFE}

/* ═══ PERMISSION MATRIX ═══ */
.pm-container{border:1px solid #E5E7EB;border-radius:8px;overflow:hidden;margin-bottom:16px;background:#fff}
.pm-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#F9FAFB;border-bottom:1px solid #E5E7EB;font-size:12px;font-weight:600;color:#374151}
.pm-table{width:100%;border-collapse:collapse;font-size:11px}
.pm-table th{background:#F3F4F6;padding:7px 6px;text-align:center;font-weight:600;color:#374151;border-bottom:1px solid #E5E7EB;font-size:10px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.pm-table th.pm-mod{text-align:left;padding-left:12px;min-width:160px}
.pm-table td{padding:5px 6px;text-align:center;border-bottom:1px solid #F3F4F6}
.pm-table td.pm-mod{text-align:left;padding-left:12px;font-weight:500;color:#1F2937;font-size:12px}
.pm-table tr:hover td{background:#F9FAFB}
.pm-table input[type=checkbox]{cursor:pointer;accent-color:#2563EB;width:14px;height:14px}
.pm-mod-section{background:#FAFBFC;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#6B7280;padding:5px 12px !important;border-top:1px solid #E5E7EB}
.pm-restricted{background:rgba(254,226,226,.35)}
.pm-restricted:hover td{background:rgba(254,226,226,.6) !important}
.pm-restricted td.pm-mod{color:#991B1B !important}
.pm-tpl-row{display:flex;gap:8px;align-items:center;padding:8px 14px;background:#EFF6FF;border-bottom:1px solid #BFDBFE;font-size:12px}
.pm-perm-badge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:3px;font-size:9px;font-weight:700;color:#fff}
.dept-card{border:1px solid #E5E7EB;border-radius:8px;padding:14px;background:#fff;transition:.15s;display:flex;flex-direction:column;gap:8px}
.dept-card:hover{border-color:#2563EB;box-shadow:0 2px 8px rgba(37,99,235,.08)}
.dept-card.disabled{opacity:.5;background:#F9FAFB}
.dept-card-h{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.dept-card-name{font-weight:700;font-size:14px;color:#1F2937}
.dept-card-code{font-family:'JetBrains Mono',monospace;font-size:10px;color:#6B7280;background:#F3F4F6;padding:1px 6px;border-radius:3px;display:inline-block;margin-top:2px}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:24px;right:24px;background:#16A34A;color:#fff;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.15);display:none;max-width:420px}
.toast.show{display:block;animation:fadeIn .3s}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ═══ PW REQUESTS ═══ */
.pw-req{background:#F5F3FF;border:1px solid #DDD6FE;border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}

/* ═══ DISPATCH CALENDAR ═══ */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px}
.cal-hdr{text-align:center;font-size:11px;font-weight:600;color:#6B7280;padding:8px 0;text-transform:uppercase;letter-spacing:.5px}
.cal-cell{background:#fff;border:1px solid #E5E7EB;border-radius:8px;min-height:76px;padding:8px 10px;cursor:pointer;transition:.15s;font-size:11px;position:relative}
.cal-cell:hover{border-color:#D1D5DB;background:#F9FAFB}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default}
.cal-cell.today{border-color:#2563EB;box-shadow:0 0 0 1px #2563EB}
.cal-cell .day{font-weight:700;font-size:12px;color:#1F2937;margin-bottom:5px}
.cal-cell .na-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#1D4ED8}
.cal-cell .ord-ct{font-size:10px;color:#9CA3AF;margin-top:3px}
.cal-cell.cap-green{border-color:#16A34A;background:#DCFCE7}
.cal-cell.cap-yellow{border-color:#F59E0B;background:#FEF9C3}
.cal-cell.cap-red{border-color:#DC2626;background:#FEE2E2}
.cal-cell.cap-red .na-val{color:#DC2626}
.cap-bar{height:5px;border-radius:3px;background:#E5E7EB;margin-top:5px;overflow:hidden}
.cap-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.cal-nav{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.cal-nav button{background:#fff;border:1px solid #D1D5DB;border-radius:6px;padding:6px 14px;color:#4B5563;font-size:12px;cursor:pointer;transition:.15s}.cal-nav button:hover{background:#F9FAFB}
.cal-nav h3{font-size:16px;font-weight:700;min-width:180px;text-align:center;color:#1F2937}

/* ═══ SORTABLE TABLE HEADERS ═══ */
th.sortable{cursor:pointer;user-select:none;transition:.15s}
th.sortable:hover{color:#93C5FD;background:#374151}
th.sortable::after{content:'';margin-left:4px;opacity:.3}
th.sort-asc::after{content:'▲';opacity:1;font-size:9px;color:#93C5FD}
th.sort-desc::after{content:'▼';opacity:1;font-size:9px;color:#93C5FD}

/* ═══ ORDER TRACKING TIMELINE ═══ */
.trk-search{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.trk-search input{flex:1;min-width:200px;background:#fff;border:1px solid #D1D5DB;border-radius:8px;padding:10px 16px;color:#1F2937;font-size:14px;outline:none;font-family:'DM Sans',sans-serif;transition:.2s}
.trk-search input:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.trk-search button{padding:10px 24px;border-radius:8px;border:none;background:#2563EB;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}.trk-search button:hover{background:#1D4ED8}
.trk-card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:24px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.trk-hdr{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #E5E7EB}
.trk-hdr h2{font-size:18px;font-weight:700;color:#1F2937;margin:0}.trk-hdr .trk-no{font-family:'JetBrains Mono',monospace;color:#2563EB}
.trk-alert{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600}
.trk-alert.on-track{background:#DCFCE7;color:#166534}.trk-alert.delayed{background:#FEE2E2;color:#991B1B}.trk-alert.partial{background:#FEF3C7;color:#92400E}
.trk-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:24px}
.trk-meta-item{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:12px 14px}
.trk-meta-item .label{font-size:10px;color:#6B7280;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.trk-meta-item .value{font-size:15px;font-weight:700;color:#1F2937;font-family:'JetBrains Mono',monospace}
.trk-meta-item .value.blue{color:#2563EB}.trk-meta-item .value.green{color:#16A34A}.trk-meta-item .value.red{color:#DC2626}.trk-meta-item .value.amber{color:#F59E0B}
.timeline{position:relative;padding:8px 0 8px 36px}
.timeline::before{content:'';position:absolute;left:15px;top:0;bottom:0;width:2px;background:#E5E7EB}
.tl-step{position:relative;padding:0 0 28px 24px;font-size:13px}
.tl-step:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-29px;top:2px;width:20px;height:20px;border-radius:50%;border:2px solid #D1D5DB;background:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;z-index:1}
.tl-step.done .tl-dot{background:#16A34A;border-color:#16A34A;color:#fff}
.tl-step.active .tl-dot{background:#2563EB;border-color:#2563EB;color:#fff;box-shadow:0 0 0 4px rgba(37,99,235,.2)}
.tl-step.pending .tl-dot{background:#F9FAFB;border-color:#D1D5DB;color:#9CA3AF}
.tl-title{font-weight:600;color:#1F2937;margin-bottom:3px;display:flex;align-items:center;gap:8px}
.tl-step.active .tl-title{color:#2563EB;font-weight:700}
.tl-step.pending .tl-title{color:#9CA3AF}
.tl-detail{font-size:12px;color:#6B7280;line-height:1.5}
.tl-step.active .tl-detail{color:#4B5563}
.tl-tag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:600;margin-left:4px}
.ship-card{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:14px;margin-top:12px;margin-bottom:8px}
.ship-card h4{font-size:13px;font-weight:600;color:#374151;margin:0 0 8px}
.trk-results{margin-top:12px}
.trk-result-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#fff;border:1px solid #E5E7EB;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:.15s}
.trk-result-item:hover{border-color:#2563EB;background:#EFF6FF}

/* ═══ RESPONSIVE ═══ */
nav::-webkit-scrollbar-thumb{background:#334155}nav::-webkit-scrollbar-track{background:transparent}
@media(max-width:900px){nav{display:none}.chart-grid{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}.cal-grid{grid-template-columns:repeat(4,1fr)}main{padding:14px 16px}.trk-meta{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

<script>
// ══════════ CONFIG ══════════
const SK='duroply_v8';const TD=new Date().toISOString().slice(0,10);
const DEPTS=['SCM Team','Sales Team','PPC Team','Rajkot Plant','Dispatch Team','Warehouse Team'];
const DEPT_ROLES={'SCM Team':'scm','Sales Team':'sales','PPC Team':'ppc','Rajkot Plant':'plant','Dispatch Team':'dispatch','Warehouse Team':'warehouse'};

// ══════════ RBAC — MODULE REGISTRY, PERMISSIONS, TEMPLATES ══════════
// Permission letter codes (concatenated, e.g. 'VCEDA' = View+Create+Edit+Delete+Approve):

//   C = Create        — add new records
//   E = Edit          — change existing records
//   D = Delete        — remove records (soft or hard)
//   A = Approve       — sign off on workflows / cancel / undo
//   X = Export        — download data (CSV / Excel)
const PERM_DEFS={V:{l:'View',c:'#2563EB'},C:{l:'Create',c:'#16A34A'},E:{l:'Edit',c:'#F59E0B'},D:{l:'Delete',c:'#DC2626'},A:{l:'Approve',c:'#7C3AED'},X:{l:'Export',c:'#0891B2'}};
const PERM_ORDER=['V','C','E','D','A','X'];
const MODULE_REGISTRY={
  dashboard:    {l:'Dashboard',           ic:'📊', sec:'Main',          p:['V','X']},
  plantOrders:  {l:'Plant Orders',        ic:'🏭', sec:'Order Flow',    p:['V','C','E','D','A','X']},
  vendorOrders: {l:'Vendor Orders',       ic:'📦', sec:'Order Flow',    p:['V','C','E','D','A','X'], restricted:true, restrictedNote:'Restricted — SCM & Management only'},
  ppcModule:    {l:'PPC Module',          ic:'⚙️', sec:'Order Flow',    p:['V','E','A','X']},
  transit:      {l:'In Transit',          ic:'🚛', sec:'Tracking',      p:['V','E','X']},
  trackOrder:   {l:'Track Order',         ic:'🔍', sec:'Tracking',      p:['V']},
  dispCalendar: {l:'Dispatch Schedule',   ic:'📅', sec:'Tracking',      p:['V','E','X']},
  truckClub:    {l:'Truck Clubbing',      ic:'🚚', sec:'Tracking',      p:['V','C','E','D','A','X']},
  otif:         {l:'OTIF Analytics',      ic:'📈', sec:'Analytics',     p:['V','X']},
  leadTime:     {l:'Lead Time',           ic:'⏱️', sec:'Analytics',     p:['V','X']},
  closed:       {l:'Delivered Log',       ic:'✅', sec:'Analytics',     p:['V','X']},
  logs:         {l:'Audit Logs',          ic:'📋', sec:'Administration',p:['V','X']},
  dataAdmin:    {l:'Data Management',     ic:'🛡️', sec:'Administration',p:['V','D','A']},
  capacity:     {l:'Capacity',            ic:'🏗️', sec:'Administration',p:['V','E']},
  masters:      {l:'Master Data',         ic:'📚', sec:'Administration',p:['V','C','E','D','X']},
  departments:  {l:'Departments',         ic:'🏢', sec:'Administration',p:['V','C','E','D','X']},
  users:        {l:'Users',               ic:'👥', sec:'Administration',p:['V','C','E','D','X','A']}
};
const APPROVAL_ACTIONS=[
  {k:'cancel-orders',     l:'Cancel Orders',                   desc:'Soft-close an order via the cancellation modal'},
  {k:'delete-orders',     l:'Delete Orders (Single)',          desc:'Permanently delete a single order'},
  {k:'bulk-delete',       l:'Bulk Delete by Date Range',       desc:'Mass-delete orders within a date window'},

// no department other than these gets a pre-built template that includes Vendor access.
const DEFAULT_DEPARTMENTS=[

// ══════════ PERMISSION HELPERS ══════════
function can(mod,perm='V'){
  if(!CU)return false;
  if(CU.id==='ADMIN')return true;// Master admin always bypasses
  // If the user record has a `permissions` field AT ALL, it's AUTHORITATIVE.
  // Even an empty {} means the admin deliberately ticked nothing — that's "no access to anything",
  // not "fall back to legacy". Only users created before explicit RBAC existed (no `permissions` field)
  // fall through to the legacy role-based ACCESS map below.
  if(CU.permissions!==undefined&&CU.permissions!==null){
    const p=CU.permissions[mod];
    return!!p&&p.includes(perm);
  }
  // Legacy fallback — only for older users that never had permissions configured
  if(CU.role==='scm')return true;
  if(perm==='V')return ACCESS[CU.role]?.includes(mod);
  return false;
}
function canApprove(action){
  if(!CU)return false;
  if(CU.id==='ADMIN')return true;
  // Explicit permissions present → approvals array is authoritative (no SCM-role bypass)
  if(CU.permissions!==undefined&&CU.permissions!==null){
    return Array.isArray(CU.approvals)&&CU.approvals.includes(action);
  }
  // Legacy users only: SCM role bypasses approval checks
  if(CU.role==='scm')return true;
  return Array.isArray(CU.approvals)&&CU.approvals.includes(action);
}

// ══════════ OTIF NEGATIVE & OTD LOGIC ══════════
function calcOTIFscore(committedDate,dispatchDate){
  // Returns OTIF score: 1=on-time, 0=grace, negative=late
  if(!committedDate||!dispatchDate)return null;
  const delay=daysDiff(committedDate,dispatchDate);
  if(delay==null)return null;
  if(delay<=0)return 1;// on time or early
  if(delay<=3)return 0;// grace period
  return Math.max(-1,-((delay-3)*0.25));// negative, capped at -1
}
function calcOTDscore(order,committedDate,dispatchDate){
  // OTD: if >=75% dispatched on time → 1, else same as OTIF negative
  if(!committedDate)return null;
  const totalPcs=orderFinalPcs(order);
  if(!totalPcs)return null;
  const dispPcs=orderDispPcs(order);
  const pctDisp=dispPcs/totalPcs;
  // Check if >=75% was dispatched on or before committed date
  if(pctDisp>=0.75&&dispatchDate){
    const delay=daysDiff(committedDate,dispatchDate);
    if(delay!=null&&delay<=0)return 1;
  }
  // Otherwise: apply negative OTIF policy
  if(!dispatchDate)return null;
  return calcOTIFscore(committedDate,dispatchDate);
}

// ══════════ AUTHENTICATION & PASSWORD UTILITIES ══════════
// Password hashing — SHA-256 via Web Crypto. Hashed passwords prevent casual inspection
// of localStorage from revealing user passwords. Note: client-side hashing is NOT a substitute
// for server-side authentication in real production — it's a meaningful improvement over plaintext
// for a localStorage-backed app, but determined attackers with browser access could still bypass it.
const PW_SALT='duroply-scm-2026-v32-salt';
async function hashPassword(plain){
  if(!plain)return'';
  try{
    const enc=new TextEncoder();const data=enc.encode(String(plain)+PW_SALT);
    const buf=await crypto.subtle.digest('SHA-256',data);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){
    // Fallback for environments without Web Crypto — simple FNV-1a hash; still better than plaintext
    let h=2166136261;const s=String(plain)+PW_SALT;
    for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}
    return 'fnv1a:'+(h>>>0).toString(16);
  }
}
// A hash is "long hex string" — 64 chars for SHA-256, or fnv1a: prefix
function isHashed(v){return typeof v==='string'&&(v.length===64&&/^[0-9a-f]+$/i.test(v)||v.startsWith('fnv1a:'))}

// Password strength: 7 individual checks, mapped to 4 strength levels
function checkPasswordStrength(pw){
  pw=String(pw||'');
  const checks={
    length8:pw.length>=8,
    length12:pw.length>=12,
    upper:/[A-Z]/.test(pw),
    lower:/[a-z]/.test(pw),
    digit:/\d/.test(pw),
    special:/[^A-Za-z0-9\s]/.test(pw),
    noSpaces:pw.length>0&&!/\s/.test(pw)
  };
  const score=Object.values(checks).filter(Boolean).length;
  const label=score<=2?'Weak':score<=4?'Fair':score<=5?'Good':'Strong';
  const color=score<=2?'#DC2626':score<=4?'#F59E0B':score<=5?'#2563EB':'#16A34A';
  const pct=Math.round((score/7)*100);
  return{score,label,color,pct,checks};
}
// Policy enforcement on save — minimum bar before allowing the password
const PW_POLICY={minLength:8,requireUpper:true,requireLower:true,requireDigit:true,requireSpecial:false,requireNoSpaces:true};
function passwordMeetsPolicy(pw){
  pw=String(pw||'');
  const errs=[];
  if(pw.length<PW_POLICY.minLength)errs.push(`At least ${PW_POLICY.minLength} characters`);
  if(PW_POLICY.requireUpper&&!/[A-Z]/.test(pw))errs.push('At least one uppercase letter (A-Z)');
  if(PW_POLICY.requireLower&&!/[a-z]/.test(pw))errs.push('At least one lowercase letter (a-z)');
  if(PW_POLICY.requireDigit&&!/\d/.test(pw))errs.push('At least one digit (0-9)');
  if(PW_POLICY.requireSpecial&&!/[^A-Za-z0-9\s]/.test(pw))errs.push('At least one special character (!@#$ etc.)');
  if(PW_POLICY.requireNoSpaces&&/\s/.test(pw))errs.push('No spaces allowed');
  return{ok:errs.length===0,errors:errs};
}

// Render a strength meter into a target div (called from oninput handlers)
function renderPwStrengthInto(targetId,pw){
  const target=document.getElementById(targetId);if(!target)return;
  if(!pw){target.style.display='none';return}
  target.style.display='block';
  const s=checkPasswordStrength(pw);
  const policy=passwordMeetsPolicy(pw);
  target.innerHTML=`
    <div class="pw-strength-bar"><div class="pw-strength-fill" style="width:${s.pct}%;background:${s.color}"></div></div>
    <div class="pw-strength-label" style="color:${s.color}">${s.label}</div>
    <ul class="pw-strength-checks">
      <li class="${s.checks.length8?'ok':'bad'}">${s.checks.length8?'✓':'○'} At least 8 characters</li>
      <li class="${s.checks.upper?'ok':'bad'}">${s.checks.upper?'✓':'○'} Uppercase letter</li>

}

  '001':'DUROPLY','002':'DURO PUMAPLY','003':'DURO MARINE','004':'DUROMAC','005':'DUROPLUS','006':'DURODERBY','007':'DUROFLEX','008':'DUROMICA','009':'DURO FIRESHIELD','010':'DUROBORD','011':'DUROMACBORD','012':'DUROTEAK','013':'DUROTEAKBORD','014':'DURODOOR','015':'DURODOOR LITES','016':'DUROFILM','017':'DURO PLATINUM','018':'DURO TECHPLY','019':'CROSSPLY','020':'CROSSBOARD','021':'CROSSDOOR','022':'DURO TUFFWOOD','023':'PUMAPLY CLUB','024':'DURODOOR PRIME','025':'DURO DYNAMO','026':'DURO TECHPLY PLATINUM','027':'DURO MACPRIME','028':'TOWER SOLITAIRE TEAK','029':'DURO TEAK PLATINUM ROYAL','030':'DURO PLUS','031':'DURO MACPLATINUM','032':'DUROFLEX TITANIUM','033':'BONDPLY','034':'DURO MASTERPIECE','035':'DURO FANTASTEAK','036':'DURO TITANIUM','037':'DURO FABPLY','038':'TOWER SOLITAIRE','039':'TOWER','040':'TOWER PLATINIUM','041':'TOWER HMR','042':'TOWER TECH','043':'DURO TITANIUM PLUS','044':'PROMA DOOR','045':'SAMPLE',"046":"DURO NATURE'S SIGNATURE",'047':'NS MASTERPIECE'
};
const T4_GRADE={'00':'','01':'GREEN','02':'BLACK','03':'RED','04':'BLUE','05':'CROSS','06':'GEM','07':'GOLD','08':'ELEGANCE','09':'ELEGANCE(TEAK)','10':'ELEGANCE(WALNUT)','12':'LITES','16':'LANDSCAPE','24':'BRONZE','27':'SILVER','28':'SHUFFLES','30':'SPECIALS','31':'BOHEMIA','32':'EDGE BEND','40':'MACPRIME','44':'MACPLATINUM'};

// Parse SAP-B1 structured item code → {source, segment, category, design, brand, grade, specie, thickness, length, width}
// Returns null if the code does not conform to the 26/22-char format, so caller can fallback to description parsing.
function parseItemCode(code){
  if(!code)return null;
  const c=String(code).trim().toUpperCase();
  if(c.length!==22 && c.length!==26)return null;
  // Source (1-2)
  const srcCode=c.substring(0,2);
  if(!T1_SOURCE[srcCode])return null;
  // Segment (3) — only valid keys
  const segCode=c.substring(2,3);
  if(!T2_SEGMENT[segCode])return null;
  // NTD has length 26 and segment 'N'; non-NTD has length 22 and any other segment
  const isNTD=(segCode==='N');
  if(isNTD && c.length!==26)return null;
  if(!isNTD && c.length!==22)return null;
  // Category (4)
  const catCode=c.substring(3,4);
  // Design (5-6)
  const dsgnCode=c.substring(4,6);
  // Brand (7-9)
  const brandCode=c.substring(6,9);
  // Grade (10-11)
  const gradeCode=c.substring(9,11);
  let specie='',thk='',sizeStr='';
  if(isNTD){
    specie=c.substring(11,15);     // 12-15
    thk=c.substring(15,18);        // 16-18
    sizeStr=c.substring(18,26);    // 19-26
  } else {
    thk=c.substring(11,14);        // 12-14
    sizeStr=c.substring(14,22);    // 15-22
  }
  // Decode thickness — Table 5: 3-char zero-padded mm with special handling for fractional values
  // Codes like "001","004","018" → 1mm, 4mm, 18mm. Fractional thicknesses (0.5, 1.5, 1.6, 3.2, 3.5, 3.6) stored literally.
  let thicknessMM;
  const thkNum=parseFloat(thk);
  if(isNaN(thkNum))thicknessMM='';
  else thicknessMM=String(thkNum)+'mm';
  // Decode size: 4 chars length + 4 chars width, in mm; display in meters (mm/1000)
  const lenMM=parseInt(sizeStr.substring(0,4),10);
  const widMM=parseInt(sizeStr.substring(4,8),10);
  const len=isNaN(lenMM)?'':(lenMM/1000).toFixed(4);
  const wid=isNaN(widMM)?'':(widMM/1000).toFixed(4);
  return{
    rawCode:c,
    source:T1_SOURCE[srcCode],sourceCode:srcCode,
    segment:T2_SEGMENT[segCode]||segCode,segmentCode:segCode,
    category:T2_CATEGORY[catCode]||'',categoryCode:catCode,
    design:T2_DESIGN[dsgnCode]??dsgnCode,designCode:dsgnCode,
    brand:T3_BRAND[brandCode]||('Brand '+brandCode),brandCode:brandCode,
    grade:T4_GRADE[gradeCode]??('Grade '+gradeCode),gradeCode:gradeCode,
    specie:specie||'',
    thickness:thicknessMM,
    length:len,width:wid,
    isNTD,
    valid:true
  };
}

// ══════════ DESCRIPTION FALLBACK PARSER (used when code doesn't conform) ══════════
// SAP-B1 description format observed in FG Item Master:
//   {Category} {Design or Segment} {Brand} {Grade} {Thickness}mm {L}x{W}
// e.g. "MR OSV PLYWOOD DURO NATURE'S SIGNATURE SHUFFLES 4mm 2.4300x1.2200"
//   → Category=MR, Design=OSV PLYWOOD, Segment=Plywood (derived), Brand=DURO NATURE'S SIGNATURE, Grade=SHUFFLES
// e.g. "BWP FLUSH DOOR DURO DOOR 35mm 2.0200x1.1000"
//   → Category=BWP, Design=(none), Segment=Flush Door (direct), Brand=DURO DOOR
//
// Design (Type 3) → Segment (Type 1) mapping per Table 2 of FG Item Master
const DESIGN_TO_SEGMENT={
  'OSV PLYWOOD':'Plywood','BSV PLYWOOD':'Plywood','FILM FACED':'Plywood','FILM FACE':'Plywood',
  'OSV BLOCKBOARD':'Blockboard','BSV BLOCKBOARD':'Blockboard',
  'OSV FLUSHDOOR':'Flush Door','BSV FLUSHDOOR':'Flush Door','OSL FLUSHDOOR':'Flush Door','BSL FLUSHDOOR':'Flush Door','POP FLUSHDOOR':'Flush Door',
  'OS SKIN':'Flush Door','BS SKIN':'Flush Door',
  'DECORATIVE':'Decorative'
};
// Type 1 segment vocabulary (canonical names match T2_SEGMENT values)
const SEGMENT_PATTERNS=[
  // Pattern  → Canonical name. Sorted longest-first to handle multi-word terms.
  ['SHUTTERING PLY','Shuttering Ply'],['SHUTTERING','Shuttering Ply'],
  ['BLOCK BOARD','Blockboard'],['BLOCKBOARD','Blockboard'],
  ['FLUSH DOOR','Flush Door'],['FLUSHDOOR','Flush Door'],
  ['PANEL DOOR','Panel Door'],['PANELDOOR','Panel Door'],
  ['PLY WOOD','Plywood'],['PLYWOOD','Plywood'],
  ['VENEER','Veneer'],['TEAK','Teak'],['MDF','MDF'],['NTD','NTD']
];
// Grade table values from FG Item Master Table 4
const GRADE_NAMES=['MACPLATINUM','MACPRIME','EDGE BEND','BOHEMIA','SPECIALS','SHUFFLES','LANDSCAPE','SILVER','BRONZE','LITES',"ELEGANCE(WALNUT)","ELEGANCE(TEAK)",'ELEGANCE','GOLD','GREEN','BLACK','CROSS','GEM','BLUE','RED'];
// Category prefixes (Type 2)
const CATEGORY_NAMES=['BWP','BWR','MR'];

function parseDesc(desc){
  const result={grade:'Unspecified',segment:'Unspecified',category:'Unspecified',design:'',brand:'Unspecified',source:'',thickness:'',length:'',width:'',raw:desc||''};
  if(!desc)return result;
  let text=String(desc).trim().toUpperCase().replace(/\s+/g,' ');

  // 1) Trailing dimensions: "4mm 2.4300x1.2200"
  const dimMatch=text.match(/(\d+(?:\.\d+)?)\s*MM\s+(\d+(?:\.\d+)?)\s*[XxX*]\s*(\d+(?:\.\d+)?)\s*$/i);
  if(dimMatch){result.thickness=dimMatch[1]+'mm';result.length=dimMatch[2];result.width=dimMatch[3];text=text.substring(0,dimMatch.index).trim()}
  else {const tMatch=text.match(/(\d+(?:\.\d+)?)\s*MM\b/i);if(tMatch){result.thickness=tMatch[1]+'mm';text=text.replace(tMatch[0],'').trim()}}

  // 2) Category prefix
  for(const cat of CATEGORY_NAMES){const re=new RegExp(`^${cat}\\b`,'i');if(re.test(text)){result.category=cat;text=text.replace(re,'').trim();break}}

  // 3) Design (Type 3) — longest-first to handle "OSV PLYWOOD" before "PLYWOOD". Maps to a segment.
  const designs=Object.keys(DESIGN_TO_SEGMENT).sort((a,b)=>b.length-a.length);
  for(const d of designs){
    const re=new RegExp(`^${d.replace(/\s+/g,'\\s+')}\\b`,'i');
    if(re.test(text)){result.design=d;result.segment=DESIGN_TO_SEGMENT[d];text=text.replace(re,'').trim();break}
  }

  // 4) If no design matched, try the segment name directly
  if(!result.design||result.segment==='Unspecified'){
    for(const [pat,canonical] of SEGMENT_PATTERNS){
      const re=new RegExp(`^${pat.replace(/\s+/g,'\\s+')}\\b`,'i');
      if(re.test(text)){result.segment=canonical;text=text.replace(re,'').trim();break}
    }
  }

  // 5) Trailing grade keyword
  for(const g of GRADE_NAMES){
    const re=new RegExp(`\\s+${g.replace(/[()]/g,'\\$&')}\\s*$`,'i');
    if(re.test(text)){result.grade=g;text=text.replace(re,'').trim();break}
  }

  // 6) What remains is the brand
  const brand=text.trim();
  result.brand=(brand&&brand.length<=60)?brand:'Unspecified';
  return result;
}

// ══════════ ENRICH ITEM ══════════
// Strategy: try structured item-code parse first; if it doesn't conform, fall back to description regex.
function enrichItem(it){
  if(!it)return it;
  // If the item code parses successfully, ALWAYS overwrite enriched fields from the code
  // (the SAP-B1 item code is authoritative per FG Item Master). This also recovers Category
  // for older items that were enriched before Category support was added.
  const codeParse=parseItemCode(it.itemCode);
  if(codeParse){
    it.source=codeParse.source;
    it.sourceCode=codeParse.sourceCode;
    it.segment=codeParse.segment;
    it.segmentCode=codeParse.segmentCode;
    it.category=codeParse.category;
    it.categoryCode=codeParse.categoryCode;
    it.design=codeParse.design;
    it.designCode=codeParse.designCode;
    it.brand=codeParse.brand;
    it.brandCode=codeParse.brandCode;
    it.grade=codeParse.grade;
    it.gradeCode=codeParse.gradeCode;
    it.specie=codeParse.specie;
    it.thickness=codeParse.thickness;
    it.length=codeParse.length;
    it.width=codeParse.width;
    it.codeFormat='SAP-B1';
    return it;
  }
  // Code didn't conform — always overwrite from current parseDesc (force-correct legacy bad data)
  const p=parseDesc(it.itemDesc||'');
  it.source='';// not extractable from description
  it.segment=p.segment;
  it.category=p.category;
  it.design=p.design||'';
  it.brand=p.brand;
  it.grade=p.grade;
  it.thickness=p.thickness;
  it.length=p.length;
  it.width=p.width;
  it.codeFormat='Legacy';
  return it;
}



// ══════════ TRUCK SIZES & CLUBBING ══════════
// Available truck sizes (capacity in MT). Min utilisation threshold = 70% for "good fit"
const TRUCK_SIZES=[8,10,12,23,28,40];// MT
function pickTruck(weightMT){
  // Picks smallest truck that fits the load. Returns {size,utilization,fits}
  for(const t of TRUCK_SIZES){if(weightMT<=t)return{size:t,utilization:Math.round(weightMT/t*100),fits:true}}
  return{size:40,utilization:Math.round(weightMT/40*100),fits:false};// overload — need multiple trucks
}
// Pick best truck given a load in TONS — returns smallest truck that fits, plus utilisation %
function pickTruckTons(tons){return pickTruck(tons)}

// ══════════ EXCEL EXPORT FRAMEWORK ══════════
// Generic Excel writer using SheetJS. Handles formatting, column widths, totals, multi-sheet workbooks.
// Usage: xlsxDownload(filename, [{name:'Sheet1', headers:[...], rows:[[...]], totals:[...]}])
function xlsxDownload(filename, sheets){
  if(typeof XLSX==='undefined'){toast('Excel library not loaded — retry in a moment');return}
  const wb=XLSX.utils.book_new();
  sheets.forEach(sh=>{
    const aoa=[];
    // Title row
    if(sh.title)aoa.push([sh.title]);
    if(sh.subtitle)aoa.push([sh.subtitle]);
    if(sh.title||sh.subtitle)aoa.push([]);
    aoa.push(sh.headers);
    sh.rows.forEach(r=>aoa.push(r));
    if(sh.totals)aoa.push(sh.totals);
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    // Column widths
    const colW=sh.headers.map((h,i)=>{
      const headerLen=String(h||'').length;
      let maxLen=headerLen;
      sh.rows.forEach(r=>{const v=r[i];if(v!=null){const l=String(v).length;if(l>maxLen)maxLen=l;}});
      return{wch:Math.min(Math.max(maxLen+2,10),48)};
    });
    ws['!cols']=colW;
    // Format: bold header row, totals row
    const headerRowIdx=(sh.title?1:0)+(sh.subtitle?1:0)+((sh.title||sh.subtitle)?1:0);
    const totalsRowIdx=sh.totals?(headerRowIdx+sh.rows.length+1):-1;
    for(let c=0;c<sh.headers.length;c++){
      const cellRef=XLSX.utils.encode_cell({r:headerRowIdx,c});
      if(ws[cellRef])ws[cellRef].s={font:{bold:true},fill:{fgColor:{rgb:'E5E7EB'}}};
      if(totalsRowIdx>0){
        const tRef=XLSX.utils.encode_cell({r:totalsRowIdx,c});
        if(ws[tRef])ws[tRef].s={font:{bold:true},fill:{fgColor:{rgb:'EFF6FF'}}};
      }
    }
    // Freeze header row
    ws['!freeze']={xSplit:0,ySplit:headerRowIdx+1};
    const sheetName=String(sh.name||'Sheet1').slice(0,31).replace(/[\\/?*[\]]/g,'_');
    XLSX.utils.book_append_sheet(wb,ws,sheetName);
  });
  XLSX.writeFile(wb,filename);
  toast('📥 Downloaded: '+filename);
}

// ══════════ ORDER HELPERS ══════════
function orderTotalNA(o){return(o.items||[]).reduce((a,i)=>a+(parseFloat(i.qtyNA)||0),0)}
function orderTotalPcs(o){return(o.items||[]).reduce((a,i)=>a+(parseInt(i.qtyPcs)||0),0)}
function orderTotalWt(o){return(o.items||[]).reduce((a,i)=>a+(parseFloat(i.weight)||0),0)}
function orderItemSummary(o){return(o.items||[]).map(i=>i.itemCode).join(', ')}
function orderFinalPcs(o){return(o.items||[]).reduce((a,i)=>a+((parseInt(i.qtyPcs)||0)+(parseInt(i.addlQty)||0)),0)}
function orderDispPcs(o){return(o.items||[]).reduce((a,i)=>a+(parseInt(i.dispatchedPcs)||0),0)}
function orderPendPcs(o){return orderFinalPcs(o)-orderDispPcs(o)}

// Condensed view: one row per order with aggregated values
function condensedOrders(orders){
  return orders.map(o=>({...o,_totalPcs:orderFinalPcs(o),_totalNA:orderTotalNA(o),_totalWt:orderTotalWt(o),
    _dispPcs:orderDispPcs(o),_pendPcs:orderPendPcs(o),_itemCount:o.items?.length||0,_skus:orderItemSummary(o)}));
}

// Flatten orders to rows (one row per line item) for table display
function flattenOrders(orders){
  const rows=[];
  orders.forEach(o=>{
    if(!o.items||!o.items.length){rows.push({...o,_itemCode:'',_itemDesc:'',_qtyPcs:0,_qtyNA:0,_weight:0,_lineNo:1,_totalItems:0,_totalNA:0});return}
    o.items.forEach((item,idx)=>{
      rows.push({...o,_itemCode:item.itemCode,_itemDesc:item.itemDesc,_qtyPcs:item.qtyPcs,_qtyNA:item.qtyNA,_weight:item.weight,
        _grade:item.grade||'',_segment:item.segment||'',_brand:item.brand||'',_thickness:item.thickness||'',_length:item.length||'',_width:item.width||'',
        _lineNo:idx+1,_totalItems:o.items.length,_totalNA:orderTotalNA(o),_isFirst:idx===0});
    });
  });
  return rows;
}

// ══════════ FILTER ENGINE ══════════
function applyFilters(flatRows, secKey){
  const f=getF(secKey);const s=document.getElementById('searchBox')?.value?.toLowerCase()||'';
  return flatRows.filter(r=>{
    if(f.orderNo&&!r.orderNo?.toLowerCase().includes(f.orderNo.toLowerCase()))return false;
    // Multi-select item filter: itemCodes is an array; legacy single itemCode still supported
    const sel=Array.isArray(f.itemCodes)?f.itemCodes:(f.itemCode?[f.itemCode]:[]);
    if(sel.length){
      const has=sel.some(c=>r._itemCode===c||(r._skus||'').includes(c)||(r.items||[]).some(i=>i.itemCode===c));
      if(!has)return false;
    }
    if(f.branch&&r.branch!==f.branch)return false;
    if(f.vendor&&r.vendor!==f.vendor)return false;
    if(f.dispatchLocation&&r.dispatchLocation!==f.dispatchLocation)return false;
    if(f.status&&r.status!==f.status)return false;
    if(f.committedDate&&r.committedDate!==f.committedDate)return false;
    if(s)return Object.values(r).some(v=>String(v).toLowerCase().includes(s));
    return true;
  });
}

// ══════════ SEARCHABLE MULTI-SELECT ITEM PICKER ══════════
// Description-first search with partial keyword matching. Used wherever the item filter appears.
const MSEL_STATE={openId:null};
function buildItemMsel(secKey,orderData){
  const f=getF(secKey);
  const selected=Array.isArray(f.itemCodes)?f.itemCodes:(f.itemCode?[f.itemCode]:[]);
  // Pool: union of items appearing in current order set + master SKU master (so users can pre-select even non-active SKUs)
  const skuByCode={};D.masters.skus.forEach(s=>{skuByCode[s.code]=s.name||s.itemDesc||s.code});
  const pool={};
  (orderData||[]).forEach(o=>(o.items||[]).forEach(i=>{if(!i.itemCode)return;pool[i.itemCode]=i.itemDesc||skuByCode[i.itemCode]||i.itemCode}));
  // Also add master SKUs that may not yet appear in any order
  Object.entries(skuByCode).forEach(([c,d])=>{if(!pool[c])pool[c]=d});
  const items=Object.entries(pool).map(([code,desc])=>({code,desc,searchKey:(desc+' '+code).toLowerCase()})).sort((a,b)=>a.desc.localeCompare(b.desc));
  const ddId='msel_'+secKey+'_item';
  const lblText=selected.length===0?'All Items':selected.length===1?(pool[selected[0]]?(pool[selected[0]].length>22?pool[selected[0]].slice(0,22)+'…':pool[selected[0]]):selected[0]):`${selected.length} items selected`;
  // Pill button + dropdown (dropdown only renders when this one is open; saves DOM)
  let h=`<div class="msel-wrap"><button class="msel-btn ${selected.length?'active':''}" onclick="event.stopPropagation();toggleMsel('${ddId}','${secKey}')">🔍 <span class="msel-btn-label">${lblText}</span>${selected.length?`<span class="msel-btn-count">${selected.length}</span>`:''}<svg width="9" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="#6B7280" stroke-width="1.5"/></svg></button>`;
  if(MSEL_STATE.openId===ddId){
    const rows=items.map(it=>`<label class="msel-item" data-search="${it.searchKey.replace(/"/g,'&quot;')}" onclick="event.stopPropagation()"><input type="checkbox" ${selected.includes(it.code)?'checked':''} onchange="event.stopPropagation();toggleMselItem('${secKey}','${it.code.replace(/'/g,"\\'")}',this.checked)"><div class="msel-item-content"><div class="msel-desc">${it.desc}</div><div class="msel-code">${it.code}</div></div></label>`).join('');
    h+=`<div class="msel-dd" onclick="event.stopPropagation()"><div class="msel-search-wrap"><svg class="msel-search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" class="msel-search" id="${ddId}_q" placeholder="Search by product description or code..." oninput="filterMsel('${ddId}',this.value)" autofocus></div><div class="msel-toolbar"><button onclick="event.stopPropagation();mselSelectAll('${secKey}','${ddId}',true)">Select All Visible</button><button onclick="event.stopPropagation();mselSelectAll('${secKey}','${ddId}',false)">Clear All</button></div><div class="msel-list" id="${ddId}_list">${items.length?rows:'<div class="msel-empty">No items in master. Add SKUs first.</div>'}</div><div class="msel-foot"><span><b>${selected.length}</b> of ${items.length} selected</span><button onclick="event.stopPropagation();MSEL_STATE.openId=null;rerender()">Done</button></div></div>`;
  }
  h+=`</div>`;
  return h;
}
function toggleMsel(ddId,secKey){if(MSEL_STATE.openId===ddId){MSEL_STATE.openId=null}else{MSEL_STATE.openId=ddId}rerender();setTimeout(()=>{const q=document.getElementById(ddId+'_q');if(q)q.focus()},20)}

function doSort(col){if(SORT.col===col)SORT.dir=SORT.dir==='asc'?'desc':'asc';else{SORT.col=col;SORT.dir='asc'}rerender()}
function sortArr(arr){if(!SORT.col)return arr;return[...arr].sort((a,b)=>{let va=a[SORT.col]??'',vb=b[SORT.col]??'';if(!isNaN(va)&&!isNaN(vb)&&va!==''&&vb!=='')return SORT.dir==='asc'?Number(va)-Number(vb):Number(vb)-Number(va);va=String(va).toLowerCase();vb=String(vb).toLowerCase();return SORT.dir==='asc'?va.localeCompare(vb):vb.localeCompare(va)})}
function tbl(c,r,mh){
  if(!r.length)return'<div class="empty">No records found. Use + Add or ↑ CSV.</div>';
  const sorted=sortArr(r);
  return`<div class="tbl-wrap" style="max-height:${mh||'420px'}"><table><thead><tr>${c.map(x=>`<th class="sortable ${SORT.col===x.k?'sort-'+SORT.dir:''}" onclick="doSort('${x.k}')">${x.l}</th>`).join('')}</tr></thead><tbody>${sorted.map(row=>`<tr>${c.map(x=>`<td${x.m?' class="mono"':''}>${x.r?x.r(row):(row[x.k]??'')}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}

function submitForgotPassword(){
  const id=document.getElementById('fpId').value.trim().toUpperCase();
  const note=document.getElementById('fpNote').value.trim();
  if(!id)return alert('Please enter your Employee ID');
  const u=D.users.find(x=>x.id.toUpperCase()===id);
  // Don't reveal whether the user exists — always accept the request, but only push to admin queue if user really exists
  if(u){
    if(!D.pwRequests)D.pwRequests=[];
    // Avoid duplicate requests
    if(!D.pwRequests.find(r=>r.userId===u.id)){
      D.pwRequests.push({userId:u.id,userName:u.name,dept:u.dept,requestedOn:new Date().toLocaleString(),note:note||'Forgot Password — login page'});
    }
    logLogin(u,'Forgot Password Request',note||'(no note)');
    sv();
  } else {
    logLogin({id,name:'(unknown)'},'Forgot Password (unknown user)',`Attempted for ID "${id}"`);
    sv();
  }
  closeM();
  setTimeout(()=>{
    openM('Request Sent',`
      <div class="info-box" style="background:#DCFCE7;border-color:#86EFAC;color:#166534">✓ <b>Your request has been sent to your SCM Administrator.</b></div>
      <div style="font-size:13px;color:#4B5563;line-height:1.6;margin-top:10px">The administrator will review your request and issue a new temporary password. You will need to change this temporary password the first time you log in with it.</div>
      <div style="font-size:12px;color:#6B7280;margin-top:14px;padding:10px;background:#F9FAFB;border-radius:6px">📞 <b>For urgent access:</b> contact your SCM Administrator directly.</div>
      <button class="m-btn" style="background:var(--ac);color:#fff;margin-top:14px" onclick="closeM()">OK</button>
    `);
  },100);
}
async function doLogin(){
  const errEl=document.getElementById('loginErr');
  const showErr=(msg)=>{errEl.textContent=msg;errEl.style.display='block'};
  const id=document.getElementById('loginId').value.trim().toUpperCase();
  const pw=document.getElementById('loginPw').value.trim();
  if(!id||!pw){showErr('Enter Employee ID and Password');return}
  const user=D.users.find(u=>u.id.toUpperCase()===id);
  if(!user){
    // Log failed attempt against a fake user record so we don't reveal whether the ID exists
    logLogin({id,name:'(unknown)',dept:''},'Login Failed',`Unknown Employee ID "${id}"`);sv();
    showErr('Invalid credentials. Please try again.');return;
  }
  if(user.active===false){
    logLogin(user,'Login Blocked','Account is disabled');sv();
    showErr('Account is disabled. Contact your SCM Administrator.');return;
  }
  if(isUserLocked(user)){
    const mins=Math.ceil(((user.lockedUntil||0)-Date.now())/60000);
    logLogin(user,'Login Blocked',`Account locked${mins>0?` (auto-unlock in ${mins} min)`:''}`);sv();
    showErr(`Account is locked${mins>0?` — try again in ${mins} minute${mins===1?'':'s'}, or contact your administrator.`:' — contact your administrator.'}`);return;
  }
  // Compare password — handle both hashed and legacy plaintext
  let match=false;
  if(isHashed(user.pw)){
    const h=await hashPassword(pw);match=(h===user.pw);
  } else {
    // Legacy plaintext — accept once, then upgrade silently
    match=(user.pw===pw);
    if(match){user.pw=await hashPassword(pw);user.pwHashed=true;user.pwLastChanged=user.pwLastChanged||new Date().toISOString()}
  }
  if(!match){
    user.failedAttempts=(user.failedAttempts||0)+1;
    if(user.failedAttempts>=MAX_FAILED_ATTEMPTS){
      user.locked=true;
      user.lockedUntil=Date.now()+LOCKOUT_DURATION_MS;
      logLogin(user,'Account Locked',`Locked after ${user.failedAttempts} failed attempts; auto-unlock in 15 min`);
      sv();
      showErr(`Too many failed attempts. Account is now locked for 15 minutes.`);
      return;
    }
    logLogin(user,'Login Failed',`Wrong password (attempt ${user.failedAttempts}/${MAX_FAILED_ATTEMPTS})`);
    sv();
    const remaining=MAX_FAILED_ATTEMPTS-user.failedAttempts;
    showErr(`Invalid credentials. ${remaining} attempt${remaining===1?'':'s'} remaining before lockout.`);
    return;
  }
  // ── Successful authentication ──
  user.failedAttempts=0;user.locked=false;user.lockedUntil=null;user.lastLogin=new Date().toISOString();
  logLogin(user,'Login Success','');
  sv();
  CU=user;
  document.getElementById('loginPage').style.display='none';
  document.getElementById('appShell').style.display='flex';
  document.getElementById('uName').textContent=user.name;
  document.getElementById('uDept').textContent=user.dept;
  document.getElementById('uAvatar').textContent=user.name.charAt(0);
  document.getElementById('uAvatar').style.background=ROLE_CLR[user.role]||'var(--ac)';
  // Initial section
  SEC=NAV.find(n=>canDo(n.k))?.k||'dashboard';
  rerender();
  resetSessionTimer();
  // Forced password change on first login or admin-forced reset — must happen before user does anything
  if(user.firstLogin||user.forcePwReset){
    setTimeout(()=>openChangePassword(true),300);
  }
}
function doLogout(){
  if(CU){logLogin(CU,'Logout','User-initiated logout');sv()}
  if(SESSION_TIMER){clearTimeout(SESSION_TIMER);SESSION_TIMER=null}
  CU=null;

}

function ufGeneratePw(){
  // Build a password that passes the policy: uppercase + lowercase + digit + 12 chars long
  const U='ABCDEFGHJKMNPQRSTUVWXYZ',L='abcdefghjkmnpqrstuvwxyz',D='23456789';
  const pick=s=>s[Math.floor(Math.random()*s.length)];
  let pw=pick(U)+pick(L)+pick(D)+pick('!@#$%&*');
  for(let i=0;i<9;i++)pw+=pick(U+L+D);
  // Shuffle to avoid the first 4 chars always being predictable
  pw=pw.split('').sort(()=>Math.random()-0.5).join('');
  const inp=document.getElementById('ufPw');if(inp){inp.value=pw;inp.focus();inp.select();renderPwStrengthInto('ufPwStr',pw)}
}

function ufCopy(text){
  // Copy helper using the modern clipboard API with a fallback
  if(navigator.clipboard?.writeText){navigator.clipboard.writeText(text).then(()=>toast('Copied to clipboard'),()=>toast('Copy failed — please copy manually'));return}
  const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');toast('Copied')}catch(e){toast('Copy failed')}finally{ta.remove()}
}

async function submitChangePassword(){

  const newPw=document.getElementById('cpNew').value;

  if(newPw===cur)return alert('New password must be different from the current one');
  const pol=passwordMeetsPolicy(newPw);
  if(!pol.ok)return alert('New password does not meet the security policy:\n\n• '+pol.errors.join('\n• '));
  // Verify the current password against what's stored. Accept hashed or legacy plaintext.
  let curMatches=false;
  const stored=CU.pw||'';
  if(isHashed(stored)){curMatches=(await hashPassword(cur))===stored}
  else {curMatches=(stored===cur)}
  if(!curMatches){
    logLogin(CU,'Password Change Failed','Wrong current password');sv();
    return alert('Current password is incorrect. Please try again, or use Forgot Password if you do not remember it.');
  }
  // All good — hash and save
  const newHash=await hashPassword(newPw);
  D.users=D.users.map(u=>u.id===CU.id?{...u,pw:newHash,pwHashed:true,pwLastChanged:new Date().toISOString(),firstLogin:false,forcePwReset:false,failedAttempts:0,locked:false,lockedUntil:null}:u);
  CU=D.users.find(u=>u.id===CU.id);
  logLogin(CU,'Password Changed','Self-service via Change Password');
  D.permLogs.push({on:TD+' '+new Date().toLocaleTimeString(),by:CU.name,action:'Password Changed (self)',target:CU.id,detail:'User changed own password'});
  sv();

// ══════════ CSV IMPORT — Groups by Order Number ══════════
function uploadCSV(type){openM(`Upload ${type==='plant'?'Plant':'Vendor'} Orders CSV`,`<p style="font-size:12px;color:var(--mu);margin-bottom:14px">CSV rows with the <b>same Order Number</b> will be grouped as line items under one order.</p><div class="drop-z" onclick="document.getElementById('csvF').click()">Click to select CSV</div><input type="file" id="csvF" accept=".csv" style="display:none" onchange="handleCSV(this,'${type}')"><div id="csvR" style="margin-top:12px;font-size:12px;display:none;padding:10px;border-radius:6px"></div>`)}
function handleCSV(inp,type){
  if(!inp.files[0])return;Papa.parse(inp.files[0],{header:true,skipEmptyRows:true,complete:function(res){
    const g=(row,...k)=>{for(const x of k){const f=Object.keys(row).find(rk=>rk.toLowerCase().includes(x.toLowerCase()));if(f&&row[f])return row[f].trim()}return''};
    const target=type==='plant'?'plantOrders':'vendorOrders';
    const existIds=new Set(D[target].map(o=>o.orderNo));
    // Group rows by order number
    const grouped={};
    res.data.forEach(r=>{
      const no=g(r,'Order Number','Order No','PO Number')||gid(type==='plant'?'SO':'PO');
      if(!grouped[no])grouped[no]={header:r,items:[]};
      grouped[no].items.push(r);
    });
    let added=0;
    Object.entries(grouped).forEach(([orderNo,grp])=>{
      if(existIds.has(orderNo))return;
      const r=grp.header;const edd=g(r,'Factory EDD','EDD');const cd=g(r,'Committed Date','Committed','SCM Committed','Negotiated');
      const items=grp.items.map(row=>enrichItem({itemCode:g(row,'Item Code','SKU Code','SKU'),itemDesc:g(row,'Item Description','Product Name','Product'),qtyPcs:parseIntNum(g(row,'Qty PCS','Quantity','Qty')),addlQty:0,qtyNA:parseNum(g(row,'Qty NA','NA','Notional')),weight:parseNum(g(row,'Weight','Wt')),dispatchedPcs:0,allocatedPcs:0,producedPcs:0,qcPassedPcs:0})).filter(i=>i.itemCode);
      if(!items.length)return;
      const order={id:Date.now().toString(36)+(added++),orderNo,branch:g(r,'Branch','Customer','Requesting'),dispatchLocation:g(r,'Dispatch Location','Destination'),orderDate:normDate(g(r,'Order Date'))||TD,factoryEDD:normDate(edd),committedDate:normDate(cd)||normDate(edd),items,status:g(r,'Status')||(type==='plant'?'Pending':'PO Issued'),actualDispatchDate:'',onTimeDispatch:null,productionLeadDays:null,convertedTo:'',createdBy:CU?.name||'CSV',addedOn:TD};
      if(type==='plant')order.type=g(r,'Type')||'SO';
      if(type==='vendor')order.vendor=g(r,'Vendor Name','Vendor')||'';
      D[target].push(order);existIds.add(orderNo);
    });
    sv();const el=document.getElementById('csvR');el.style.display='block';el.style.background='rgba(22,163,74,.08)';el.style.color='var(--gn)';el.textContent=`✓ ${added} orders added (multi-line items grouped by Order Number)`;toast(added+' orders added');rerender();
  }});
}

function confirmDisp(type,id){
  const o=D[type].find(x=>x.id===id);if(!o)return;
  if(o.status==='Dispatched'){toast('Order already fully dispatched');closeM();return}
  const ds=document.getElementById('dDs').value,tr=document.getElementById('dTr').value;
  const inv=document.getElementById('dInv')?.value.trim();
  const docDt=normDate(document.getElementById('dDocDt')?.value);
  const mode=document.getElementById('dMode')?.value;
  if(!inv)return alert('Invoice / Dispatch Doc No. is mandatory');
  if(!docDt)return alert('Dispatch Doc Date is mandatory');
  if(!mode)return alert('Dispatch Mode is mandatory');
  if(!ds||!tr)return alert('Transporter & Destination required');
  // Collect dispatch quantities per item
  const dispItems=[];let anyDisp=false;
  o.items.forEach((it,i)=>{const inp=document.getElementById('dQ'+i);const dq=Math.min(parseIntNum(inp?.value),((it.qtyPcs||0)+(it.addlQty||0))-(it.dispatchedPcs||0));if(dq>0){dispItems.push({...it,qtyPcs:dq,qtyNA:it.qtyNA?(dq/it.qtyPcs*it.qtyNA):0,weight:it.weight?(dq/it.qtyPcs*it.weight):0});it.dispatchedPcs=(it.dispatchedPcs||0)+dq;anyDisp=true}});
  if(!anyDisp)return alert('Enter dispatch quantity for at least one item');
  const dd=normDate(document.getElementById('dDt').value)||TD;
  const allFullyDispatched=o.items.every(it=>(it.dispatchedPcs||0)>=((it.qtyPcs||0)+(it.addlQty||0)));
  const onTime=o.committedDate?new Date(normDate(dd))<=new Date(normDate(o.committedDate)):true;const prodLead=daysDiff(o.orderDate,dd);
  const shipId=gid('SHP');
  D.transit.push({id:shipId,shipNo:shipId,sourceOrderNo:o.orderNo,sourceType:type==='plantOrders'?'Plant':'Vendor',items:dispItems,orderDate:o.orderDate,committedDate:o.committedDate||'',factoryEDD:o.factoryEDD||'',dispatchDate:dd,invoiceNo:inv,docDate:docDt,dispatchMode:mode,transporter:tr,lrNumber:document.getElementById('dLR').value,vehicleNo:document.getElementById('dVh').value,driverMobile:document.getElementById('dDM')?.value||'',freightCharges:parseNum(document.getElementById('dFC')?.value),freightType:document.getElementById('dFT')?.value||'Paid',source:type==='plantOrders'?'Rajkot Plant':(o.vendor||'Vendor'),destination:ds,status:'In Transit',onTimeDispatch:onTime,productionLeadDays:prodLead,branch:o.branch,isPartial:!allFullyDispatched,clubId:o.clubId||'',createdBy:CU.name,addedOn:TD});
  if(allFullyDispatched){
    o.status='Dispatched';o.actualDispatchDate=dd;o.onTimeDispatch=onTime;o.productionLeadDays=prodLead;
    // Remove from active club, since the order is now fulfilled
    if(o.clubId){
      const c=D.clubs?.find(x=>x.id===o.clubId&&x.status==='Planned');
      if(c){
        c.orderNos=c.orderNos.filter(n=>n!==o.orderNo);
        c.totalTons=clubLoadTons(c);c.totalNA=clubLoadNA(c);c.totalPcs=clubLoadPcs(c);
        const t=pickTruck(c.totalTons);c.utilization=t.utilization;
        tcLog('Order Dispatched (left club)',o.clubId,o.orderNo,'Auto-removed after full dispatch');
        if(!c.orderNos.length){c.status='Dispatched';c.dispatchedAt=TD+' '+new Date().toLocaleTimeString();tcLog('Auto-Closed',c.id,'','All orders dispatched');}
      }
      delete o.clubId;
    }
  }
  sv();closeM();toast(o.orderNo+(allFullyDispatched?' fully dispatched':' partial dispatch')+(onTime?' ✓ On-Time':' ✗ LATE'));rerender();
}

function confirmConv(id){const o=D.plantOrders.find(x=>x.id===id);if(!o)return;const sn=document.getElementById('cvSO').value;o.convertedTo=sn;o.type='SO';o.branch=document.getElementById('cvCu').value||o.branch;D.convLogs.push({stoNo:o.orderNo,soNo:sn,date:TD,reason:document.getElementById('cvR').value,user:CU.name});sv();closeM();toast('Converted');rerender()}

// ══════════ RECEIVE — GRN MANDATORY ══════════
function startRecv(id){const s=D.transit.find(x=>x.id===id);if(!s)return;const il=s.items.map(i=>`${i.itemCode}: ${i.qtyPcs} PCS / ${i.qtyNA} NA`).join('<br>');openM('Receive — GRN Required',`<div class="m-info"><b>Shipment:</b> ${s.shipNo} | <b>From:</b> ${s.source} → ${s.destination}<br>${il}</div><div class="m-2"><label class="m-lbl" style="color:var(--gn)">GRN Number ★<input class="m-inp" id="gNo" style="border-color:rgba(22,163,74,.35)"></label><label class="m-lbl" style="color:var(--gn)">GRN Date ★<input type="date" class="m-inp" id="gDt" value="${TD}" style="border-color:rgba(22,163,74,.35)"></label></div><button class="m-btn" style="background:var(--gn);color:#fff" onclick="confirmRecv('${id}')">Confirm Receipt</button>`)}
function confirmRecv(id){const gn=document.getElementById('gNo').value.trim(),gd=normDate(document.getElementById('gDt').value);if(!gn)return alert('GRN Number mandatory');if(!gd)return alert('GRN Date mandatory');const s=D.transit.find(x=>x.id===id);
  // FIX: Prevent duplicate delivery — check by unique shipment ID
  const existingClosed=D.closed.find(c=>c.id===s.id);
