  D.transit=D.transit.filter(x=>x.id!==id);
  const totalLeadDays=daysDiff(s.orderDate,gd);// Total Lead = GRN Date - Order Date
  D.closed.push({...s,status:'Delivered',grnNumber:gn,grnDate:gd,receivedDate:gd,closedOn:TD,totalLeadDays,inFull:true});sv();closeM();toast(s.shipNo+' received | GRN: '+gn+' | Lead: '+(totalLeadDays??'—')+'d');rerender()}
function updTrSt(id,st){D.transit=D.transit.map(o=>o.id===id?{...o,status:st}:o);sv();toast('Updated');rerender()}

// ══════════ UNDO / REVERSE ACTION ══════════
function undoDispatch(type,id){
  const o=D[type].find(x=>x.id===id);if(!o)return;
  if(CU.role!=='scm')return toast('Only SCM can undo');
  // Find transit records for this order and remove them
  const trRecs=D.transit.filter(t=>t.sourceOrderNo===o.orderNo);
  if(!trRecs.length&&o.status!=='Dispatched'&&o.status!=='Cancelled')return toast('Nothing to undo');
  // Reverse dispatched qty on items
  trRecs.forEach(tr=>{(tr.items||[]).forEach(ti=>{const orig=o.items.find(oi=>oi.itemCode===ti.itemCode);if(orig)orig.dispatchedPcs=Math.max(0,(orig.dispatchedPcs||0)-ti.qtyPcs)})});
  D.transit=D.transit.filter(t=>t.sourceOrderNo!==o.orderNo);
  const prevSt=o.status;o.status=type==='plantOrders'?'Ready for Dispatch':'Ready for Pickup';o.actualDispatchDate='';o.onTimeDispatch=null;
  D.undoLogs.push({orderNo:o.orderNo,action:'Undo Dispatch',prevStatus:prevSt,newStatus:o.status,by:CU.name,on:TD+' '+new Date().toLocaleTimeString()});
  sv();closeM();toast('↩ Dispatch reversed: '+o.orderNo);rerender();
}
function undoRecv(id){
  if(CU.role!=='scm')return toast('Only SCM can undo');
  const c=D.closed.find(x=>x.id===id);if(!c)return;
  D.closed=D.closed.filter(x=>x.id!==id);
  D.transit.push({...c,status:'In Transit',grnNumber:undefined,grnDate:undefined,receivedDate:undefined,closedOn:undefined,totalLeadDays:undefined});
  D.undoLogs.push({orderNo:c.sourceOrderNo,action:'Undo GRN',prevStatus:'Delivered',newStatus:'In Transit',by:CU.name,on:TD+' '+new Date().toLocaleTimeString()});
  sv();toast('↩ GRN reversed: '+c.sourceOrderNo);rerender();
}

// ══════════ MASTER DATA — ADD & DELETE ══════════
function addMaster(t){let f='';if(t==='SKU')f='<div class="m-2"><label class="m-lbl">Code<input class="m-inp" id="mC"></label><label class="m-lbl">Name<input class="m-inp" id="mN"></label></div><label class="m-lbl">Category<input class="m-inp" id="mCat"></label>';else f='<label class="m-lbl">Name<input class="m-inp" id="mN"></label>';openM('Add '+t,f+`<button class="m-btn" style="background:var(--ac);color:#fff" onclick="saveMaster('${t}')">Add</button>`)}
function saveMaster(t){const n=document.getElementById('mN')?.value;if(!n)return alert('Required');if(t==='SKU')D.masters.skus.push({code:document.getElementById('mC')?.value||'',name:n,cat:document.getElementById('mCat')?.value||''});else if(t==='Warehouse')D.masters.warehouses.push({name:n});else if(t==='Transporter')D.masters.transporters.push({name:n});else if(t==='Vendor')D.masters.vendors.push({name:n});else if(t==='Customer')D.masters.customers.push({name:n});else if(t==='Branch')D.masters.branches.push({name:n});sv();closeM();toast(t+' added');rerender()}
function deleteMaster(t,val){
  // Check if used in transactions
  const allOrders=[...D.plantOrders,...D.vendorOrders,...D.transit,...D.closed];
  let inUse=false,reason='';
  if(t==='SKU'){inUse=allOrders.some(o=>(o.items||[]).some(i=>i.itemCode===val));reason='SKU is used in orders'}
  else if(t==='Warehouse'){inUse=allOrders.some(o=>o.dispatchLocation===val||o.destination===val);reason='Warehouse is used in orders/shipments'}
  else if(t==='Transporter'){inUse=[...D.transit,...D.closed].some(o=>o.transporter===val);reason='Transporter is used in shipments'}
  else if(t==='Vendor'){inUse=[...D.vendorOrders,...D.transit,...D.closed].some(o=>o.vendor===val);reason='Vendor is used in orders'}
  else if(t==='Customer'){inUse=allOrders.some(o=>o.branch===val);reason='Customer is used as branch in orders'}
  else if(t==='Branch'){inUse=allOrders.some(o=>o.branch===val);reason='Branch is used in orders'}
  if(inUse){if(!confirm(`⚠ ${reason}. Delete anyway?`))return}else{if(!confirm(`Delete ${t}: "${val}"?`))return}
  if(t==='SKU')D.masters.skus=D.masters.skus.filter(s=>s.code!==val);
  else if(t==='Warehouse')D.masters.warehouses=D.masters.warehouses.filter(w=>(w.name||w)!==val);
  else if(t==='Transporter')D.masters.transporters=D.masters.transporters.filter(tr=>(tr.name||tr)!==val);
  else if(t==='Vendor')D.masters.vendors=D.masters.vendors.filter(v=>(v.name||v)!==val);
  else if(t==='Customer')D.masters.customers=D.masters.customers.filter(c=>(c.name||c)!==val);
  else if(t==='Branch')D.masters.branches=(D.masters.branches||[]).filter(b=>(b.name||b)!==val);
  sv();toast(t+' deleted');rerender();
}
function uploadMaster(t){openM('Upload '+t+' CSV',`<div class="drop-z" onclick="document.getElementById('mCSV').click()">Click to select CSV</div><input type="file" id="mCSV" accept=".csv" style="display:none" onchange="handleMCSV(this,'${t}')"><div id="mR" style="margin-top:12px;font-size:12px;display:none;padding:10px;border-radius:6px"></div>`)}
function handleMCSV(inp,t){if(!inp.files[0])return;Papa.parse(inp.files[0],{header:true,skipEmptyRows:true,complete:function(res){let a=0;const k=t.toLowerCase();res.data.forEach(r=>{const v=Object.values(r);const n=v[0]?.trim();if(!n)return;if(k==='sku')D.masters.skus.push({code:r['Code']||r['SKU Code']||n,name:r['Name']||r['Product Name']||v[1]||'',cat:r['Category']||v[2]||''});else{const mk=k==='warehouse'?'warehouses':k==='transporter'?'transporters':k==='branch'?'branches':k+'s';if(!D.masters[mk])D.masters[mk]=[];D.masters[mk].push({name:n})};a++});sv();const el=document.getElementById('mR');el.style.display='block';el.style.background='rgba(22,163,74,.08)';el.style.color='var(--gn)';el.textContent=`✓ ${a} added`;toast(a+' added');rerender()}})}
function resetAll(){if(confirm('DELETE ALL DATA? This cannot be undone.')){localStorage.removeItem(SK);localStorage.removeItem('duroply_v7');localStorage.removeItem('duroply_v6');localStorage.removeItem('duroply_v5');localStorage.removeItem('duroply_scm_v4');localStorage.removeItem('duroply_scm_v3');location.reload()}}

// ══════════ ORDER CANCELLATION / DELETION / BULK DELETE — SCM ONLY ══════════
const CANCEL_REASONS=['Customer Cancellation','Duplicate Entry','Incorrect Item Code','Incorrect Quantity','Wrong Branch / Customer','Order Hold — On Credit','Stock Unavailable','Specification Change','Other'];
const DELETE_REASONS=['Duplicate Entry — CSV Upload Error','Test / Demo Data Cleanup','Wrong Order Number','Erroneous Manual Entry','Data Migration Cleanup','Other'];

function cancelOrder(type,id){
  if(!can(type,'E')||!canApprove('cancel-orders'))return toast('You do not have permission to cancel orders');
  const o=D[type].find(x=>x.id===id);if(!o)return;
  if(o.status==='Cancelled')return toast('Order is already cancelled');
  if(o.status==='Dispatched')return toast('Cannot cancel a dispatched order. Use Undo Dispatch first.');
  openM('Cancel Order — '+o.orderNo,`
    <div class="m-info"><b>Order:</b> ${o.orderNo} | <b>Items:</b> ${o.items?.length||0} | <b>Current Status:</b> ${o.status} | <b>Branch:</b> ${o.branch||'—'}</div>
    <div class="info-box" style="background:#FEF3C7;border-color:#FCD34D;color:#92400E">⚠ <b>Soft Close.</b> Order will be marked as <b>Cancelled</b> and removed from active lists. The full record is preserved in the deletion audit log and can be referenced or restored later.</div>
    <label class="m-lbl">Cancellation Reason ★
      <select class="m-inp" id="cnlR"><option value="">Select reason...</option>${CANCEL_REASONS.map(r=>`<option>${r}</option>`).join('')}</select>
    </label>
    <label class="m-lbl">Detailed Remarks ★ <span style="color:var(--dm);font-weight:400">(min 5 chars)</span>
      <textarea class="m-inp" id="cnlRm" rows="3" style="resize:vertical;font-family:'DM Sans'" placeholder="e.g. Customer informed via email on 12-May to cancel; ref ticket #4521..."></textarea>
    </label>
    <button class="m-btn" style="background:var(--rd);color:#fff" onclick="confirmCancel('${type}','${id}')">Cancel This Order</button>
  `);
}
function confirmCancel(type,id){
  const reason=document.getElementById('cnlR').value;
  const remarks=document.getElementById('cnlRm').value.trim();
  if(!reason)return alert('Please select a cancellation reason');
  if(!remarks||remarks.length<5)return alert('Please provide remarks (at least 5 characters)');
  const o=D[type].find(x=>x.id===id);if(!o)return;
  const prevStatus=o.status;
  o.status='Cancelled';o.cancelledOn=TD;o.cancelledBy=CU.name;o.cancelReason=reason;o.cancelRemarks=remarks;o.prevStatusBeforeCancel=prevStatus;
  D.deletionLogs.push({orderNo:o.orderNo,type:type==='plantOrders'?'Plant':'Vendor',action:'Cancelled',reason,remarks,prevStatus,by:CU.name,on:TD+' '+new Date().toLocaleTimeString(),itemCount:o.items?.length||0,snapshot:JSON.stringify(o)});
  sv();closeM();toast('✓ Order '+o.orderNo+' cancelled');rerender();
}

function uncancelOrder(orderNo){
  if(!canApprove('delete-orders')&&!canApprove('cancel-orders'))return toast('You do not have permission to restore');
  const all=[...D.plantOrders,...D.vendorOrders];
  const o=all.find(x=>x.orderNo===orderNo&&x.status==='Cancelled');
  if(!o)return toast('Cancelled order not found');
  if(!confirm(`Reactivate order ${orderNo}? It will return to status: ${o.prevStatusBeforeCancel||'Pending'}`))return;
  o.status=o.prevStatusBeforeCancel||'Pending';delete o.cancelledOn;delete o.cancelledBy;delete o.cancelReason;delete o.cancelRemarks;delete o.prevStatusBeforeCancel;
  D.undoLogs.push({orderNo,action:'Cancel Reverted',prevStatus:'Cancelled',newStatus:o.status,by:CU.name,on:TD+' '+new Date().toLocaleTimeString()});
  sv();toast('Order '+orderNo+' reactivated');rerender();
}

function deleteOrder(type,id){
  if(!can(type,'D'))return toast('You do not have permission to delete orders');
  const o=D[type].find(x=>x.id===id);if(!o)return;

    <div class="m-info"><b>Order:</b> ${o.orderNo} | <b>Items:</b> ${o.items?.length||0} | <b>Status:</b> ${o.status} | <b>Branch:</b> ${o.branch||'—'}</div>
    <div class="info-box" style="background:#FEE2E2;border-color:#FCA5A5;color:#991B1B">🗑️ <b>Hard delete.</b> The order record will be removed from the live database. A full snapshot is preserved in the Deletion Audit Log and can be restored from there if needed.</div>

      <select class="m-inp" id="delR"><option value="">Select reason...</option>${DELETE_REASONS.map(r=>`<option>${r}</option>`).join('')}</select>
    </label>
    <label class="m-lbl">Detailed Remarks ★ <span style="color:var(--dm);font-weight:400">(min 5 chars)</span>
      <textarea class="m-inp" id="delRm" rows="3" style="resize:vertical;font-family:'DM Sans'" placeholder="e.g. Duplicate of SO/123/25-26 created when CSV was uploaded twice on 10-May..."></textarea>
    </label>
    <label class="m-lbl" style="color:var(--rd)">Type the Order Number to confirm <input class="m-inp" id="delC" placeholder="${o.orderNo}" style="border-color:rgba(220,38,38,.35)"></label>

function confirmDelete(type,id){
  const o=D[type].find(x=>x.id===id);if(!o)return;
  const reason=document.getElementById('delR').value;
  const remarks=document.getElementById('delRm').value.trim();
  const conf=document.getElementById('delC').value.trim();
  if(!reason)return alert('Please select a deletion reason');
  if(!remarks||remarks.length<5)return alert('Please provide remarks (at least 5 characters)');
  if(conf!==o.orderNo)return alert(`Order number does not match. Type "${o.orderNo}" exactly to confirm.`);
  D.deletionLogs.push({orderNo:o.orderNo,type:type==='plantOrders'?'Plant':'Vendor',action:'Deleted',reason,remarks,prevStatus:o.status,by:CU.name,on:TD+' '+new Date().toLocaleTimeString(),itemCount:o.items?.length||0,snapshot:JSON.stringify(o)});
  D[type]=D[type].filter(x=>x.id!==id);
  // Clean up any related transit records to prevent orphans
  D.transit=D.transit.filter(t=>t.sourceOrderNo!==o.orderNo);
  sv();closeM();toast('🗑️ Order '+o.orderNo+' deleted. Snapshot saved in audit log.');rerender();
}

function bulkDeleteByDate(){

    <button class="m-btn" style="background:var(--rd);color:#fff" onclick="confirmBulkDelete()">🗑️ Permanently Delete All Matching Orders</button>

function bulkPreview(){
  const from=normDate(document.getElementById('bdFrom').value);
  const to=normDate(document.getElementById('bdTo').value);
  const type=document.getElementById('bdType').value;
  const pv=document.getElementById('bdPv');
  if(!from||!to){pv.innerHTML='<div style="color:var(--rd);font-size:12px;padding:8px;background:#FEE2E2;border-radius:6px">Pick a valid From and To date</div>';return}
  if(from>to){pv.innerHTML='<div style="color:var(--rd);font-size:12px;padding:8px;background:#FEE2E2;border-radius:6px">From date is after To date</div>';return}
  const sources=type==='plant'?['plantOrders']:type==='vendor'?['vendorOrders']:['plantOrders','vendorOrders'];
  const matches=[];
  sources.forEach(s=>(D[s]||[]).forEach(o=>{const dt=normDate(o.orderDate);if(dt>=from&&dt<=to)matches.push({src:s,order:o})}));
  if(!matches.length){pv.innerHTML='<div style="background:#DCFCE7;border:1px solid #86EFAC;color:#166534;border-radius:6px;padding:10px;font-size:12px">✓ No orders match this date range. Nothing to delete.</div>';return}
  const rows=matches.slice(0,30).map(m=>`<tr><td class="mono" style="font-size:10px;padding:3px 6px">${m.order.orderNo}</td><td style="font-size:10px;padding:3px 6px">${m.src==='plantOrders'?'Plant':'Vendor'}</td><td style="font-size:10px;padding:3px 6px">${fmtDate(m.order.orderDate)}</td><td style="font-size:10px;padding:3px 6px">${m.order.branch||m.order.vendor||'—'}</td><td style="font-size:10px;padding:3px 6px">${m.order.status}</td><td style="font-size:10px;padding:3px 6px;text-align:right">${m.order.items?.length||0}</td></tr>`).join('');
  pv.innerHTML=`<div style="background:#FEF3C7;border:1px solid #FCD34D;border-radius:6px;padding:10px"><div style="font-size:12px;color:#92400E;font-weight:700;margin-bottom:6px">⚠ ${matches.length} order(s) will be permanently deleted${matches.length>30?' — showing first 30':''}</div><div style="max-height:160px;overflow:auto;border:1px solid #FCD34D;border-radius:4px;background:#fff"><table style="font-size:10px;width:100%"><thead style="position:sticky;top:0;background:#FEF3C7"><tr><th style="text-align:left;padding:4px 6px">Order #</th><th style="text-align:left;padding:4px 6px">Source</th><th style="text-align:left;padding:4px 6px">Order Date</th><th style="text-align:left;padding:4px 6px">Branch/Vendor</th><th style="text-align:left;padding:4px 6px">Status</th><th style="text-align:right;padding:4px 6px">Items</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
function confirmBulkDelete(){
  const from=normDate(document.getElementById('bdFrom').value);
  const to=normDate(document.getElementById('bdTo').value);
  const type=document.getElementById('bdType').value;
  const reason=document.getElementById('bdR').value;
  const remarks=document.getElementById('bdRm').value.trim();
  const conf=document.getElementById('bdC').value.trim();
  if(!from||!to)return alert('Select valid date range');
  if(from>to)return alert('From date is after To date');
  if(!reason)return alert('Select a reason');
  if(!remarks||remarks.length<5)return alert('Provide remarks (at least 5 characters)');
  if(conf!=='DELETE')return alert('Type DELETE in capital letters to confirm');
  const sources=type==='plant'?['plantOrders']:type==='vendor'?['vendorOrders']:['plantOrders','vendorOrders'];
  const batchId='BULK-'+Date.now().toString(36).toUpperCase();
  const batchTs=TD+' '+new Date().toLocaleTimeString();
  let count=0;
  sources.forEach(s=>{
    const kept=[];
    (D[s]||[]).forEach(o=>{
      const dt=normDate(o.orderDate);
      if(dt>=from&&dt<=to){
        D.deletionLogs.push({orderNo:o.orderNo,type:s==='plantOrders'?'Plant':'Vendor',action:'Bulk Deleted',reason,remarks,batchId,batchRange:from+' → '+to,prevStatus:o.status,by:CU.name,on:batchTs,itemCount:o.items?.length||0,snapshot:JSON.stringify(o)});
        D.transit=D.transit.filter(t=>t.sourceOrderNo!==o.orderNo);
        count++;
      } else kept.push(o);
    });
    D[s]=kept;
  });
  sv();closeM();toast(`🗑️ ${count} order(s) deleted in batch ${batchId}`);rerender();
}

function restoreFromLog(idx){
  if(!canApprove('delete-orders')&&!canApprove('cancel-orders'))return toast('You do not have permission to restore');
  const log=D.deletionLogs[idx];if(!log)return;
  if(!log.snapshot)return toast('No snapshot available for this entry');
  try{
    const order=JSON.parse(log.snapshot);
    const target=log.type==='Plant'?'plantOrders':'vendorOrders';
    if(D[target].find(o=>o.orderNo===order.orderNo))return toast('Order '+order.orderNo+' already exists — restore aborted');
    if(log.action==='Cancelled'){order.status=order.prevStatusBeforeCancel||'Pending';delete order.cancelledOn;delete order.cancelledBy;delete order.cancelReason;delete order.cancelRemarks;delete order.prevStatusBeforeCancel}
    D[target].push(order);
    D.deletionLogs.splice(idx,1);
    D.undoLogs.push({orderNo:order.orderNo,action:'Restored from '+log.action+' Log',prevStatus:log.action,newStatus:order.status||'Pending',by:CU.name,on:TD+' '+new Date().toLocaleTimeString()});
    sv();toast('✓ Order '+order.orderNo+' restored');rerender();
  }catch(e){toast('Restore failed: '+e.message)}
}

// View cancelled orders (filterable list, SCM only)
function viewCancelledOrders(){
  if(CU.role!=='scm')return toast('Only SCM can view this');
  const cancelled=[...D.plantOrders.filter(o=>o.status==='Cancelled').map(o=>({...o,_src:'Plant'})),...D.vendorOrders.filter(o=>o.status==='Cancelled').map(o=>({...o,_src:'Vendor'}))];

// ══════════ SECTION RENDERERS ══════════
// Dashboard filter helper
function dashFilter(orders){
  return orders.filter(o=>{
    if(DASH_FROM&&o.committedDate&&normDate(o.committedDate)<normDate(DASH_FROM))return false;
    if(DASH_TO&&o.committedDate&&normDate(o.committedDate)>normDate(DASH_TO))return false;
    if(DASH_LOC==='plant')return o._dashSrc==='plant';
    if(DASH_LOC==='vendor')return o._dashSrc==='vendor';
    return true;
  });
}
function dashFilterClosed(cls){
  return cls.filter(o=>{
    if(DASH_FROM&&o.committedDate&&normDate(o.committedDate)<normDate(DASH_FROM))return false;
    if(DASH_TO&&o.committedDate&&normDate(o.committedDate)>normDate(DASH_TO))return false;
    if(DASH_LOC==='plant'&&o.sourceType!=='Plant')return false;
    if(DASH_LOC==='vendor'&&o.sourceType!=='Vendor')return false;
    return true;
  });
}
function getM(){
  const allPl=D.plantOrders.map(o=>({...o,_dashSrc:'plant'}));
  const allVn=D.vendorOrders.map(o=>({...o,_dashSrc:'vendor'}));
  const allOrders=[...allPl,...allVn];
  const fOrders=dashFilter(allOrders);
  const fClosed=dashFilterClosed(D.closed);
  const plP=fOrders.filter(o=>o._dashSrc==='plant'&&o.status!=='Dispatched'&&o.status!=='Cancelled').length;
  const vnP=fOrders.filter(o=>o._dashSrc==='vendor'&&o.status!=='Dispatched'&&o.status!=='Cancelled').length;
  const trN=D.transit.length;const clN=fClosed.length;
  const rdyD=fOrders.filter(o=>(o.status==='Ready for Dispatch'||o.status==='Ready for Pickup')).length;
  const delayed=fOrders.filter(o=>o.committedDate&&new Date(o.committedDate)<new Date()&&o.status!=='Dispatched'&&o.status!=='Cancelled').length;
  // OTIF Negative scoring from closed
  let otifSum=0,otifCount=0,otdSum=0,otdCount=0;
  fClosed.forEach(c=>{
    const score=calcOTIFscore(c.committedDate,c.dispatchDate);
    if(score!=null){otifSum+=score;otifCount++}
    // OTD: find original order to check 75% dispatch
    const orig=[...D.plantOrders,...D.vendorOrders].find(o=>o.orderNo===c.sourceOrderNo);
    if(orig){const otd=calcOTDscore(orig,c.committedDate,c.dispatchDate);if(otd!=null){otdSum+=otd;otdCount++}}
  });
  const avgOTIF=otifCount?(otifSum/otifCount):0;
  const avgOTD=otdCount?(otdSum/otdCount):0;
  return{plP,vnP,trN,clN,rdyD,delayed,avgOTIF,avgOTD,otifCount,otdCount,fClosed,total:fOrders.length};
}

// Both honor DASH_LOC (the source toggle): '' = All, 'plant' = plant only, 'vendor' = vendor only.
// Overloaded Dates is plant-capacity-specific, so it's suppressed entirely when Vendor is selected.
function rDashAlerts(){
  let h='';
  // ── At-Risk Orders: committed date within 3 days or overdue, not ready/dispatched ──
  // Pick the source pool based on DASH_LOC so the count matches what the user has selected.
  const plantPool = D.plantOrders.filter(o=>o.status!=='Dispatched'&&o.status!=='Cancelled').map(o=>({...o,_src:'Plant'}));
  const vendorPool = D.vendorOrders.filter(o=>o.status!=='Dispatched'&&o.status!=='Cancelled').map(o=>({...o,_src:'Vendor'}));
  const allAct = DASH_LOC==='plant' ? plantPool : DASH_LOC==='vendor' ? vendorPool : [...plantPool,...vendorPool];
  const risk=allAct.filter(o=>{if(!o.committedDate)return false;const dd=daysDiff(TD,o.committedDate);return dd!=null&&dd<=3&&!['Ready for Dispatch','Ready for Pickup','Dispatched'].includes(o.status)}).sort((a,b)=>(a.committedDate||'').localeCompare(b.committedDate||''));
  if(risk.length){
    const srcSuffix = DASH_LOC==='plant' ? ' — Plant' : DASH_LOC==='vendor' ? ' — Vendor' : '';
    h+=`<div class="card" style="border-left:3px solid #DC2626"><div class="card-h" style="background:#FEF2F2"><h3 style="color:#DC2626">\u26A0 At-Risk Orders (${risk.length})${srcSuffix}</h3></div><div class="card-b" style="padding:10px 16px">${tbl([{k:'orderNo',l:'Order #',m:1},{k:'_src',l:'Source'},{k:'branch',l:'Branch'},{k:'status',l:'Status',r:r=>bdg(r.status)},{k:'committedDate',l:'Committed',m:1,r:r=>{const dd=daysDiff(TD,r.committedDate);const c=dd<0?'#DC2626':dd===0?'#F59E0B':'#1F2937';return`<span style="color:${c};font-weight:700">${fmtDate(r.committedDate)}</span> <span style="font-size:10px;color:${c}">${dd<0?dd+'d overdue':dd===0?'TODAY':dd+'d left'}</span>`}},{k:'_pcs',l:'Pending',r:r=>`<b style="color:#DC2626">${orderPendPcs(r)} PCS</b>`}],risk,'220px')}</div></div>`;
  }
  // ── Overloaded Dispatch Dates: plant-capacity (25,000 NA/day) is a plant-only concept ──
  // Hide entirely when the user has Vendor selected — capacity overload doesn't apply to vendor orders.
  if(DASH_LOC!=='vendor'){
    const CAP=(D.capacity?.na)||25000;const dNA={};
    D.plantOrders.filter(o=>o.status!=='Dispatched'&&o.status!=='Cancelled'&&o.committedDate).forEach(o=>{const dt=normDate(o.committedDate).slice(0,10);if(!dNA[dt])dNA[dt]=0;dNA[dt]+=orderTotalNA(o)});
    const over=Object.entries(dNA).filter(([d,na])=>na>CAP).sort((a,b)=>a[0].localeCompare(b[0])).slice(0,5);
    if(over.length)h+=`<div class="card" style="border-left:3px solid #F59E0B"><div class="card-h" style="background:#FFFBEB"><h3 style="color:#92400E">\uD83D\uDD25 Overloaded Plant Dates (${over.length}) \u2014 NA > ${CAP.toLocaleString()}</h3></div><div class="card-b" style="padding:10px 16px"><div class="tbl-wrap" style="max-height:180px"><table><thead><tr><th>Date</th><th>Total NA</th><th>Capacity</th><th>Overload</th></tr></thead><tbody>${over.map(([dt,na])=>`<tr><td class="mono" style="font-weight:600">${fmtDate(dt)}</td><td style="font-weight:700;color:#DC2626">${Math.round(na).toLocaleString()}</td><td>${CAP.toLocaleString()}</td><td style="color:#DC2626;font-weight:700">${Math.round(na/CAP*100)}%</td></tr>`).join('')}</tbody></table></div></div></div>`;
  }
  return h;
}

function rOTIF(){
  if(!D.closed.length)return'<div class="empty">No delivered orders yet. OTIF is calculated when shipments are received (GRN).</div>';
  const ft=VM;
  const filtered=ft==='plant'?D.closed.filter(o=>o.sourceType==='Plant'):ft==='vendor'?D.closed.filter(o=>o.sourceType==='Vendor'):D.closed;
  if(!filtered.length)return`<div class="filters"><div class="tab-bar"><button class="tab-b ${VM==='order'?'on':''}" onclick="VM='order';rerender()">All</button><button class="tab-b ${VM==='plant'?'on':''}" onclick="VM='plant';rerender()">Plant</button><button class="tab-b ${VM==='vendor'?'on':''}" onclick="VM='vendor';rerender()">Vendor</button></div></div><div class="empty">No delivered orders for this source yet.</div>`;
  // Calculate scores
  let otifSum=0,otifCt=0,onTime=0,grace=0,late=0;
  filtered.forEach(o=>{const s=calcOTIFscore(o.committedDate,o.dispatchDate);if(s!=null){otifSum+=s;otifCt++;if(s>=1)onTime++;else if(s>=0)grace++;else late++}});
  const avgOTIF=otifCt?(otifSum/otifCt):0;
  const gc=v=>v>=0.85?'#16A34A':v>=0?'#F59E0B':'#DC2626';
  return`<div class="filters"><div class="tab-bar"><button class="tab-b ${VM==='order'?'on':''}" onclick="VM='order';rerender()">All</button><button class="tab-b ${VM==='plant'?'on':''}" onclick="VM='plant';rerender()">Plant</button><button class="tab-b ${VM==='vendor'?'on':''}" onclick="VM='vendor';rerender()">Vendor</button></div></div>
  <div class="info-box">★ <b>OTIF Negative Policy:</b> On-time (≤0 days) = +1.00 | Grace (1–3 days) = 0.00 | Late (&gt;3 days) = −(delay−3)×0.25 (capped at −1.00)</div>
  <div class="kpi-grid" style="grid-template-columns:repeat(5,1fr)">
    <div class="kpi"><div class="bar" style="background:#2563EB"></div><div class="lbl">Total Delivered</div><div class="val">${otifCt}</div></div>
    <div class="kpi"><div class="bar" style="background:${gc(avgOTIF)}"></div><div class="lbl">Avg OTIF Score</div><div class="val" style="color:${gc(avgOTIF)}">${avgOTIF>=0?'+':''}${avgOTIF.toFixed(2)}</div></div>
    <div class="kpi"><div class="bar" style="background:#16A34A"></div><div class="lbl">On-Time (+1)</div><div class="val" style="color:#16A34A">${onTime}</div></div>
    <div class="kpi"><div class="bar" style="background:#F59E0B"></div><div class="lbl">Grace (0)</div><div class="val" style="color:#F59E0B">${grace}</div></div>
    <div class="kpi"><div class="bar" style="background:#DC2626"></div><div class="lbl">Late (negative)</div><div class="val" style="color:#DC2626">${late}</div></div>
  </div>
  <div class="card"><div class="card-h"><h3>OTIF Score by Destination</h3></div><div class="card-b"><div class="chart-c"><canvas id="cOTIF"></canvas></div></div></div>
  <div class="card"><div class="card-h"><h3>OTIF Detail — ${filtered.length} orders</h3>${expBtn('expOTIF()')}</div><div class="card-b">${tbl([
    {k:'sourceOrderNo',l:'Order #',m:1},{k:'sourceType',l:'Source'},{k:'destination',l:'Destination'},
    {k:'orderDate',l:'Order Date',m:1,r:r=>fmtDate(r.orderDate)},{k:'committedDate',l:'Committed',m:1,r:r=>`<span class="cd-cell">${fmtDate(r.committedDate)||'—'}</span>`},
    {k:'dispatchDate',l:'Dispatched',m:1,r:r=>fmtDate(r.dispatchDate)},
    {k:'_delay',l:'Delay',r:r=>{const d=daysDiff(r.committedDate,r.dispatchDate);return d==null?'—':d<=0?`<span style="color:#16A34A">0d</span>`:`<span style="color:#DC2626;font-weight:600">${d}d</span>`}},
    {k:'_score',l:'OTIF Score',r:r=>{const s=calcOTIFscore(r.committedDate,r.dispatchDate);return fmtScore(s)}},
    {k:'_otd',l:'OTD Score',r:r=>{const orig=[...D.plantOrders,...D.vendorOrders].find(o=>o.orderNo===r.sourceOrderNo);return orig?fmtScore(calcOTDscore(orig,r.committedDate,r.dispatchDate)):'—'}},
    {k:'grnDate',l:'GRN Date',m:1,r:r=>fmtDate(r.grnDate)}
  ],filtered,'380px')}</div></div>`;
}

function rLeadTime(){
  if(!D.closed.length)return'<div class="empty">No delivered orders yet. Lead time is calculated from GRN Date − Order Date.</div>';
  const ft=VM;
  const filtered=ft==='plant'?D.closed.filter(o=>o.sourceType==='Plant'):ft==='vendor'?D.closed.filter(o=>o.sourceType==='Vendor'):D.closed;
  if(!filtered.length)return`<div class="filters"><div class="tab-bar"><button class="tab-b ${VM==='order'?'on':''}" onclick="VM='order';rerender()">All</button><button class="tab-b ${VM==='plant'?'on':''}" onclick="VM='plant';rerender()">Plant</button><button class="tab-b ${VM==='vendor'?'on':''}" onclick="VM='vendor';rerender()">Vendor</button></div></div><div class="empty">No delivered orders for this source yet.</div>`;
  const leads=filtered.map(o=>o.totalLeadDays).filter(d=>d!=null&&d>=0);
  const avg=leads.length?Math.round(leads.reduce((a,v)=>a+v,0)/leads.length):'-';
  const min=leads.length?Math.min(...leads):'-';
  const max=leads.length?Math.max(...leads):'-';
  // Bucket distribution
  const buckets={'0-7':0,'8-14':0,'15-21':0,'22-30':0,'30+':0};
  leads.forEach(d=>{if(d<=7)buckets['0-7']++;else if(d<=14)buckets['8-14']++;else if(d<=21)buckets['15-21']++;else if(d<=30)buckets['22-30']++;else buckets['30+']++});
  // By destination
  const byDest={};filtered.forEach(o=>{const d=o.destination||'?';if(!byDest[d])byDest[d]={dest:d,total:0,sumLead:0,count:0};byDest[d].total++;if(o.totalLeadDays!=null){byDest[d].sumLead+=o.totalLeadDays;byDest[d].count++}});
  Object.values(byDest).forEach(w=>{w.avgLead=w.count?Math.round(w.sumLead/w.count):'-'});
  return`<div class="filters"><div class="tab-bar"><button class="tab-b ${VM==='order'?'on':''}" onclick="VM='order';rerender()">All</button><button class="tab-b ${VM==='plant'?'on':''}" onclick="VM='plant';rerender()">Plant</button><button class="tab-b ${VM==='vendor'?'on':''}" onclick="VM='vendor';rerender()">Vendor</button></div></div>
  <div class="info-box">★ <b>Lead Time</b> = GRN Date − Order Date (end-to-end, in days).</div>
  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
    <div class="kpi"><div class="bar" style="background:#2563EB"></div><div class="lbl">Orders Measured</div><div class="val">${leads.length}</div></div>
    <div class="kpi"><div class="bar" style="background:#F59E0B"></div><div class="lbl">Avg Lead Time</div><div class="val">${avg}</div><div class="sub">days</div></div>
    <div class="kpi"><div class="bar" style="background:#16A34A"></div><div class="lbl">Shortest</div><div class="val">${min}</div><div class="sub">days</div></div>
    <div class="kpi"><div class="bar" style="background:#DC2626"></div><div class="lbl">Longest</div><div class="val">${max}</div><div class="sub">days</div></div>
  </div>
  <div class="chart-grid">
    <div class="card"><div class="card-h"><h3>Lead Time Distribution</h3></div><div class="card-b"><div class="chart-c"><canvas id="cLTD"></canvas></div></div></div>
    <div class="card"><div class="card-h"><h3>Lead Time by Destination</h3></div><div class="card-b"><div class="chart-c"><canvas id="cLTB"></canvas></div></div></div>
  </div>
  <div class="card"><div class="card-h"><h3>Destination-wise Avg Lead Time</h3></div><div class="card-b">${tbl([
    {k:'dest',l:'Destination'},{k:'total',l:'Deliveries'},{k:'avgLead',l:'Avg Lead Time (days)',r:r=>`<span style="font-weight:700;font-size:14px;color:${typeof r.avgLead==='number'&&r.avgLead>21?'#DC2626':r.avgLead>14?'#F59E0B':'#16A34A'}">${r.avgLead} days</span>`}
  ],Object.values(byDest))}</div></div>
  <div class="card"><div class="card-h"><h3>Order-wise Lead Time — ${filtered.length}</h3>${expBtn('expLeadTime()')}</div><div class="card-b">${tbl([
    {k:'sourceOrderNo',l:'Order #',m:1},{k:'sourceType',l:'Source'},{k:'destination',l:'Destination'},
    {k:'orderDate',l:'Order Date',m:1,r:r=>fmtDate(r.orderDate)},{k:'dispatchDate',l:'Dispatched',m:1,r:r=>fmtDate(r.dispatchDate)},{k:'grnDate',l:'GRN Date',m:1,r:r=>fmtDate(r.grnDate)},
    {k:'totalLeadDays',l:'Lead Time (days)',r:r=>{const d=r.totalLeadDays;if(d==null)return'—';const c=d>21?'#DC2626':d>14?'#F59E0B':'#16A34A';return`<span style="font-weight:700;color:${c}">${d} days</span>`}}
  ],filtered,'350px')}</div></div>`;
}

// ══════════ DISPATCH SCHEDULE — CONDENSED & DETAILED ══════════
function rDispSchedule(){
  // Snap to Plant for users without vendor access so the page never lands on a restricted state
  if(CAL_T==='vendor' && !can('vendorOrders','V'))CAL_T='plant';
  const PLANT_CAP=(D.capacity?.na)||25000;const isPlant=CAL_T==='plant';
  const src=CAL_T==='plant'?D.plantOrders:D.vendorOrders;

  // ── STEP 1: Build base data grouped by Date + Location ──
  const dlGroups={};// key: date||location → {date,location,totalNA,totalWt,orderNos:[]}
  const dateAgg={};// key: date → {totalNA,totalWt,locations:Set,orderNos:Set}
  src.forEach(o=>{
    if(o.status==='Dispatched')return;
    const dt=(o.committedDate||o.factoryEDD||'').slice(0,10);
    if(!dt||dt.length<10)return;
    const loc=o.dispatchLocation||'Not Assigned';
    const dlKey=dt+'||'+loc;
    if(!dlGroups[dlKey])dlGroups[dlKey]={date:dt,location:loc,totalNA:0,totalWt:0,orderNos:[]};
    if(!dateAgg[dt])dateAgg[dt]={date:dt,totalNA:0,totalWt:0,locations:new Set(),orderNos:new Set()};
    let oNA=0,oWt=0;
    (o.items||[]).forEach(it=>{oNA+=parseFloat(it.qtyNA)||0;oWt+=parseFloat(it.weight)||0;});
    dlGroups[dlKey].totalNA+=oNA;dlGroups[dlKey].totalWt+=oWt;
    if(!dlGroups[dlKey].orderNos.includes(o.orderNo))dlGroups[dlKey].orderNos.push(o.orderNo);
    dateAgg[dt].totalNA+=oNA;dateAgg[dt].totalWt+=oWt;
    dateAgg[dt].locations.add(loc);dateAgg[dt].orderNos.add(o.orderNo);
  });

  const dlRows=Object.values(dlGroups).sort((a,b)=>a.date.localeCompare(b.date)||a.location.localeCompare(b.location));
  const dateRows=Object.values(dateAgg).sort((a,b)=>a.date.localeCompare(b.date)).map(d=>({
    date:d.date,totalNA:d.totalNA,totalWt:d.totalWt,
    totalOrders:d.orderNos.size,locations:[...d.locations].join(', '),
    _locArr:[...d.locations],_orderArr:[...d.orderNos]}));

  const grandNA=dateRows.reduce((a,r)=>a+r.totalNA,0);
  const grandWt=dateRows.reduce((a,r)=>a+r.totalWt,0);
  const grandOrders=new Set(dlRows.flatMap(r=>r.orderNos)).size;
  const overloadDays=isPlant?dateRows.filter(d=>d.totalNA>PLANT_CAP).length:0;

  // ── HEADER ──
  let h=`<div class="filters"><div class="tab-bar"><button class="tab-b ${CAL_T==='plant'?'on':''}" onclick="CAL_T='plant';rerender()">Plant Schedule</button>${can('vendorOrders','V')?`<button class="tab-b ${CAL_T==='vendor'?'on':''}" onclick="CAL_T='vendor';rerender()">Vendor Schedule</button>`:''}</div><div style="flex:1"></div><div class="tab-bar"><button class="tab-b ${DISP_VW==='condensed'?'on':''}" onclick="DISP_VW='condensed';rerender()">Condensed</button><button class="tab-b ${DISP_VW==='detailed'?'on':''}" onclick="DISP_VW='detailed';rerender()">Detailed</button></div>${expBtn('expDispSchedule()','Export Schedule')}</div>`;
  h+=`<div class="info-box">Dispatch schedule based on <b>SCM Committed Date</b>.${isPlant?` Plant capacity: <b>${PLANT_CAP.toLocaleString()} NA/day</b>.`:''}</div>`;

  // ── KPI CARDS ──
  h+=`<div class="kpi-grid" style="grid-template-columns:repeat(${isPlant?4:3},1fr)">
    <div class="kpi"><div class="bar" style="background:#2563EB"></div><div class="lbl">Total NA</div><div class="val">${grandNA>=1000?(grandNA/1000).toFixed(1)+'K':grandNA.toFixed(0)}</div></div>
    <div class="kpi"><div class="lbl">Total Orders</div><div class="val">${grandOrders}</div></div>
    <div class="kpi"><div class="lbl">Dispatch Dates</div><div class="val">${dateRows.length}</div></div>
    ${isPlant?`<div class="kpi"><div class="bar" style="background:${overloadDays?'#DC2626':'#16A34A'}"></div><div class="lbl">Overloaded Days</div><div class="val" style="color:${overloadDays?'#DC2626':'#16A34A'}">${overloadDays}</div><div class="sub">&gt; ${PLANT_CAP.toLocaleString()} NA</div></div>`:''}</div>`;

  if(!dateRows.length){h+=`<div class="empty">No orders with SCM Committed Date found. Set committed dates to see the dispatch schedule.</div>`;return h}

  // ══════════ CONDENSED VIEW — One row per Date, Locations transposed ══════════
  if(DISP_VW==='condensed'){
    h+=`<div class="card"><div class="card-h"><h3>Condensed Dispatch Schedule — ${dateRows.length} dates</h3></div><div class="card-b">`;
    h+=`<div class="tbl-wrap" style="max-height:560px"><table><thead><tr>
      <th class="sortable" onclick="doSort('date')">Date</th>
      <th class="sortable" onclick="doSort('totalNA')">Total NA</th>
      <th class="sortable" onclick="doSort('totalWt')">Total Weight (Tons)</th>
      <th class="sortable" onclick="doSort('totalOrders')">Total Orders</th>
      <th>Locations</th>
      ${isPlant?'<th>Capacity</th>':''}
    </tr></thead><tbody>`;
    const cSorted=SORT.col?[...dateRows].sort((a,b)=>{let va=a[SORT.col]??'',vb=b[SORT.col]??'';if(typeof va==='number')return SORT.dir==='asc'?va-vb:vb-va;return SORT.dir==='asc'?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va))}):dateRows;
    cSorted.forEach(r=>{
      const gc=isPlant?(r.totalNA>PLANT_CAP?'#DC2626':r.totalNA>PLANT_CAP*0.8?'#F59E0B':'#16A34A'):'#2563EB';
      const isPast=r.date<TD;const isToday=r.date===TD;
      const capPct=isPlant?(r.totalNA/PLANT_CAP*100).toFixed(0):0;
      h+=`<tr style="border-left:3px solid ${gc}">
        <td class="mono" style="font-weight:700;color:${isPast?'var(--rd)':isToday?'var(--acl)':'var(--tx)'}">${fmtDate(r.date)}${isToday?' <span style="font-size:9px;color:var(--ac)">(Today)</span>':''}${isPast?' <span style="font-size:9px;color:var(--rd)">(Overdue)</span>':''}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-weight:700;color:${gc}">${r.totalNA.toLocaleString(undefined,{maximumFractionDigits:1})}</td>
        <td style="font-family:'JetBrains Mono',monospace">${r.totalWt.toLocaleString(undefined,{maximumFractionDigits:1})}</td>
        <td style="font-weight:700;text-align:center">${r.totalOrders}</td>
        <td style="font-size:11px;max-width:300px;white-space:normal;line-height:1.6">${r._locArr.map(l=>`<span style="display:inline-block;margin:1px 4px 1px 0;padding:2px 7px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:4px;font-size:10px;color:#1D4ED8;font-weight:500">${l}</span>`).join('')}</td>
        ${isPlant?`<td><div style="display:flex;align-items:center;gap:6px"><div style="width:50px;height:5px;border-radius:3px;background:var(--bd);overflow:hidden"><div style="width:${Math.min(capPct,100)}%;height:100%;border-radius:3px;background:${gc}"></div></div><span style="font-size:10px;color:${gc};font-family:'JetBrains Mono',monospace">${capPct}%</span></div></td>`:''}</tr>`;
    });
    // ── DAY-WISE GRAND TOTAL ROW ──
    h+=`<tr style="background:#EFF6FF;border-top:2px solid #2563EB;font-weight:700">
      <td style="color:#1D4ED8;font-weight:700">GRAND TOTAL</td>
      <td style="font-family:'JetBrains Mono',monospace;font-weight:800;color:#1D4ED8">${grandNA.toLocaleString(undefined,{maximumFractionDigits:1})}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-weight:700">${grandWt.toLocaleString(undefined,{maximumFractionDigits:1})}</td>
      <td style="font-weight:700;text-align:center">${grandOrders}</td>
      <td style="font-size:11px;color:#6B7280">${new Set(dlRows.map(r=>r.location)).size} unique locations</td>
      ${isPlant?'<td></td>':''}</tr>`;
    h+=`</tbody></table></div></div></div>`;
  }

  // ══════════ DETAILED VIEW — Date + Location, Order Numbers transposed ══════════
  if(DISP_VW==='detailed'){
    h+=`<div class="card"><div class="card-h"><h3>Detailed Dispatch Schedule — ${dlRows.length} rows</h3></div><div class="card-b">`;
    h+=`<div class="tbl-wrap" style="max-height:560px"><table><thead><tr>
      <th class="sortable" onclick="doSort('date')">Date</th>
      <th class="sortable" onclick="doSort('location')">Location</th>
      <th class="sortable" onclick="doSort('totalNA')">Total NA</th>
      <th class="sortable" onclick="doSort('totalWt')">Total Weight (Tons)</th>
      <th>Orders</th>
      <th>Order Numbers</th>
    </tr></thead><tbody>`;
    const dSorted=SORT.col?[...dlRows].sort((a,b)=>{let va=a[SORT.col]??'',vb=b[SORT.col]??'';if(typeof va==='number')return SORT.dir==='asc'?va-vb:vb-va;return SORT.dir==='asc'?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va))}):dlRows;

    let prevDt='';
    dSorted.forEach(r=>{
      const isNewDate=r.date!==prevDt;
      const dayData=dateAgg[r.date];const dayNA=dayData?.totalNA||0;
      const gc=isPlant?(dayNA>PLANT_CAP?'#DC2626':dayNA>PLANT_CAP*0.8?'#F59E0B':'#16A34A'):'#2563EB';
      const isPast=r.date<TD;const isToday=r.date===TD;

      // ── Day-wise subtotal row when date changes ──
      if(isNewDate&&prevDt&&dateAgg[prevDt]){
        const pd=dateAgg[prevDt];
        h+=`<tr style="background:#F9FAFB;border-top:1px solid #D1D5DB">
          <td colspan="2" style="font-weight:700;color:#4B5563;font-size:12px;text-align:right;padding-right:16px">Day Total — ${fmtDate(prevDt)}</td>
          <td style="font-family:'JetBrains Mono',monospace;font-weight:700;color:#1D4ED8">${pd.totalNA.toLocaleString(undefined,{maximumFractionDigits:1})}</td>
          <td style="font-family:'JetBrains Mono',monospace;font-weight:700">${pd.totalWt.toLocaleString(undefined,{maximumFractionDigits:1})}</td>
          <td style="font-weight:700">${pd.orderNos.size}</td><td></td></tr>`;
      }
      prevDt=r.date;

      h+=`<tr style="border-left:3px solid ${gc}">
        <td class="mono" style="font-weight:${isNewDate?'700':'400'};color:${isPast?'var(--rd)':isToday?'var(--acl)':'var(--tx)'}">${isNewDate?fmtDate(r.date):''}${isNewDate&&isToday?' <span style="font-size:9px;color:var(--ac)">(Today)</span>':''}${isNewDate&&isPast?' <span style="font-size:9px;color:var(--rd)">(Overdue)</span>':''}</td>
        <td style="font-weight:500">${r.location}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-weight:700;color:${gc}">${r.totalNA.toLocaleString(undefined,{maximumFractionDigits:1})}</td>
        <td style="font-family:'JetBrains Mono',monospace">${r.totalWt.toLocaleString(undefined,{maximumFractionDigits:1})}</td>
        <td style="font-weight:600">${r.orderNos.length}</td>
        <td style="font-size:10px;max-width:340px;white-space:normal;line-height:1.6">${r.orderNos.map(n=>{const club=findOrderClub(n);return`<span class="mono" style="display:inline-block;margin:1px 3px 1px 0;padding:2px 6px;background:${club?'#FEF3C7':'var(--bg)'};border:1px solid ${club?'#FDE68A':'var(--bd)'};border-radius:3px;font-size:10px"${club?` title="In club ${club.id}"`:''}>${n}${club?` <span style="color:#92400E;font-weight:600">🚛${club.id.replace('CLUB/','').replace('/25-26','')}</span>`:''}</span>`}).join('')}</td>
      </tr>`;
    });
    // ── Last day subtotal ──
    if(prevDt&&dateAgg[prevDt]){
      const pd=dateAgg[prevDt];
      h+=`<tr style="background:#F9FAFB;border-top:1px solid #D1D5DB">
        <td colspan="2" style="font-weight:700;color:#4B5563;font-size:12px;text-align:right;padding-right:16px">Day Total — ${fmtDate(prevDt)}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-weight:700;color:#1D4ED8">${pd.totalNA.toLocaleString(undefined,{maximumFractionDigits:1})}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-weight:700">${pd.totalWt.toLocaleString(undefined,{maximumFractionDigits:1})}</td>
        <td style="font-weight:700">${pd.orderNos.size}</td><td></td></tr>`;
    }
    // ── Grand total ──
    h+=`<tr style="background:#EFF6FF;border-top:2px solid #2563EB;font-weight:700">
      <td colspan="2" style="color:#1D4ED8;font-weight:700;text-align:right;padding-right:16px">GRAND TOTAL</td>
      <td style="font-family:'JetBrains Mono',monospace;font-weight:800;color:#1D4ED8">${grandNA.toLocaleString(undefined,{maximumFractionDigits:1})}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-weight:700">${grandWt.toLocaleString(undefined,{maximumFractionDigits:1})}</td>
      <td style="font-weight:700">${grandOrders}</td><td style="font-size:11px;color:#6B7280">${new Set(dlRows.map(r=>r.location)).size} locations</td></tr>`;
    h+=`</tbody></table></div></div></div>`;
  }
  return h;
}

// ══════════ LOGS / MASTERS / USERS ══════════
function rLogs(){
  // Build cancellation and deletion log views (sub-section of audit logs)
  const cancelLogs=(D.deletionLogs||[]).filter(l=>l.action==='Cancelled');
  const deleteLogs=(D.deletionLogs||[]).filter(l=>l.action==='Deleted'||l.action==='Bulk Deleted');
  return`<div class="card"><div class="card-h"><h3>Date Change Log — ${D.dateLogs.length}</h3>${expBtn('expLogs()','Export All Logs')}</div><div class="card-b">${D.dateLogs.length?tbl([{k:'orderNo',l:'Order #',m:1},{k:'prevDate',l:'Previous',m:1,r:r=>fmtDate(r.prevDate)||r.prevDate},{k:'newDate',l:'New Date',m:1,r:r=>`<span class="cd-cell">${fmtDate(r.newDate)}</span>`},{k:'by',l:'By'},{k:'on',l:'When',m:1},{k:'changeNo',l:'#'}],D.dateLogs):'<div class="empty">No changes yet.</div>'}</div></div>
<div class="card"><div class="card-h"><h3>Undo / Reverse Log — ${D.undoLogs?.length||0}</h3></div><div class="card-b">${D.undoLogs?.length?tbl([{k:'orderNo',l:'Order #',m:1},{k:'action',l:'Action'},{k:'prevStatus',l:'From'},{k:'newStatus',l:'To'},{k:'by',l:'By'},{k:'on',l:'When',m:1}],D.undoLogs):'<div class="empty">No undo actions.</div>'}</div></div>
<div class="card"><div class="card-h"><h3>Conversion Log — ${D.convLogs.length}</h3></div><div class="card-b">${D.convLogs.length?tbl([{k:'stoNo',l:'STO',m:1},{k:'soNo',l:'SO',m:1},{k:'date',l:'Date',m:1,r:r=>fmtDate(r.date)},{k:'reason',l:'Reason'},{k:'user',l:'By'}],D.convLogs):'<div class="empty">No conversions.</div>'}</div></div>
<div class="card"><div class="card-h"><h3>⊘ Cancellation Log — ${cancelLogs.length}</h3></div><div class="card-b">${cancelLogs.length?tbl([{k:'orderNo',l:'Order #',m:1},{k:'type',l:'Source'},{k:'prevStatus',l:'Prev Status'},{k:'reason',l:'Reason'},{k:'remarks',l:'Remarks',r:r=>`<span style="white-space:normal;max-width:240px;display:inline-block">${r.remarks||'—'}</span>`},{k:'by',l:'By'},{k:'on',l:'When',m:1}],cancelLogs):'<div class="empty">No cancellations.</div>'}</div></div>
<div class="card"><div class="card-h"><h3>🗑 Deletion Log — ${deleteLogs.length}</h3>${CU.role==='scm'?'<span style="font-size:11px;color:var(--mu)">Snapshots preserved — restore from Data Management</span>':''}</div><div class="card-b">${deleteLogs.length?tbl([{k:'orderNo',l:'Order #',m:1},{k:'action',l:'Action'},{k:'type',l:'Source'},{k:'prevStatus',l:'Prev Status'},{k:'reason',l:'Reason'},{k:'remarks',l:'Remarks',r:r=>`<span style="white-space:normal;max-width:240px;display:inline-block">${r.remarks||'—'}</span>`},{k:'batchId',l:'Batch',r:r=>r.batchId||'—'},{k:'by',l:'By'},{k:'on',l:'When',m:1}],deleteLogs):'<div class="empty">No deletions.</div>'}</div></div>`;
}

// ══════════ DATA MANAGEMENT — SCM ONLY ══════════
function rDataAdmin(){
  if(CU.role!=='scm')return'<div class="empty">Access restricted to SCM administrators.</div>';
  const cancelledPlant=D.plantOrders.filter(o=>o.status==='Cancelled').length;
  const cancelledVendor=D.vendorOrders.filter(o=>o.status==='Cancelled').length;
  const totalCancelled=cancelledPlant+cancelledVendor;
  const totalDeleted=(D.deletionLogs||[]).filter(l=>l.action==='Deleted'||l.action==='Bulk Deleted').length;
  const recoverable=(D.deletionLogs||[]).filter(l=>l.snapshot).length;
  const recentDel=(D.deletionLogs||[]).slice().reverse().slice(0,50);

  let h=`<div class="info-box">🛡️ <b>Data Management — SCM Only.</b> Use these tools to handle wrong, duplicate, or test orders without resetting the entire dashboard. Every cancellation and deletion is captured with a full snapshot in the audit log and can be restored from this page.</div>`;

  // Stats KPIs
  h+=`<div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:18px">
    <div class="kpi"><div class="bar" style="background:#F59E0B"></div><div class="lbl">Cancelled Orders</div><div class="val" style="color:#B45309">${totalCancelled}</div><div class="sub">Plant ${cancelledPlant} · Vendor ${cancelledVendor}</div></div>
    <div class="kpi"><div class="bar" style="background:#DC2626"></div><div class="lbl">Deleted Orders</div><div class="val" style="color:#DC2626">${totalDeleted}</div><div class="sub">Hard-deleted records</div></div>
    <div class="kpi"><div class="bar" style="background:#16A34A"></div><div class="lbl">Restorable</div><div class="val" style="color:#16A34A">${recoverable}</div><div class="sub">Snapshots preserved</div></div>
    <div class="kpi"><div class="bar" style="background:#2563EB"></div><div class="lbl">Audit Entries</div><div class="val">${D.deletionLogs?.length||0}</div><div class="sub">Total log lines</div></div>
  </div>`;

  // Action cards
  h+=`<div class="chart-grid">
    <div class="card"><div class="card-h"><h3>⊘ Cancel a Wrong Order</h3></div><div class="card-b" style="padding:18px"><p style="font-size:13px;color:#4B5563;line-height:1.6;margin-bottom:14px">Soft-close a single order with a reason and remarks. The record is preserved and removed from active lists. Can be reactivated anytime.</p><div style="font-size:11px;color:var(--mu);margin-bottom:10px">→ Click the ⊘ icon on any order row in <b>Plant</b> or <b>Vendor Orders</b> page</div><button class="btn-out" style="width:100%" onclick="viewCancelledOrders()">View Cancelled Orders (${totalCancelled})</button></div></div>
    <div class="card"><div class="card-h"><h3>🗑 Delete a Single Order</h3></div><div class="card-b" style="padding:18px"><p style="font-size:13px;color:#4B5563;line-height:1.6;margin-bottom:14px">Permanently remove a duplicate or wrong order. A full snapshot is captured in the audit log so you can restore it later if needed.</p><div style="font-size:11px;color:var(--mu)">→ Click the 🗑 icon on any order row in <b>Plant</b> or <b>Vendor Orders</b> page</div></div></div>
  </div>`;

  // Bulk delete card — featured
  h+=`<div class="card" style="border-color:#FCA5A5"><div class="card-h" style="background:#FEF2F2"><h3>📅 Bulk Delete by Date Range</h3></div><div class="card-b" style="padding:18px"><p style="font-size:13px;color:#4B5563;line-height:1.6;margin-bottom:14px">Clean up an entire batch — useful when you've uploaded a wrong CSV or want to remove test data for a specific date. Shows a preview before deletion and saves a snapshot of every removed order in the audit log.</p><button class="btn-rd" style="font-size:13px;padding:9px 18px" onclick="bulkDeleteByDate()">🗑️ Open Bulk Delete Tool</button></div></div>`;

  // Recent activity table
  h+=`<div class="card"><div class="card-h"><h3>📋 Recent Activity — Latest 50</h3></div><div class="card-b">`;
  if(!recentDel.length){h+=`<div class="empty">No cancellations or deletions yet.</div>`}
  else{
    h+=`<div class="tbl-wrap" style="max-height:420px"><table><thead><tr><th>When</th><th>Action</th><th>Order #</th><th>Source</th><th>Prev Status</th><th>Reason</th><th>Remarks</th><th>By</th><th>Restore</th></tr></thead><tbody>`;
    recentDel.forEach((l,iRev)=>{
      const realIdx=D.deletionLogs.length-1-iRev;
      const actionBdg=l.action==='Cancelled'?'<span class="bdg" style="background:#FEF3C7;color:#92400E">⊘ Cancelled</span>':l.action==='Bulk Deleted'?'<span class="bdg" style="background:#FEE2E2;color:#991B1B">🗑 Bulk</span>':'<span class="bdg" style="background:#FEE2E2;color:#991B1B">🗑 Deleted</span>';
      h+=`<tr><td class="mono" style="font-size:11px">${l.on||'—'}</td><td>${actionBdg}</td><td class="mono">${l.orderNo}</td><td>${l.type}</td><td style="font-size:11px">${l.prevStatus||'—'}</td><td style="font-size:11px">${l.reason||'—'}</td><td style="font-size:11px;max-width:240px;white-space:normal">${l.remarks||'—'}</td><td style="font-size:11px">${l.by}</td><td>${l.snapshot?`<button class="act-btn" style="background:rgba(22,163,74,.12);color:var(--gn);font-size:10px" onclick="restoreFromLog(${realIdx})">↩ Restore</button>`:'<span style="font-size:10px;color:var(--dm)">—</span>'}</td></tr>`;
    });
    h+=`</tbody></table></div>`;
  }
  h+=`</div></div>`;

  return h;
}

// ══════════ ROLE TEMPLATE MANAGEMENT ══════════
// Templates come from two places:
//   • SYSTEM_ROLE_TEMPLATES (hardcoded defaults — always present)
//   • D.roleTemplates (user-created customs AND overrides of system templates, keyed by id match)
// Editing a system template writes an override to D.roleTemplates with the same id; merged view takes the override.
function getAllTemplates(){
  const overrides=(D.roleTemplates||[]).filter(t=>SYSTEM_ROLE_TEMPLATES.find(s=>s.id===t.id));
  const customs=(D.roleTemplates||[]).filter(t=>!SYSTEM_ROLE_TEMPLATES.find(s=>s.id===t.id));
  const merged=SYSTEM_ROLE_TEMPLATES.map(sys=>{
    const ov=overrides.find(o=>o.id===sys.id);
    if(ov)return{...sys,...ov,system:true,isModified:true};
    return{...sys,isModified:false};
  });
  return[...merged,...customs.map(c=>({...c,isModified:false}))];
}
function findTemplate(tplId){return getAllTemplates().find(t=>t.id===tplId)}

function viewTemplate(tplId){
  const t=findTemplate(tplId);if(!t)return;
  const secs={};Object.entries(MODULE_REGISTRY).forEach(([k,m])=>{if(!secs[m.sec])secs[m.sec]=[];secs[m.sec].push([k,m])});
  let body=`<div class="m-info"><b>${t.name}</b>${t.system?' <span class="bdg" style="background:#DBEAFE;color:#1E40AF;font-size:9px">SYSTEM</span>':' <span class="bdg" style="background:#FEF3C7;color:#92400E;font-size:9px">CUSTOM</span>'}${t.isModified?' <span class="bdg" style="background:#FEE2E2;color:#991B1B;font-size:9px">MODIFIED</span>':''}<br><span style="color:var(--mu)">${t.desc||''}</span>${t.dept?'<br>Default Dept: <b>'+t.dept+'</b>':''}</div>`;
  body+=`<div class="pm-container"><table class="pm-table"><thead><tr><th class="pm-mod">Module</th>${PERM_ORDER.map(p=>`<th><span class="pm-perm-badge" style="background:${PERM_DEFS[p].c}">${p}</span></th>`).join('')}</tr></thead><tbody>`;
  Object.entries(secs).forEach(([sec,mods])=>{
    body+=`<tr><td colspan="${PERM_ORDER.length+1}" class="pm-mod-section">${sec}</td></tr>`;
    mods.forEach(([k,m])=>{const v=t.modules?.[k]||'';body+=`<tr${m.restricted?' class="pm-restricted"':''}><td class="pm-mod">${m.restricted?'🔒 ':''}${m.ic} ${m.l}${m.restricted?' <span class="bdg" style="background:#FEE2E2;color:#991B1B;font-size:8px;margin-left:4px;padding:1px 5px">RESTRICTED</span>':''}</td>${PERM_ORDER.map(p=>`<td>${v.includes(p)?`<span class="pm-perm-badge" style="background:${PERM_DEFS[p].c}">✓</span>`:'<span style="color:#D1D5DB">—</span>'}</td>`).join('')}</tr>`});
  });
  body+=`</tbody></table></div>`;
  if(t.approvals?.length)body+=`<div style="font-size:12px;margin-top:12px"><b>Approval Authority:</b><br>${t.approvals.map(a=>`<span class="bdg" style="background:#F3E8FF;color:#6B21A8;margin:2px;display:inline-block">${APPROVAL_ACTIONS.find(x=>x.k===a)?.l||a}</span>`).join(' ')}</div>`;
  openM('Template — '+t.name,body);
}
function cloneTemplate(tplId){
  const src=findTemplate(tplId);if(!src)return;
  const newName=prompt('Name for the cloned template:',src.name+' (Copy)');if(!newName)return;
  const newTpl={id:'tpl_'+Date.now().toString(36),name:newName,desc:src.desc,dept:src.dept,system:false,modules:{...src.modules},approvals:[...(src.approvals||[])]};
  D.roleTemplates=D.roleTemplates||[];D.roleTemplates.push(newTpl);
  D.permLogs.push({on:TD+' '+new Date().toLocaleTimeString(),by:CU.name,action:'Template Cloned',target:newTpl.id,detail:`Cloned "${src.name}" → "${newName}"`});
  sv();toast('✓ Template cloned: '+newName);rerender();
}

// Edit a custom template — system templates are read-only (clone first to edit)
function editTemplate(tplId){
  const tpl=findTemplate(tplId);
  if(!tpl)return toast('Template not found');
  const isSystem=!!tpl.system;
  const isModified=!!tpl.isModified;
  const depts=(D.departments||[]).filter(d=>d.active!==false);
  // Build modules matrix grouped by section
  const secs={};Object.entries(MODULE_REGISTRY).forEach(([k,m])=>{if(!secs[m.sec])secs[m.sec]=[];secs[m.sec].push([k,m])});
  let matrixRows='';
  Object.entries(secs).forEach(([sec,mods])=>{
    matrixRows+=`<tr><td colspan="${PERM_ORDER.length+2}" class="pm-mod-section">${sec}</td></tr>`;
    mods.forEach(([key,m])=>{
      const cur=tpl.modules?.[key]||'';
      matrixRows+=`<tr${m.restricted?' class="pm-restricted" title="'+(m.restrictedNote||'Restricted module')+'"':''}><td class="pm-mod">${m.restricted?'🔒 ':''}${m.ic} ${m.l}${m.restricted?' <span class="bdg" style="background:#FEE2E2;color:#991B1B;font-size:8px;margin-left:4px;padding:1px 5px">RESTRICTED</span>':''}</td>`;
      matrixRows+=`<td><input type="checkbox" data-mod="${key}" data-perm="N" ${!cur?'checked':''} onchange="ufOnPermToggle(this)" title="No Access"></td>`;
      PERM_ORDER.forEach(p=>{
        const allowed=m.p.includes(p);const checked=cur.includes(p);
        matrixRows+=`<td>${allowed?`<input type="checkbox" data-mod="${key}" data-perm="${p}" ${checked?'checked':''} onchange="ufOnPermToggle(this)" title="${PERM_DEFS[p].l}">`:''}</td>`;
      });
      matrixRows+=`</tr>`;
    });
  });
  const permMatrix=`<div class="pm-container"><table class="pm-table"><thead><tr><th class="pm-mod">Module</th><th title="No Access">⊘</th>${PERM_ORDER.map(p=>`<th title="${PERM_DEFS[p].l}"><span class="pm-perm-badge" style="background:${PERM_DEFS[p].c}">${p}</span></th>`).join('')}</tr></thead><tbody>${matrixRows}</tbody></table></div>`;
  const apprList=APPROVAL_ACTIONS.map(a=>`<label style="display:flex;align-items:flex-start;gap:6px;padding:6px 8px;border-bottom:1px solid #F3F4F6;cursor:pointer;font-size:11px"><input type="checkbox" data-approval="${a.k}" ${(tpl.approvals||[]).includes(a.k)?'checked':''} style="margin-top:2px;accent-color:#7C3AED"><div><div style="font-weight:600;color:#1F2937">${a.l}</div><div style="color:#6B7280;font-size:10px">${a.desc}</div></div></label>`).join('');

  openM('Edit Template — '+tpl.name+(isModified?' (Modified)':''),`
    <div style="display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid var(--bd)">
      <button class="tab-b on" id="tfTab1" onclick="tfTab(1)">1. Details</button>
      <button class="tab-b" id="tfTab2" onclick="tfTab(2)">2. Permissions Matrix</button>
      <button class="tab-b" id="tfTab3" onclick="tfTab(3)">3. Approval Authority</button>
    </div>
    <div id="tfPanel1">
      ${isSystem&&!isModified?`<div class="info-box" style="background:#FEF3C7;border-color:#FCD34D;color:#92400E">⚠ <b>System Template.</b> Saving creates an <b>override</b> that takes priority over the built-in default. Use "Reset to System Default" anytime to discard the override.</div>`:isSystem&&isModified?`<div class="info-box" style="background:#FEE2E2;border-color:#FCA5A5;color:#991B1B">🔄 <b>Modified System Template.</b> The built-in version has been overridden. Click "Reset to System Default" to restore the original.</div>`:`<div class="info-box">✏️ <b>Custom Template.</b> Edits save directly to this template.</div>`}
      <label class="m-lbl">Template Name ★<input class="m-inp" id="tfNm" value="${tpl.name.replace(/"/g,'&quot;')}"></label>
      <label class="m-lbl">Description<input class="m-inp" id="tfDs" value="${(tpl.desc||'').replace(/"/g,'&quot;')}" placeholder="Short description shown in user creation"></label>
      <label class="m-lbl">Default Department <span style="color:var(--dm);font-weight:400">(optional — shown in dropdown grouping)</span>
        <select class="m-inp" id="tfDp"><option value="">— None —</option>${depts.map(d=>`<option value="${d.name}" ${tpl.dept===d.name?'selected':''}>${d.code} — ${d.name}</option>`).join('')}</select>
      </label>
    </div>
    <div id="tfPanel2" style="display:none">

function saveTemplateForm(tplId){
  const sysOriginal=SYSTEM_ROLE_TEMPLATES.find(t=>t.id===tplId);
  const existingOverride=(D.roleTemplates||[]).find(t=>t.id===tplId);
  const isSystemTemplate=!!sysOriginal;
  const baseline=existingOverride||sysOriginal;
  if(!baseline)return toast('Template not found');
  const name=document.getElementById('tfNm').value.trim();
  if(!name)return alert('Template name is required');
  const desc=document.getElementById('tfDs').value.trim();
  const dept=document.getElementById('tfDp').value;
  const modules={};Object.keys(MODULE_REGISTRY).forEach(k=>{const v=window._uf?.perms?.[k]||'';if(v)modules[k]=v});
  const approvals=[...document.querySelectorAll('input[data-approval]:checked')].map(cb=>cb.getAttribute('data-approval'));
  const prevName=baseline.name;
  const newRecord={id:tplId,name,desc,dept,system:isSystemTemplate,modules,approvals};
  if(isSystemTemplate){
    // Write or replace override
    D.roleTemplates=(D.roleTemplates||[]).filter(t=>t.id!==tplId);
    D.roleTemplates.push(newRecord);
    D.permLogs.push({on:TD+' '+new Date().toLocaleTimeString(),by:CU.name,action:'System Template Overridden',target:tplId,detail:`"${prevName}" → "${name}" | ${Object.keys(modules).length} modules, ${approvals.length} approvals`});
